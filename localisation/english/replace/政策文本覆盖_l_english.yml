economic_controlled_economy_name:0 "Command Economy"
economic_controlled_economy_desc:0 "As we govern the state, so too must we fully control its markets. Through unified purchase/sales systems, price controls, and strict financial regulation, we maintain markets as tools for planned development.\n\n - Unlocks Â§YEconomic PlanningÂ§! $COUNCIL_AGENDA$.\n - The economy will be affected by $trade_value_reduction_modifier$ and $trade_value_reduction_modifier_2$.\n\n"
