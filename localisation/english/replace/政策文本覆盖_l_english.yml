 economic_stance_emotional_economy_name:0 "No Economy"
 economic_stance_emotional_economy_desc:0 "In this society, labor is completely decoupled from production. All natural resources may be taken freely according to need, and all manufactured goods can be produced independently by individuals. The civilization is sustained entirely by the sharing of knowledge and information.\n\n - Only the Â§Y$living_standard_shared_burden$Â§!, Â§Y$living_standard_worker_ownership$Â§! and Â§Y$living_standard_utopian$Â§! living standards are available.\n - Unlocks the Â§Y$currency_standard_trade$Â§! $policy_currency_standard$ policy.\n\n$mod_planet_jobs_produces_mult$: Â§G+184.8%Â§!\n$MOD_PLANET_AMENITIES_MULT$: Â§G+191.7%Â§!\n$MOD_POP_BONUS_WORKFORCE_MULT$: Â§G+202.6%Â§!\n$MOD_BONUS_AUTOMATED_WORKFORCE_MULT$: Â§G+220.0%Â§!"
 
