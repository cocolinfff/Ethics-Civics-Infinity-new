economic_stance_gestalt_economy_name:0 "Emergent Economy"
economic_stance_gestalt_economy_desc:0 "This society lacks 'value measurement' - individuals intuitively know others' needs and coordinate production/distribution accordingly.\n\n - Each $pop_group_unit$ Â§YÂŁjob_clerkÂŁ $job_clerk_plural$Â§! or Â§Y[maintenance_drone.GetIcon][maintenance_drone.GetName]Â§! provides Â§G+1%Â§! $mod_planet_jobs_produces_mult$.\n\n"
