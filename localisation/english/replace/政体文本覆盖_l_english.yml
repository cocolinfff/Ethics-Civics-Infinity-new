 gov_science_knight:0 "Science Knight Order"
 gov_science_knight_desc:0 "Based on $civic_cyber_dictatorship$ $auth_dictatorial$ $op_cat_government$, all social activities must revolve around the sacred research of the knightly order."
 gov_illuminated_autocracy:0 "Illuminated Autocracy"
 gov_illuminated_autocracy_desc:0 "Based on $civic_cyber_dictatorship$ $auth_imperial$ $op_cat_government$, adhering to scientific development is a promise every monarch must bear; there is no more important goal in the state than the flourishing of academic research."

