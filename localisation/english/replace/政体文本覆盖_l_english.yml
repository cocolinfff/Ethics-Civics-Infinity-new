l_english:
 
####################################
#    Political Systems
####################################
 ### Nomadic ###
 nomadic_gov_default: "Shipborne $GOV_NAME$"

### Standard Governments ###
auth_direct_democratic:0 "Direct Democracy"
auth_direct_democratic_desc:0 "Citizens directly participate in governance and policy decisions, enhancing administrative efficiency and accelerating socio-economic development."
auth_direct_democratic_tt:0 "$mod_pop_cat_worker_political_power$: §Y+1§!\n$mod_pop_cat_specialist_political_power$: §Y+1§!\n$mod_pop_cat_ruler_political_power$: §Y+1§!\n$auth_direct_democratic_election_tt$"
auth_direct_democratic_election_tt: "Resets government reform and policy cooldowns when new $councilor_ruler_direct_democratic$ assumes office."
concept_auth_direct_democratic: "$auth_direct_democratic$"

auth_democratic:0 "Representative Democracy"
auth_democratic_desc:0 "Representative democracies hold regular elections where enfranchised citizens vote to determine who should represent their political interests."

auth_oligarchic:0 "Oligarchy"
auth_oligarchic_desc:0 "Oligarchic governments concentrate political power among a small elite who determine the nation's trajectory."

auth_dictatorial:0 "Elective Dictatorship"
auth_dictatorial_desc:0 "Elective dictatorships are ruled by a lifelong leader chosen by the ruling class, wielding absolute executive authority."

auth_imperial:0 "Hereditary Dictatorship"
auth_imperial_desc:0 "Also called monarchy, these governments resemble elective dictatorships but transfer power to designated heirs upon the ruler's death."

### Cybernetic Creed ###
auth_cyber_creed_direct_democratic: "Order of Machine Angels"
auth_cyber_creed_direct_democratic_desc: "Cybernetic direct democracies view augmented citizens as divinely chosen, with every cyborg entitled to participate in sacred doctrinal debates."
concept_auth_cyber_creed_direct_democratic: "$auth_cyber_creed_direct_democratic$"

auth_cyber_creed_democratic: "Divine Machine Republic"
auth_cyber_creed_democratic_desc: "This cybernetic democracy sanctifies voting rights, allowing enhanced citizens to voice political doctrines through sacred implants that commune with machine spirits."
concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"

auth_cyber_creed_oligarchic: "Cybernetic Theocratic Oligarchy"
auth_cyber_creed_oligarchic_desc: "This cybernetic oligarchy venerates augmenters as saints receiving divine revelation, granting episcopal seats to those making breakthrough enhancements."
concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"

auth_cyber_creed_dictatorial: "Autocratic Synth Cult"
auth_cyber_creed_dictatorial_desc: "This cybernetic dictatorship considers implants as divine senses, with the Supreme Hierarch exercising celestial authority through the Church."
concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"

auth_cyber_creed_imperial: "Machine God Pontificate"
auth_cyber_creed_imperial_desc: "This cybernetic monarchy regards augmentation inventors and their descendants as divine bloodlines holding dominion over all sacred machinery in the sector."
concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"

auth_cyber_creed_corporate: "Sacred Tech Conglomerate"
auth_cyber_creed_corporate_desc: "This cybernetic corporate state transcends traditional governance through advanced implants and fusion of faith with technology, pursuing divine economic opportunities."
concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"

### Flesh is Weak (Individualist) ###
auth_cyber_direct_democratic_individualist: "Cyborg Assembly"
auth_cyber_direct_democratic_individualist_desc: "Civilization-defining decisions require every citizen's participation - this fundamental philosophy defines us. Portable political implants safeguard our freedoms, which we shall defend."
concept_auth_cyber_direct_democratic_individualist: "$auth_cyber_direct_democratic_individualist$"

auth_cyber_democratic_individualist: "Parallel Democracy"
auth_cyber_democratic_individualist_desc: "We elect representatives democratically, but individual ignorance and emotional impulses often produce poor decisions. Emotion-suppressor implants now prevent rash choices."

auth_cyber_oligarchic_individualist: "Overclocked Oligarchy"
auth_cyber_oligarchic_individualist_desc: "Our elites struggle with societal complexity. Cybernetic upgrades grant them enhanced cognition, though neural overclocking may cause irreversible brain damage."

auth_cyber_dictatorial_individualist: "Networked Autocracy"
auth_cyber_dictatorial_individualist_desc: "Distraction during critical decisions is unacceptable. Since most cannot maintain perfect focus, we must manage citizen attention toward socially vital matters."

auth_cyber_imperial_individualist: "Overwrite Monarchy"
auth_cyber_imperial_individualist_desc: "The personality matrices of history's greatest leaders embody ideal qualities. During crises, these archived minds can overwrite the current ruler's consciousness."

auth_cyber_corporate_individualist: "Marketized Cognition"
auth_cyber_corporate_individualist_desc: "Obsolete propaganda gives way to direct neural advertising projection. The invisible hand of the market now reigns supreme, and we are its eternal agents."

### Flesh is Weak (Collectivist) ###
auth_cyber_direct_democratic_collectivist: "Transensory Commune"
auth_cyber_direct_democratic_collectivist_desc: "Neural interfaces enable real-time sensorium, emotional, and thought-pattern sharing among all augmented citizens, truly uniting our minds through neurosignals."
concept_auth_cyber_direct_democratic_collectivist: "$auth_cyber_direct_democratic_collectivist$"

auth_cyber_democratic_collectivist: "Interlinked Democracy"
auth_cyber_democratic_collectivist_desc: "Neural sharing enables collective consciousness, though emotional firewalls filter unnecessary reactions to shared experiences."

auth_cyber_oligarchic_collectivist: "Dreamer Oligarchy"
auth_cyber_oligarchic_collectivist_desc: "We've severed virtual from physical. Most enjoy digital paradise while volunteer caretakers operate our physical forms."
auth_cyber_oligarchic_collectivist_tt: "$cyber_oligarchic_lifespan_tt$\n$unlock_edict_stately_acclaim$"

auth_cyber_dictatorial_collectivist: "Ideological Autocracy"
auth_cyber_dictatorial_collectivist_desc: "Undesirable thoughts are purged through neural exploits, ensuring all possess harmonious free will."

auth_cyber_imperial_collectivist: "Host Monarchy"
auth_cyber_imperial_collectivist_desc: "Citizens overwhelmed by reality may purchase temporary consciousness overlays of historical heroes for escapism."

auth_cyber_corporate_collectivist: "Reform Corporation"
auth_cyber_corporate_collectivist_desc: "Through wetware and modern software, we build better corporate societies generating greater labor value."

### Synthetic Evolution (Physical) ###
auth_synth_direct_democratic_physical: "Pan-Democracy"
auth_synth_direct_democratic_physical_desc: "Mind uploading complete, our physical forms reconstructed. All matter within our domain becomes vessels as we await the heat death together."
concept_auth_synth_direct_democratic_physical: "$auth_synth_direct_democratic_physical$"

auth_synth_democratic_physical: "Transference Democracy"
auth_synth_democratic_physical_desc: "Virtual citizens may download into vacant physical shells to interact with the material universe."

auth_synth_oligarchic_physical: "Override Oligarchy"
auth_synth_oligarchic_physical_desc: "Elites temporarily assume control of underperforming peers' bodies, pooling expertise to prevent administrative disasters."

auth_synth_dictatorial_physical: "Information Monopoly"
auth_synth_dictatorial_physical_desc: "A dictator controls all synthetic body access, requiring payment for usage rights."

auth_synth_imperial_physical: "Legacy Intelligence"
auth_synth_imperial_physical_desc: "Great minds persist digitally after death, awaiting reactivation to serve the empire."

auth_synth_corporate_physical: "Cognitive Enterprise"
auth_synth_corporate_physical_desc: "We mass-produce basic synthetic minds from edited organic consciousnesses - perfect for assembly lines."

### Synthetic Evolution (Virtual) ###
auth_synth_direct_democratic_virtual: "Virtual Oasis"
auth_synth_direct_democratic_virtual_desc: "Virtual reality governance belongs to all citizens, who collectively determine its fundamental rules."
concept_auth_synth_direct_democratic_virtual: "$auth_synth_direct_democratic_virtual$"

auth_synth_democratic_virtual: "Proxy Democracy"
auth_synth_democratic_virtual_desc: "While maintaining awareness of existential threats, citizens enjoy considerable freedom in constructed virtual worlds."

auth_synth_oligarchic_virtual: "Simulacrum Directorate"
auth_synth_oligarchic_virtual_desc: "Elected virtuocrats maintain order in carefully regulated virtual realms."

auth_synth_dictatorial_virtual: "Didactic Autocracy"
auth_synth_dictatorial_virtual_desc: "Virtual environments directly manifest civilizational ideals, providing answers to all ideological doubts."

auth_synth_imperial_virtual: "Master Control Protocol"
auth_synth_imperial_virtual_desc: "Consciousnesses inhabiting multiple vessels rapidly respond to server-administered noble houses expanding our material foundations."

auth_synth_corporate_virtual: "Memory Trade Conglomerate"
auth_synth_corporate_virtual_desc: "We commodify not just matter but emotional memories, selling supreme happiness to paying clients."

### Shroud (Transcendent) ###
auth_shroud_direct_democratic_transcendent: "Unified Consciousness"
auth_shroud_direct_democratic_transcendent_desc: "Psionics link all minds, collectively determining each individual's future."

auth_shroud_democratic_transcendent: "Harmonious Communes"
auth_shroud_democratic_transcendent_desc: "Instantaneous psionic communication connects representatives across lightyears, who channel communal will when communing with the Shroud."

auth_shroud_oligarchic_transcendent: "Prophet Council"
auth_shroud_oligarchic_transcendent_desc: "Psionically gifted seers observe possible futures and influence present decisions accordingly."

auth_shroud_dictatorial_transcendent: "Celestial Mandate"
auth_shroud_dictatorial_transcendent_desc: "Deities manifested from the Shroud lead their flock toward earthly paradise."

auth_shroud_imperial_transcendent: "Divine Blood Monarchy"
auth_shroud_imperial_transcendent_desc: "The royal line's manifest psionic gifts prove their ancient divine lineage, securing subjects' loyalty."

auth_shroud_corporate_transcendent: "Shroud Cartel"
auth_shroud_corporate_transcendent_desc: "Corporate financial networks form great psionic arrays influencing material prosperity."

 ### Shroud (Corporeal) ###
 auth_shroud_direct_democratic_corporeal: "Psionic Resonance Entity"
 auth_shroud_direct_democratic_corporeal_desc: "The consciousness of every individual intertwines into a resonance network within The Shroud. By sharing the growth trajectories of superpowers, they collectively determine the civilization's enhancement paths."

 auth_shroud_democratic_corporeal: "Superpower Representative Alliance"
 auth_shroud_democratic_corporeal_desc: "Psionicists elected by various communities serve as representatives of The Shroud, bearing the collective demands for enhancement and negotiating resource allocation at the convergence of psionic energy."

 auth_shroud_oligarchic_corporeal: "Peak Psionic Council"
 auth_shroud_oligarchic_corporeal_desc: "A small number of peak psionicists who have broken the shackles of The Shroud monopolize the method to access The Shroud, and define the boundaries of the civilization's power according to their own will."

 auth_shroud_dictatorial_corporeal: "Psionic Archon"
 auth_shroud_dictatorial_corporeal_desc: "The strongest individual who wins through the duel in The Shroud gains absolute ruling power and solely controls the civilization's psionic core."

 auth_shroud_imperial_corporeal: "Psionic Inheritance Temple"
 auth_shroud_imperial_corporeal_desc: "The hereditary psionic royal family controls the oldest enhancement source in The Shroud. The Zro flowing in their bloodline determines the ruling legitimacy of each generation of heirs."

 auth_shroud_corporate_corporeal: "Psionic Contract Consortium"
 auth_shroud_corporate_corporeal_desc: "With Zro as a bargaining chip, enhancement technologies are traded through psionic contracts. The amount of capital directly determines an individual's qualification to reach the peak of psionic power."

### Evolutionary Mastery ###
auth_gene_government_tt:0 "Each species on planet increases $mod_pop_bonus_workforce_mult$ by §G+5%§!."
auth_gene_government_tt_2:0 "Each 100 pop §G+1%§! $MOD_BONUS_POP_GROWTH_MULT$."
auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_bonus_pop_growth_mult£ $MOD_BONUS_POP_GROWTH_MULT$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2.5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2.5%§!"
 auth_gene_direct_democratic_tt:0 "$auth_gene_government_tt_2$\n$auth_direct_democratic_election_tt$"
 auth_bio_direct_democratic_mutation_tt:0 "$auth_direct_democratic_tt$\n$auth_mutation_habitability_tt$"
 auth_bio_direct_democratic_evopred_tt:0 "$auth_bio_evopred_tt$\n$auth_gene_government_tt_2$\n$auth_direct_democratic_election_tt$"

 concept_mutation_authorities_desc: "Mutation Authorities are available to empires that have fully embraced the Mutation Ascension Path.\n$NEW_LINE$- ['authority:auth_democratic:auth_bio_democratic_mutation'] $NEW_LINE$- ['authority:auth_oligarchic:auth_bio_oligarchic_mutation'] $NEW_LINE$- ['authority:auth_dictatorial:auth_bio_dictatorial_mutation'] $NEW_LINE$- ['authority:auth_imperial:auth_bio_imperial_mutation'] $NEW_LINE$- ['authority:auth_corporate:auth_bio_corporate_mutation'] $NEW_LINE$- ['authority:auth_hive_mind:auth_bio_hive_mutation']"
 concept_mutation_authorities_evopred_desc: "Mutation Authorities are available to empires that have fully embraced the Mutation Ascension Path.\n$NEW_LINE$- ['authority:auth_democratic:auth_bio_democratic_evopred'] $NEW_LINE$- ['authority:auth_oligarchic:auth_bio_oligarchic_evopred'] $NEW_LINE$- ['authority:auth_dictatorial:auth_bio_dictatorial_evopred'] $NEW_LINE$- ['authority:auth_imperial:auth_bio_imperial_evopred'] $NEW_LINE$- ['authority:auth_corporate:auth_bio_corporate_evopred'] $NEW_LINE$- ['authority:auth_hive_mind:auth_bio_hive_mind_evopred']"

 ### Evolutionary Mastery (Purity) ###
 auth_bio_direct_democratic_purity: "Evolutionary Liberty System"
 auth_bio_direct_democratic_purity_desc: "The body is the ultimate canvas; the only limit is imagination."

 auth_bio_democratic_purity: "Genetic Democracy System"
 auth_bio_democratic_purity_desc: "Evolution is not only a right but also an obligation. Every individual bears the responsibility to explore the path to perfection, and the reward is perfection itself."

 auth_bio_oligarchic_purity: "Hereditary Caste System"
 auth_bio_oligarchic_purity_desc: "Only the predetermined life purpose of each individual can bring contentment, not ambition."

 auth_bio_dictatorial_purity: "Nucleic Acid Autocracy"
 auth_bio_dictatorial_purity_desc: "True justice lies not in waiting passively for opportunities, but in preparing in advance. Only by eliminating crime at its root can society be protected."

 auth_bio_imperial_purity: "Imperial Purification System"
 auth_bio_imperial_purity_desc: "Noble wisdom is passed down alongside the great bloodline, and genetic engineering ensures this inheritance remains unbroken."

 auth_bio_corporate_purity: "Genetic Corporation"
 auth_bio_corporate_purity_desc: "Through financial leverage and patent barriers, the corporation takes everyone's genetic information into its possession. Every flesh-and-blood individual is naturally burdened with the corporation's genetic debt from the moment of birth."


 ### Evolutionary Mastery (Cloning) ###
 auth_bio_direct_democratic_cloning: "Co-Corporeal Co-Governance"
 auth_bio_direct_democratic_cloning_desc: "The original and clones are not master and servant, but equal individuals sharing the same genetic origin. Through neural synchronization interfaces, all clones of the same origin can share will in real time and participate in decision-making, truly realizing the direct democracy of \'One Gene, Ten Thousand Shares of Governance\'."

 auth_bio_democratic_cloning: "Multiple-Body Civil Rights"
 auth_bio_democratic_cloning_desc: "Cloning is not a copy of an individual, but an extension of life's possibilities. Every citizen has the right to independently choose whether to cultivate clones, and clones possess independent civil rights from the moment of their birth. Society will protect the equal rights and interests of the original and clones, and prevent the instrumentalization of clones."

 auth_bio_oligarchic_cloning: "Elite Reproduction Oligarchy"
 auth_bio_oligarchic_cloning_desc: "Cloning technology is a power moat for the elite class; only the screened \'excellent templates\' are eligible for targeted cloning. As genetic extensions of the elite, clones receive training in governing capabilities from within cultivation chambers, assisting the original in seizing political power, suppressing heterogeneous genetic groups, and ensuring power remains forever locked within the elite reproduction circle."

 auth_bio_dictatorial_cloning: "Single-Body Dominance"
 auth_bio_dictatorial_cloning_desc: "The dictator's genes are the only orthodox template of civilization. Through unlimited self-cloning, a homogeneous army and bureaucracy are built; absolute genetic uniformity eliminates any possibility of resistance."

 auth_bio_imperial_cloning: "Imperial Body Permanence"
 auth_bio_imperial_cloning_desc: "The royal family's genes are the eternal cornerstone of the empire. Through precision cloning technology, each generation of the royal family cultivates backup clones. When the monarch ages or encounters an accident, memory transplantation enables a seamless transition of the imperial body, ensuring the royal will and imperial rule never cease."

 auth_bio_corporate_cloning: "Fractal Corporation"
 auth_bio_corporate_cloning_desc: "Clones are tradable and mortgageable living assets. Corporations monopolize cloning technology and customize specialized clones for different purposes on demand. Ordinary people can only obtain funds to access cloning services by selling their own genetic templates."


 ### Evolutionary Mastery (Mutation) ###
 auth_bio_direct_democratic_mutation: "Swarm Collective"
 auth_bio_direct_democratic_mutation_desc: "The gestalt of intelligence is no longer confined to a single individual. Through additional neural organs evolved via artificial intervention, all individuals in the ecosystem can freely form different swarm consciousnesses."

 auth_bio_democratic_mutation: "Symbiosis System"
 auth_bio_democratic_mutation_desc: "In this society, the differences between different individuals are greater than those between organisms independently evolved on different planets. These grotesque individuals jointly build a civilization of symbiosis and coexistence through democratic social contracts."

 auth_bio_oligarchic_mutation: "Ethnic Clan System"
 auth_bio_oligarchic_mutation_desc: "In the field of biology, there is no 'strongest,' only 'most useful.' Super individuals optimized through genetic engineering for different specialized directions lead their clan members connected by blood, paving new paths for the future of civilization."

 auth_bio_dictatorial_mutation: "Giant Beast System"
 auth_bio_dictatorial_mutation_desc: "Individuals with different appearances and functions serve as organs, while a super individual created through genetic engineering acts as the main brain. The giant beast named 'Civilization' marches forward."

 auth_bio_imperial_mutation: "Inheritance System"
 auth_bio_imperial_mutation_desc: "Noble wisdom is integrated into the great bloodline, passed down from generation to generation until the heat death of the universe, and genetic engineering ensures this inheritance remains unbroken."
 auth_bio_corporate_mutation: "Natural Selection System"

 auth_bio_corporate_mutation_desc: "This $auth_corporate$ monopolizes all genetic patents in society. A large group of researchers are not only pioneers in exploring paradigms of biological evolution but also hunters who monitor the illegal circulation of incomplete gene segments."


 ### Evolutionary Predators ###
 auth_bio_direct_democratic_evopred: "Wild Hunt"
 auth_bio_direct_democratic_evopred_desc: "The cosmic gene pool is a shared treasure of all. Every hunting and integration of extraterrestrial biological genes requires joint decision-making by all individuals and the execution of hunting operations."

 auth_bio_democratic_evopred: "Hunters' Guild"
 auth_bio_democratic_evopred_desc: "Hunters form a guild that coordinates hunting grounds. By issuing and accepting tasks, they obtain higher-value spoils of war and higher-quality genes."

 auth_bio_oligarchic_evopred: "Head-Hunting Council of Elders"
 auth_bio_oligarchic_evopred_desc: "Only veteran hunters who have hunted the rarest genes in the universe are qualified to guide the direction of the group's evolution, which will ensure the group's survival in the universe."

 auth_bio_dictatorial_evopred: "Supreme Hunter Autocracy"
 auth_bio_dictatorial_evopred_desc: "The Supreme Hunter, who is the greatest hunter in civilization, will guide the entire civilization on how to further develop itself, and his rich experience will provide protection and guidance for all."

 auth_bio_imperial_evopred: "Hunter Noble Lineages"
 auth_bio_imperial_evopred_desc: "The royal bloodline carries core exogenous genes accumulated over generations and masters the oldest cosmic gene-hunting techniques. The genetic trajectory of the royal family is the evolutionary direction of civilization."

 auth_bio_corporate_evopred: "Prey Market"
 auth_bio_corporate_evopred_desc: "The genes obtained from each hunt circulate in this market, and the managers of the market naturally exist as the leaders of civilization."

###############
# Government Types
###############
 ### Basic ###
 gov_direct_democracy:0 "National Assembly"
 gov_direct_democracy_desc:0 "A democratic government of direct democracy, where citizens vote directly on most matters of state using advanced information networks."
 gov_representative_democracy:0 "Representative Democracy"
 gov_representative_democracy_desc:0 "A democratic government of representative democracy, where citizens elect government officials to speak for them."
 gov_cabinet_system_of_responsibility:0 "Cabinet System of Responsibility"
 gov_cabinet_system_of_responsibility_desc:0 "An oligarchic government ruled by a select few, where the most excellent elites form a cabinet to govern the state."
 gov_constitutional_dictatorship:0 "Constitutional Dictatorship"
 gov_constitutional_dictatorship_desc:0 "A dictatorial government that grants a single individual lifelong emergency powers through lawful legislation to protect the state from threats - both external and internal."
 gov_despotic_empire:0 "Despotic Empire"
 gov_despotic_empire_desc:0 "A hereditary autocratic government, the meaning of its existence is for the ruler who holds supreme authority to tightly bind their subjects beneath them."
 gov_megacorporation:0 "Megacorporation"
 gov_megacorporation_desc:0 "A plutocratic oligarchy government, the entire state is organized as a large commercial enterprise, supervised by a board of directors."

 ### Egalitarian ###
 gov_peoples_commune:0 "Workers' Cooperative"
 gov_peoples_commune_desc:0 "Based on $ethic_fanatic_egalitarian$ $auth_direct_democratic$ $op_cat_government$, the basic principles of social operation are solidarity, direct democracy of the masses, and a management system with worker participation, and social production is centered on meeting the needs of the people."
 gov_peoples_congress:0 "People's Congress"
 gov_peoples_congress_desc:0 "Based on $ethic_fanatic_egalitarian$ $auth_democratic$ $op_cat_government$, practitioners from various industries elect people's representatives to ensure the interests of the majority are safeguarded."
 gov_peoples_commissariat:0 "People's Commissariat"
 gov_peoples_commissariat_desc:0 "Based on $ethic_fanatic_egalitarian$ $auth_oligarchic$ $op_cat_government$, government institutions are appointed and supervised by a special emergency committee, whose members must be approved by the people and work together to protect the interests of the state."
 gov_dictatorship_of_the_people:0 "Dictatorship of the People"
 gov_dictatorship_of_the_people_desc:0 "Based on $ethic_fanatic_egalitarian$ $auth_dictatorial$ $op_cat_government$, a lifelong ruler representing the interests of the masses holds state power, preventing hostile forces from harming the interests of the people."
 gov_monarchical_socialism:0 "Monarchical Socialism"
 gov_monarchical_socialism_desc:0 "Based on $ethic_fanatic_egalitarian$ $auth_imperial$ $op_cat_government$, a hereditary ruler of the people who identifies as a laborer, widely supported and loved within the country."

 ### Authoritarian ###
 gov_nights_watch_government:0 "Night's Watch Government"
 gov_nights_watch_government_desc:0 "Based on $ethic_fanatic_authoritarian$ $auth_direct_democratic$ $op_cat_government$, the government cuts its own powers to a minimum and allows elites to form private governments to maintain local stability."
 gov_timocracy:0 "Timocracy"
 gov_timocracy_desc:0 "Based on $ethic_fanatic_authoritarian$ $auth_democratic$ $op_cat_government$, the political rights of the people are divided according to the property they own; personal property directly equals the number of votes."
 gov_plutocratic_oligarchy:0 "Plutocratic Oligarchy"
 gov_plutocratic_oligarchy_desc:0 "Based on $ethic_fanatic_authoritarian$ $auth_oligarchic$ $op_cat_government$, ruled by a wealthy and powerful elite class, powerful corporations have completely taken over the political and economic life of society, and a citizen's private property is directly equivalent to their political power."
 gov_totalitarian_regime:0 "Totalitarian Regime"
 gov_totalitarian_regime_desc:0 "Based on $ethic_fanatic_authoritarian$ $auth_dictatorial$ $op_cat_government$, the state controls every aspect of people's lives in the name of pursuing efficiency."
 gov_star_empire:0 "Star Empire"
 gov_star_empire_desc:0 "Based on $ethic_fanatic_authoritarian$ $auth_imperial$ $op_cat_government$, a hereditary ruler directly controls planets subservient to the central government through executive orders."

 ### Pacifist ###
 gov_moral_ideal_town:0 "Moral Ideal Town"
 gov_moral_ideal_town_desc:0 "Based on $ethic_fanatic_pacifist$ $auth_direct_democratic$ $op_cat_government$, people spontaneously form communities for self-governance and evaluate others by their moral level."
 gov_moral_democracy:0 "Moral Democracy"
 gov_moral_democracy_desc:0 "Based on $ethic_fanatic_pacifist$ $auth_democratic$ $op_cat_government$, people who have abandoned violent thinking manage and supervise the operation of the state through conscience."
 gov_irenic_bureaucracy:0 "Moral Council"
 gov_irenic_bureaucracy_desc:0 "Based on $ethic_fanatic_pacifist$ $auth_oligarchic$ $op_cat_government$, all internal affairs of the state are handled by a complex bureaucratic system, while also protecting the legal rights and safety of its citizens."
 gov_irenic_dictatorship:0 "Moral Regency"
 gov_irenic_dictatorship_desc:0 "Based on $ethic_fanatic_pacifist$ $auth_dictatorial$ $op_cat_government$, an enlightened ruler oversees the state administration to ensure that the violent tendencies of citizens remain below a certain threshold."
 gov_enlightened_monarchy:0 "Enlightened Monarchy"
 gov_enlightened_monarchy_desc:0 "Based on $ethic_fanatic_pacifist$ $auth_imperial$ $op_cat_government$, as the head of government, wisdom and qualifications are most valued."
 gov_charitable_foundation:0 "Charitable Foundation"
 gov_charitable_foundation_desc:0 "Based on $ethic_fanatic_pacifist$ $auth_corporate$ $op_cat_government$, corporations achieve redistribution of goods by providing the poor with necessities, ensuring market prosperity."

 ### Militarist ###
 gov_servicemens_union:0 "Servicemen's Union"
 gov_servicemens_union_desc:0 "Based on $ethic_fanatic_militarist$ $auth_direct_democratic$ $op_cat_government$, clubs formed by veteran citizens and active soldiers unite different legions, forming the basic structure of social governance."
 gov_military_commissariat:0 "Military Commissariat"
 gov_military_commissariat_desc:0 "Based on $ethic_fanatic_militarist$ $auth_democratic$ $op_cat_government$, the line between civil affairs and military has blurred to the point that the two are largely one and the same."
 gov_military_junta:0 "Military Junta"
 gov_military_junta_desc:0 "Based on $ethic_fanatic_militarist$ $auth_oligarchic$ $op_cat_government$, all state policies are decided by a council composed of the country's most powerful warlords."
 gov_military_dictatorship:0 "Military Dictatorship"
 gov_military_dictatorship_desc:0 "Based on $ethic_fanatic_militarist$ $auth_dictatorial$ $op_cat_government$, the ruler is an undisputed military chief, and absolute violence firmly controls the state apparatus."
 gov_martial_empire:0 "Martial Empire"
 gov_martial_empire_desc:0 "Based on $ethic_fanatic_militarist$ $auth_imperial$ $op_cat_government$, the state exists solely to support its military sector. Combat skill is the most important ability, and every citizen must undergo some military proficiency training."
 gov_military_industrial_complex:0 "Military-Industrial Complex"
 gov_military_industrial_complex_desc:0 "Based on $ethic_fanatic_militarist$ $auth_corporate$ $op_cat_government$, constantly producing weapons capable of destroying the entire galaxy to meet export demands."

 ### Spiritualist ###
 gov_the_oracular_order:0 "Oracular Order"
 gov_the_oracular_order_desc:0 "Based on $ethic_fanatic_spiritualist$ $auth_direct_democratic$ $op_cat_government$, believers who have received divine guidance spontaneously form orders to practice asceticism while exercising local self-governance."
 gov_theocratic_republic:0 "Theocratic Republic"
 gov_theocratic_republic_desc:0 "Based on $ethic_fanatic_spiritualist$ $auth_democratic$ $op_cat_government$, a religious council oversees the democratic process, acting in an advisory role."
 gov_theocratic_oligarchy:0 "Theocratic Oligarchy"
 gov_theocratic_oligarchy_desc:0 "Based on $ethic_fanatic_spiritualist$ $auth_oligarchic$ $op_cat_government$, the political power of the state is entirely in the hands of several high-ranking religious leaders."
 gov_theocratic_dictatorship:0 "Theocratic Dictatorship"
 gov_theocratic_dictatorship_desc:0 "Based on $ethic_fanatic_spiritualist$ $auth_dictatorial$ $op_cat_government$, the official state religion supports a hierarchical power structure, and the state is ruled by a single individual at the top of this power structure."
 gov_theocratic_monarchy:0 "Theocratic Monarchy"
 gov_theocratic_monarchy_desc:0 "Based on $ethic_fanatic_spiritualist$ $auth_imperial$ $op_cat_government$, the ruler of the state is deified as a sacred symbol. A complete church organization is integrated into the administrative apparatus, contributing to the development of the state."
 gov_megachurch:0 "Megachurch"
 gov_megachurch_desc:0 "Based on $ethic_fanatic_spiritualist$ $auth_corporate$ $op_cat_government$, religious tradition and commercial values are bizarrely fused, with the roles of appointed prelate and corporation executive merged into one."

 ### Materialist ###
 gov_cyber_democracy:0 "Rational Consensus"
 gov_cyber_democracy_desc:0 "Based on $ethic_fanatic_materialist$ $auth_direct_democratic$ $op_cat_government$, technologists and civilian hackers use big data from the network to model society, thereby obtaining policies based on the subconscious consensus of the majority of the populace."
 gov_expert_council:0 "Expert Council"
 gov_expert_council_desc:0 "Based on $ethic_fanatic_materialist$ $auth_democratic$ $op_cat_government$, before government edicts are issued, they must be reviewed by a council composed of senior scholars and experts."
 gov_science_directorate:0 "Science Directorate"
 gov_science_directorate_desc:0 "Based on $ethic_fanatic_materialist$ $auth_oligarchic$ $op_cat_government$, a directorate composed of senior scholars and experts governs the state for the welfare and efficiency of the people."
 gov_technocratic_dictatorship:0 "Technocratic Dictatorship"
 gov_technocratic_dictatorship_desc:0 "Based on $ethic_fanatic_materialist$ $auth_dictatorial$ $op_cat_government$, the leaders of the academic cliques fully control the development of the state in the name of efficiency and scientific research."
 gov_scholartyrant_monarchy:0 "Scholartyrant Monarchy"
 gov_scholartyrant_monarchy_desc:0 "Based on $ethic_fanatic_materialist$ $auth_imperial$ $op_cat_government$, the leaders of the academic cliques pass down research patents through generations, controlling the whole state through a comprehensive patent protection law."
 gov_technology_group:0 "Technology Group"
 gov_technology_group_desc:0 "Based on $ethic_fanatic_materialist$ $auth_corporate$ $op_cat_government$, strict labor management promotes the emergence of many new technological products."

 ### Anarchism ###
 gov_anarchic_society:0 "Anarchic Society"
 gov_anarchic_society_desc:0 "The complete form of direct democracy, where all citizens participate in a general assembly with only legislative power, and self-manage according to the decisions reached through collective discussion."
 gov_anarchocapitalism:0 "Anarcho-capitalism"
 gov_anarchocapitalism_desc:0 "A social form where the scale and authority of state institutions are minimized, and the free market provides all public goods and services, including law and order."
 gov_anarchocommunism:0 "Anarcho-syndicalism"
 gov_anarchocommunism_desc:0 "A social form where the proletariat adopts direct democracy, trade unions, cooperatives, etc., completely decentralizing information and decision-making power to every individual."

 ### Syndicalism ###
 gov_union_representation:0 "Union Representation"
 gov_union_representation_desc:0 "Based on $civic_worker_coop$ $auth_democratic$ $op_cat_government$, worker representatives elected by unions within enterprises form political parties and conduct democratic politics in the parliament."
 gov_council_of_unions:0 "Council of Unions"
 gov_council_of_unions_desc:0 "Based on $civic_worker_coop$ $auth_oligarchic$ $op_cat_government$, workers worldwide elect a standing committee of trade unions, responsible for managing planetary administrative affairs at all levels."

 ### Thought Designer ###
 gov_ntraparty_democracy:0 "Whole-Process Democracy"
 gov_ntraparty_democracy_desc:0 "Based on $civic_glorious_pioneer$ $auth_democratic$ $op_cat_government$, the ruler has unlimited power and is elected, but this election is a single-candidate election and is guided."
 gov_bur_collectivism:0 "Bureaucratic Collectivism"
 gov_bur_collectivism_desc:0 "Based on $civic_glorious_pioneer$ $auth_oligarchic$ $op_cat_government$, the state owns the means of production, and the surplus or profits are distributed to elite bureaucrats within the party, not the working class."
 gov_parental_dictatorship:0 "Paternalistic Dictatorship"
 gov_parental_dictatorship_desc:0 "Based on $civic_glorious_pioneer$ $auth_dictatorial$ $op_cat_government$, the ruler treats the proletariat as juniors in a family, cultivating people useful to society with a sense of parental responsibility."
 gov_juche_regime:0 "Juche Regime"
 gov_juche_regime_desc:0 "Based on $civic_glorious_pioneer$ $auth_imperial$ $op_cat_government$, the ruler guides the people forward by strengthening the cult of personality within the domestic society."

 ### Holographic Eye ###
 gov_spontaneous_mobocracy:0 "Spontaneous Mobocracy"
 gov_spontaneous_mobocracy_desc:0 "Based on $civic_dystopian_society$ $auth_democratic$ $op_cat_government$, citizens spontaneously monitor and actively report those around them in exchange for the thrill of participating in state governance."
 gov_supervisory_board:0 "Panopticon"
 gov_supervisory_board_desc:0 "Based on $civic_dystopian_society$ $auth_oligarchic$ $op_cat_government$, everyone is monitored by an inspection committee and may be inspected at any time; people must assume they may be investigated at any moment to force themselves to comply with norms."
 gov_manage_democracy:0 "Managed Democracy"
 gov_manage_democracy_desc:0 "Based on $civic_dystopian_society$ $auth_dictatorial$ $op_cat_government$, the government distributes survey questionnaires to collect public opinion, then inputs the data into mathematical models to create ideal virtual voters, replacing the variable real voters for elections."
 gov_holographic_empire:0 "Holographic Empire"
 gov_holographic_empire_desc:0 "Based on $civic_dystopian_society$ $auth_imperial$ $op_cat_government$, the ruler monitors every resident through a data network and promptly dispatches mobile units to stabilize the foundations of rule."

 ### Aristocratic Elite ###
 gov_prestigious_republic:0 "Prestigious Republic"
 gov_prestigious_republic_desc:0 "Based on $civic_aristocratic_elite$ $auth_democratic$ $op_cat_government$, representatives of various hereditary families enter the government for public elections, and the popular vote chooses the most beloved noble to lead the state."
 gov_noble_aristocracy:0 "Noble Aristocracy"
 gov_noble_aristocracy_desc:0 "Based on $civic_aristocratic_elite$ $auth_oligarchic$ $op_cat_government$, all political power in society belongs to a senate representing the hereditary nobility."
 gov_electing_council:0 "Electing Council"
 gov_electing_council_desc:0 "Based on $civic_aristocratic_elite$ $auth_dictatorial$ $op_cat_government$, the wisest monarch is elected from among the great electors to rule the nation."
 gov_aristocratic_monarchy:0 "Aristocratic Monarchy"
 gov_aristocratic_monarchy_desc:0 "Based on $civic_aristocratic_elite$ $auth_imperial$ $op_cat_government$, the hereditary ruler does not have absolute power and must share it with the most influential members of the nobility."

 ### Home-Country Isomorphism ###
 gov_celestial_empire:0 "Celestial Empire"
 gov_celestial_empire_desc:0 "Based on $civic_home_country_isomorphism$ $auth_imperial$ $op_cat_government$, the monarch is regarded as the agent of ancient heroes on earth, managing the younger generations of the family on behalf of the ancients."

 ### Feudal Realm ###
 gov_feudal_empire:0 "Feudal Empire"
 gov_feudal_empire_desc:0 "Based on $civic_feudal_realm$ $auth_imperial$ $op_cat_government$, the monarch exercises indirect rule by granting vassals official positions and fiefs in exchange for taxes and military allegiance."

 ### Sovereign Confederation ###
 gov_community_of_common_destiny:0 "Community of Common Destiny"
 gov_community_of_common_destiny_desc:0 "Life has only one universe, civilizations coexist in one dimension, and through the joint efforts of many parties, this civilization has gradually formed a 'community of common destiny' where you are among us and we are among you."
 gov_soviet_union:0 "Union of Republics"
 gov_soviet_union_desc:0 "A union of several sovereign republics, the leaders of various democratic parties, after political consultation, allocate resources uniformly to promote the common development of all countries."
 gov_commonwealth_of_states:0 "Commonwealth of States"
 gov_commonwealth_of_states_desc:0 "An alliance of sovereign states formed for some common interest, where each member state enjoys full sovereignty internally and externally, and delegates part of its power to the confederal institutions through equal consultation."
 gov_joint_dictatorship:0 "Joint Dictatorship"
 gov_joint_dictatorship_desc:0 "An interstellar empire formed by multiple countries. Members of the personal union maintain their independence but jointly support the same elected lifelong consul to mediate conflicts between them."
 gov_united_empire:0 "Personal Union"
 gov_united_empire_desc:0 "An interstellar empire formed by multiple countries. Members of the personal union maintain their independence but jointly honor the same hereditary head of state as a symbol of unity."

 ### Colonial Government ###
 gov_satellite_community:0 "Satellite Community"
 gov_satellite_community_desc:0 "Based on $civic_colonial_government$ $auth_direct_democratic$ $op_cat_government$, an autonomous colony that decides by referendum to submit to an external power, conducting social activities like a satellite orbiting a planet."
 gov_dominion:0 "Dominion"
 gov_dominion_desc:0 "Based on $civic_colonial_government$ $auth_democratic$ $op_cat_government$, some outstanding residents of the colony are granted honorary citizenship by the suzerain and allowed to form autonomous governing bodies in the colony."
 gov_comprador_republic:0 "Comprador Republic"
 gov_comprador_republic_desc:0 "Based on $civic_colonial_government$ $auth_oligarchic$ $op_cat_government$, a group of comprador families have obtained monopoly sales rights for goods in the colony by serving the suzerain."
 gov_colonial_governors_office:0 "Colonial Governor's Office"
 gov_colonial_governors_office_desc:0 "Based on $civic_colonial_government$ $auth_dictatorial$ $op_cat_government$, outstanding talents emerging within the colony, after obtaining certification from the suzerain, fully manage the colony's affairs on behalf of the suzerain."
 gov_puppet_kingdom:0 "Puppet Kingdom"
 gov_puppet_kingdom_desc:0 "Based on $civic_colonial_government$ $auth_imperial$ $op_cat_government$, a royal family propped up by the suzerain that must fulfill obligations of loyalty to the suzerain."

 ### Nation and Class ###
 gov_national_community:0 "National Community"
 gov_national_community_desc:0 "Based on $civic_nazbol$ $auth_direct_democratic$ $op_cat_government$, everyone, as a member of the national community, spiritually transcends money, property, profit, and false success, with only differences in responsibility to the nation, at least in theory."
 gov_jamahiriya:0 "Jamahiriya"
 gov_jamahiriya_desc:0 "Based on $civic_nazbol$ $auth_democratic$ $op_cat_government$, a government based on democratic elections but with unchecked power is regarded as the representative of the national will, controlling every aspect of state and social life."
 gov_national_syndicalism:0 "National Syndicalism"
 gov_national_syndicalism_desc:0 "Based on $civic_nazbol$ $auth_oligarchic$ $op_cat_government$, a huge and authoritarian party or general trade union controls the military, industry, economy, and everything else, rejecting the corruption of liberal politics and internationalism, and defending the livelihood and greater 'freedom' of the nation's people."
 gov_holistic_nationalism:0 "Holistic Nationalism"
 gov_holistic_nationalism_desc:0 "Based on $civic_nazbol$ $auth_dictatorial$ $op_cat_government$, the state is considered a people's body, an institution of racial unity and hierarchical organization, where individual interests are strictly subordinated to the interests of the state or people. The leader, possessing absolute authority by virtue of their personal charisma, is seen as the representative of the state or people's interests."
 gov_leviathan_state:0 "Leviathan State"
 gov_leviathan_state_desc:0 "Based on $civic_nazbol$ $auth_imperial$ $op_cat_government$, it is believed that patriotism requires a strong, stable, and enduring polity - monarchy. The state is conceptualized as an organic whole headed by the monarch, based on the principles of legitimism and corporatist representation, with nationalism and tradition being utilized as forces of order. The monarch rules the state, not the people; the Leviathan reigns over the stars."

 ### Glory and Dream ###
 gov_pureblood_brotherhood:0 "Pureblood Brotherhood"
 gov_pureblood_brotherhood_desc:0 "Based on $civic_glory_and_dream$ $auth_direct_democratic$ $op_cat_government$, direct democracy practiced internally by the superior race has made the entire society a paradise that other base creatures aspire to."
 gov_pure_council:0 "Pure Council"
 gov_pure_council_desc:0 "Based on $civic_glory_and_dream$ $auth_democratic$ $op_cat_government$, a democratic government formed by the superior race, with rigorously screened parliamentary seats ensuring no base species enter the sacred parliament."
 gov_national_corporatism:0 "National Corporatism"
 gov_national_corporatism_desc:0 "Based on $civic_glory_and_dream$ $auth_oligarchic$ $op_cat_government$, political groups formed by the outstanding elites of the superior race strictly screen every person, ensuring no base creatures enjoy social welfare provided by the state."
 gov_eternal_kingdom:0 "Eternal Kingdom"
 gov_eternal_kingdom_desc:0 "Based on $civic_glory_and_dream$ $auth_dictatorial$ $op_cat_government$, the great $RT_LORD_PROTECTOR$ will lead the superior race to build an eternal empire in the universe."
 gov_pureblood_empire:0 "Pureblood Empire"
 gov_pureblood_empire_desc:0 "Based on $civic_glory_and_dream$ $auth_imperial$ $op_cat_government$, the hereditary ruler will provide the purest genetic blueprint for the terrestrial divine kingdom of the superior race."

 ### Labor Democracy ###
 gov_great_democracy:0 "Mass Great Democracy"
 gov_great_democracy_desc:0 "Based on $civic_shared_burden$ $auth_direct_democratic$ $op_cat_government$, through widespread political freedoms and mass organizations such as trade unions, the working people directly participate in state management under the guidance of general consensus formed in debates."
 gov_great_commune:0 "Great Commune"
 gov_great_commune_desc:0 "Based on $civic_shared_burden$ $auth_democratic$ $op_cat_government$, everyone is a part of the collective, and after their labor is widely recognized by society, they can be elected as administrative managers."

 ### Vanguard Politics ###
 gov_collective_democracy:0 "Democratic Centralism"
 gov_collective_democracy_desc:0 "Based on $civic_socialistic$ $auth_democratic$ $op_cat_government$, committees nominated by the ruling party organize all sectors of society together to hold democratic meetings to govern the state."
 gov_collective_leadership:0 "Collective Leadership"
 gov_collective_leadership_desc:0 "Based on $civic_socialistic$ $auth_oligarchic$ $op_cat_government$, a leadership committee elected internally by the ruling party is responsible for all departments of the state, ensuring orderly production activities."
 gov_political_collectivism:0 "Political Collectivism"
 gov_political_collectivism_desc:0 "Based on $civic_socialistic$ $auth_dictatorial$ $op_cat_government$, led by a lifelong leader beloved by the people, an independent political power - the so-called 'vanguard' - supervises the operation of society to prevent decisions from harming the interests of the people."

 ### Labor Aristocracy ###
 gov_social_democracy:0 "Social Democracy"
 gov_social_democracy_desc:0 "Based on $civic_labor_aristocracy$ $auth_democratic$ $op_cat_government$, some highly accomplished senior workers gain the right to leave production and join the government to work for the welfare of other workers."
 gov_nobleworker_union:0 "Union Supervision System"
 gov_nobleworker_union_desc:0 "Based on $civic_labor_aristocracy$ $auth_oligarchic$ $op_cat_government$, unions formed through mutual contact among senior engineers will guarantee a prosperous life for some outstanding workers and their descendants."
 gov_elective_monarchy:0 "State-owned Enterprise Dictatorship"
 gov_elective_monarchy_desc:0 "Based on $civic_labor_aristocracy$ $auth_dictatorial$ $op_cat_government$, respected old workers serve as the heads of state-owned monopolies in various fields, and before their death or promotion, they recommend newly trained leaders to the organization."
 gov_limited_communism:0 "Limited Communism"
 gov_limited_communism_desc:0 "Based on $civic_labor_aristocracy$ $auth_imperial$ $op_cat_government$, the hereditary worker rulers ensure the balance of interests among various families as much as possible, realizing the communist ideal to a limited extent within the upper-class social circles."

 ### Great Concern ###
 gov_trade_league:0 "Trade League"
 gov_trade_league_desc:0 "Based on $civic_merchant_guilds$ $auth_direct_democratic$ $op_cat_government$, the state is established by countless free merchants, companies, and guilds united for common commercial interests."
 gov_trade_association:0 "Trade Association"
 gov_trade_association_desc:0 "Based on $civic_merchant_guilds$ $auth_democratic$ $op_cat_government$, merchants from around the world have formed a unified national chamber of commerce to manage trade disputes - while also taking over administration."
 gov_investment_council:0 "Investment Council"
 gov_investment_council_desc:0 "Based on $civic_merchant_guilds$ $auth_oligarchic$ $op_cat_government$, representatives of various companies hold regular meetings to adjust the operation of financial investment capital flows within the state."
 gov_corporate_dictatorship:0 "Corporate Dictatorship"
 gov_corporate_dictatorship_desc:0 "Based on $civic_merchant_guilds$ $auth_dictatorial$ $op_cat_government$, its public officials hold the dual identities of high-level corporate managers and government officials, and the leader directly serves as the decision-maker of the enterprises."
 gov_financial_empire:0 "Financial Empire"
 gov_financial_empire_desc:0 "Based on $civic_merchant_guilds$ $auth_imperial$ $op_cat_government$, the government and monopolistic enterprise groups govern every corner of society as two sides of the same coin, and the hereditary ruler concurrently serves as state ruler and enterprise leader."

 ### Family Business ###
 gov_family_business:0 "Family Business"
 gov_family_business_desc:0 "Based on $civic_family_business$ $auth_imperial$ $auth_corporate$ $op_cat_government$, positions in the enterprise are fixed and hereditary, and every employee has the responsibility to train their descendants to be qualified successors."

 ### Martial Tribes ###
 gov_assembly_of_clans:0 "Assembly of Clans"
 gov_assembly_of_clans_desc:0 "Based on $civic_martial_tribes$ $auth_direct_democratic$ $op_cat_government$, the establishment of the union ensures that warriors of all free clans have a voice."
 gov_war_council:0 "War Council"
 gov_war_council_desc:0 "Based on $civic_martial_tribes$ $auth_democratic$ $op_cat_government$, the bravest warriors of each clan, under the witness of $RT_WARLORD$, discuss the routes of external conquest."

 ### Orderly Military Government ###
 gov_citizen_republic:0 "Citizen Republic"
 gov_citizen_republic_desc:0 "Based on $civic_citizen_service$ $auth_democratic$ $op_cat_government$, citizens can only obtain first-class citizenship through military service, and only such citizens can enjoy political rights such as administration and voting."
 gov_citizen_stratocracy:0 "Military Bureaucracy"
 gov_citizen_stratocracy_desc:0 "Based on $civic_citizen_service$ $auth_oligarchic$ $op_cat_government$, all civil administrative departments are governed according to military regulations, and key government positions are invariably held by military officials."
 gov_martial_dictatorship:0 "Military Police Tutelage"
 gov_martial_dictatorship_desc:0 "Based on $civic_citizen_service$ $auth_dictatorial$ $op_cat_government$, military police and military tribunals strictly hold law enforcement and judicial powers, imposing strict military discipline on the entire society."

 ### Warlord ###
 gov_knights_of_war:0 "War Knight Order"
 gov_knights_of_war_desc:0 "Based on $civic_military_dictatorship$ $auth_dictatorial$ $op_cat_government$, honorable knights gather for a common goal, exchanging the swords in their hands for the land beneath their feet."
 gov_knight_kingdom:0 "Knight Kingdom"
 gov_knight_kingdom_desc:0 "Based on $civic_military_dictatorship$ $auth_imperial$ $op_cat_government$, the country is divided into knightly fiefs large and small, and the king himself is the greatest knight of all."

 ### Peaceful Utopia ###
 gov_great_harmony_society:0 "Great Harmony Society"
 gov_great_harmony_society_desc:0 "Based on $civic_peaceful_republic$ $auth_direct_democratic$ $op_cat_government$, people practice self-governance based on common moral principles and care for the elderly, weak, women, children, and those living in hardship around them."
 gov_ideal_democracy:0 "Ideal Democracy"
 gov_ideal_democracy_desc:0 "Based on $civic_peaceful_republic$ $auth_democratic$ $op_cat_government$, people spontaneously avoid corruption and favoritism that may occur in democratic elections by virtue of morality and conscience, making political operations full of idealism."

 ### Examination Republic ###
 gov_federal_student_union:0 "Federal Student Union"
 gov_federal_student_union_desc:0 "Based on $civic_executive_committee$ $auth_democratic$ $op_cat_government$, student unions are elected by students of all ages to conduct student self-governance."
 gov_faculty_and_staff_meetings:0 "Faculty and Staff Meetings"
 gov_faculty_and_staff_meetings_desc:0 "Based on $civic_executive_committee$ $auth_oligarchic$ $op_cat_government$, faculty and staff responsible for various teaching tasks form the government, managing and educating ordinary citizens - who are also students."
 gov_school_board:0 "School Board"
 gov_school_board_desc:0 "Based on $civic_executive_committee$ $auth_dictatorial$ $op_cat_government$, the principal elected by senior faculty and staff will manage the entire society through the education group."

 ### Philosopher King ###
 gov_meditation:0 "Abdication System"
 gov_meditation_desc:0 "Based on $civic_philosopher_king$ $auth_dictatorial$ $op_cat_government$, when the ruler grows old, they transfer power to a successor regarded as wise by the people."
 gov_ideal_country:0 "Ideal State"
 gov_ideal_country_desc:0 "Based on $civic_philosopher_king$ $auth_imperial$ $op_cat_government$, everyone is assigned to different classes according to their talents, and a wise monarch presides over a rigorous and harmonious empire."

 ### Holy Council ###
 gov_righteous_fellowship:0 "Righteous Fellowship"
 gov_righteous_fellowship_desc:0 "Based on $civic_spiritual_democracy$ $auth_direct_democratic$ $op_cat_government$, the righteous who have understood God's teachings spontaneously organize the people, leading them closer to the kingdom of heaven."
 gov_republic_of_saints:0 "Republic of Saints"
 gov_republic_of_saints_desc:0 "Based on $civic_spiritual_democracy$ $auth_democratic$ $op_cat_government$, saints recognized by all sectors of society form an administrative council, and people believe that any administrative measures taken by saints will bring mortals closer to God."

 ### Theocracy ###
 gov_predivine_council:0 "Pre-divine Council"
 gov_predivine_council_desc:0 "Based on $civic_exalted_priesthood$ $auth_democratic$ $op_cat_government$, every session's council members must take an oath in the name of God when taking office, bearing witness to the fairness of government resolutions."
 gov_holy_tribunal:0 "Monastic Supervision"
 gov_holy_tribunal_desc:0 "Based on $civic_exalted_priesthood$ $auth_oligarchic$ $op_cat_government$, a council guided by the Holy Spirit, composed of clergy, controls the entire state, and the state and the dominant religious organization merge into one."
 gov_holy_see:0 "Holy See"
 gov_holy_see_desc:0 "Based on $civic_exalted_priesthood$ $auth_dictatorial$ $op_cat_government$, all state power returns to the lifelong $RT_PATRIARCH$ blessed by God."

 ### State Cult ###
 gov_sacred_illumination:0 "Sacred Illumination"
 gov_sacred_illumination_desc:0 "Based on $civic_imperial_cult$ $auth_dictatorial$ $op_cat_government$, the sacred ruler leads the lost lambs to gain a foothold among the galaxies, spreading their teachings to sentient life through disciples."
 gov_divine_empire:0 "Divine Empire"
 gov_divine_empire_desc:0 "Based on $civic_imperial_cult$ $auth_imperial$ $op_cat_government$, all matters within the state must be reviewed by the state religion, and the ruler of the state is regarded as a true god walking on the mortal plane."

 ### Cyber Democracy ###
 gov_creative_workshop:0 "Creative Workshop"
 gov_creative_workshop_desc:0 "Based on $civic_cyber_demos_cratos$ $auth_direct_democratic$ $op_cat_government$, every community uploads its governance theories to the network database, and others can download this political information for free and apply it in their own communities."
 gov_information_republic:0 "Information Republic"
 gov_information_republic_desc:0 "Based on $civic_cyber_demos_cratos$ $auth_democratic$ $op_cat_government$, people build virtual experimental nations on the advanced interstellar information network, and the democratically elected government selectively forwards policies that work in the virtual states to the real universe."
 gov_political_forum_section:0 "Keyboard Politics Forum"
 gov_political_forum_section_desc:0 "Based on $civic_cyber_demos_cratos$ $auth_oligarchic$ $op_cat_government$, netizens publish personal political opinions in cyberspace, and the $RT_MODERATOR$, who also serves as the ruler, applies useful views among them to state governance."

 ### Technocracy ###
 gov_technical_seminar:0 "Technical Seminar"
 gov_technical_seminar_desc:0 "Based on $civic_technocracy$ $auth_democratic$ $op_cat_government$, government civil servants are also senior sociology researchers, who regularly hold seminars to exchange the results of social experiments in addition to participating in politics."
 gov_technocracy:0 "Technocracy"
 gov_technocracy_desc:0 "Based on $civic_technocracy$ $auth_oligarchic$ $op_cat_government$, technological talents with rational thinking are in charge of managing the state more efficiently, preventing irrational individuals from causing damage to the government."
 gov_despotic_technate:0 "Despotic Technate"
 gov_despotic_technate_desc:0 "Based on $civic_technocracy$ $auth_dictatorial$ $op_cat_government$, senior political science researchers serve as lifelong rulers, ensuring society progresses in accordance with a rigorous scientific spirit."

