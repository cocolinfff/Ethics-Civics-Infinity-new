 civic_gourmet_journey: "Gourmet Journey"
 civic_gourmet_journey_desc: "['concept_national_culture']\nThe fundamental driving force behind the progress of this civilization is the search for food that has never been tasted before. While others are still calculating the payload of their spacecraft due to financial issues, they have already transported a complete set of kitchens into the sky."
