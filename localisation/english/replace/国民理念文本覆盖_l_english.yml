 civic_scorched_earth: "Entropy Sovereigns"
 civic_scorched_earth_desc: "['concept_national_culture']\nThis civilization believes that the negentropic activities of life are the driving force behind the universe's destruction. They regard themselves as the true flame overlords of the galaxy, aspiring to an ideal universe only suitable for thermophilic life, while the weak will only hinder the realization of this vision."

 civic_world_forgers: "Stellar Forge Lords"
 civic_world_forgers_desc: "['concept_national_culture']\nThanks to the majestic surging volcanic magma, this civilization mastered the craft of alloy forging in the early stages of its development. The imagery of forges and magma has thus been deeply etched into the civilization's culture."

 civic_pyrolatry: "Fire Worship"
