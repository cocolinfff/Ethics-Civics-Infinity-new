 civic_eternal_victory: "Eternal Victory"
 civic_eternal_victory_desc: "['concept_religious_creed']\nVictory is simply not a rigid judgment of fame and substance, but rather a force by which we transcend the mundane. Lesser minds simply fail to comprehend our victory."
