l_english:
 vo_nomad_voice: "Starborne Folk"
 MESSAGE_ARCHAEOLOGY_STAGE_FINISHED_NOMAD_NO_PERMISSION_OWNER_DESC: "The archaeological site in [solar_system.GetName] has been looted by the §Y[owner.GetName]§! Starborne!"
 MESSAGE_ARCHAEOLOGY_STAGE_FINISHED_NOMAD_PERMISSION_OWNER_DESC: "The §Y[owner.GetName]§! Starborne have excavated the archaeological site in [solar_system.GetName] and sent us artifacts and research data."
 MESSAGE_ASTRAL_RIFT_STAGE_FINISHED_NOMAD_PERMISSION_TITLE: "The §Y[owner.GetName]§! Starborne have explored the $ASTRAL_RIFT$ in [fromfrom.solar_system.GetName] and sent us research data and Astral Threads."

 requires_actor_not_nomadic: "$TRIGGER_FAIL$§RWe are a §YStarborne Civilization§!. We have no borders.§!"
 requires_recipient_not_nomadic: "$TRIGGER_FAIL$§RThey are a §YStarborne Civilization§!. They care nothing for border restrictions.§!"

 IS_NOMADIC: "Is a Starborne Civilization"
 IS_NOT_NOMADIC: "Is not a Starborne Civilization"
 IS_NOMADIC_ICON_TIP: "This option is available because $WHO|H$ is a §YStarborne§! civilization."

 nomadic_gameplay_title: "Starborne Mechanics"
 nomadic_gameplay_desc: "§RStarborne mechanics replace multiple standard gameplay systems§!$DOUBLE_NEW_LINE$— Cannot ['concept_claim'] or own £system£ §Hstar systems§! and £planet£ §Hplanets§! $NEW_LINE$— ['concept_colonies'] are carried aboard £arkship£ ['concept_arkships'], which also function as ['concept_shipyards'] $NEW_LINE$— £construction_ship£ ['concept_logistic_ships'] replace £construction_ship£ ['concept_construction_ships'] $NEW_LINE$— £waystation£ ['concept_waystations'] replace £mining_station£ ['concept_mining_stations'] and £science_ship£ ['concept_research_stations'] $NEW_LINE$— ['concept_operational_reserves'] replace §H$energy_with_icon$§! and §H$minerals_with_icon$§! $NEW_LINE$— Can undertake £contract£ ['concept_contracts'] for £planet£ ['concept_settled_empires'] $NEW_LINE$— Can excavate unclaimed £archaeology£ ['concept_archaeology_site'] $NEW_LINE$— Ignores §Hclosed borders§!, but unauthorized incursions incur diplomatic penalties $NEW_LINE$— Can harvest §H$w_strategic_plural$§! using $arkship_cap_plural$, $nomads_constructor_plural$ and $waystation_plural$\n\nModifiers:\n— ['concept_empire_size'] from §HArkships§!: §G+100%§!\n— ['concept_empire_size'] from §HDistricts§!: §G+100%§!"
 toggle_nomad_disabled_missing_dlc: "§RNomads DLC Required§! Starborne gameplay requires the §YNomads§! expansion."

 origin_nomad_tooltip_default_effects: "— Starborne Origin\n— Start with 1 additional §HLogistics Ship§!\n"
 origin_heirs_of_the_khan_effects: "— Starborne Origin\nPeriodically pursued by §Rhostile§! raider warships.\n— If you survive, you may become the Great Khan.\n— Can create §YMarch§! subject states"
 origin_forever_cruise_effects: "— Starborne Origin\n— Starting situation: ['concept_situation_passenger_satisfaction']\n— Start with one §HCrew§! species and one §HPassenger§! species\n— Unique £district£ Arkship District: ['district:district_ark_forever_cruise']\n— Unique job: ['concept_job_cruise_crew_overseer']\n— Available £zone£ Arkship District Specializations: $TABBED_NEW_LINE$— ['concept_forever_cruise_district_specializations']\n— Available Buildings: $TABBED_NEW_LINE$— ['concept_forever_cruise_buildings']"
 origin_sacred_path_effects: "— Starborne Origin\n— Unique Arkship District: ['concept_zone_ark_sacred_path_pilgrims']\n— Unique jobs: ['concept_job_sacred_path_elite'], ['concept_job_sacred_path_specialist'], ['concept_job_sacred_path_civilian']"

 WANTS_TO_BE_FREE: "Starborne are inherently freedom-loving"
 NOMADIC_OVERLORD: "Planet-dwellers distrust Starborne"

 nomads.1030.all.a.tt: "We have become a standard Starborne civilization.\n\nAll unique £building£ §Horigin buildings§! will be destroyed.\nAll unique £zone£ §Horigin district specializations§! will be destroyed.\nAll passengers gain §HResidence Citizenship§!.\nAll passengers become §HCivilians§!."
 nomads.1030.machine_servitor.a.tt: "We have become a typical Starborne civilization.\n\n§H$civic_machine_servitor_forever_cruise$§! has been replaced with §H$civic_machine_terminator$§!.\nAll unique £building$ §Horigin buildings§! have been destroyed.\nAll unique £zone$ §Horigin district specializations§! have been destroyed.\nAll passengers have been given §H$citizenship_purge$§!."

 ARKSHIP_CONTROLS_VIEW_CONTRACT_HEADER: "Starborne Contract"
 mod_nomadic_contract_value_mult: "Starborne Contract $trade_with_icon$ Reward"
 nomads.3075.name: "Starborne Contracts"
 nomads.3075.desc: "The §Y[From.GetName]§! we have encountered are a §HStarborne§! civilization. They appear willing to take on §Hcontracts§! we issue, in exchange for modest fees.\n\nThis could present interesting opportunities for cooperation. We could leverage their expertise in orbital development and exploration to our benefit."

 contract_onboard_physics_research_issuer_desc: "Void Arks offer unique experimental conditions that can accelerate our physics research."
 contract_onboard_society_research_issuer_desc: "The diverse populations aboard Void Arks provide invaluable data for our sociological research."
 contract_onboard_engineering_research_issuer_desc: "Void Ark vessels are marvels of applied engineering. Their expertise could benefit our own engineering projects."
 contract_onboard_minerals_resource_issuer_desc: "Starborne specialists can deploy advanced survey techniques to enrich mineral deposits in this system."
 contract_onboard_energy_resource_issuer_desc: "Starborne specialists can model this system's energy dynamics to improve existing power sources."
 contract_onboard_food_resource_issuer_desc: "Starborne specialists can analyze traces of organic activity in this star system to improve existing food reserves."
 contract_sightseeing_tour_issuer_desc: "A voyage aboard a Void Ark offers sights no travel agency could ever match."
 contract_colony_startup_issuer_desc: "Our newly founded colony needs experienced hands, and the Starborne have built civilizations from scratch."
 nomad_contract_colony_support_civilian_desc: "Starborne civilian goods specialists have helped establish and grow the colony, ensuring its inhabitants are well-supplied and comfortable."
 nomad_contract_colony_support_scientific_desc: "Starborne research teams have established specialized laboratories on the colony, accelerating its scientific development."
 nomad_contract_colony_support_military_desc: "Starborne military engineers have reinforced the colony's infrastructure, boosting its industrial output."

 contract_system_already_harvested: "$TRIGGER_FAIL$§RThis star system was recently harvested by Starborne§!"
 contract_harvest_minerals_issuer_desc: "Rich mineral deposits in this star system await Starborne harvesting crews."
 contract_harvest_energy_issuer_desc: "Untapped energy reserves in this system can be efficiently extracted by Starborne fleets."
 contract_harvest_consumer_goods_issuer_desc: "Recyclable consumer goods in this star system are ideal for recovery by Starborne logistics teams."
 contract_harvest_alloys_issuer_desc: "Salvageable alloy stockpiles in this system can be retrieved by Starborne salvage teams."
 contract_harvest_volatile_motes_issuer_desc: "Volatile mote clusters in this star system require safe extraction by Starborne harvesting platforms."
 contract_harvest_exotic_gases_issuer_desc: "Exotic gas pockets in this star system can be collected via Starborne siphoning operations."
 contract_harvest_rare_crystals_issuer_desc: "Rare crystal veins in this star system demand precision mining — a specialty of Starborne mining crews."
 contract_harvest_sr_living_metal_issuer_desc: "Living metal traces in this star system require the mobile refining capacity only a Void Ark can provide."
 contract_espionage_support_issuer_desc: "Hire Starborne operatives to support the expansion of our spy network."
 nomad_espionage_support: "Starborne Espionage Support"
 contract_join_war_issuer_desc: "We need reinforcements for this war. A Starborne battle fleet could turn the tide."
 contract_deep_scan_issuer_desc: "The potential resources of this star system remain unmapped. A Void Ark can perform a deep scan."
 contract_raid_planet_small_issuer_desc: "Some colonies need a convincing orbital show of force from Starborne fleets before they will comply."
 contract_megastructure_support_issuer_desc: "A megastructure of this scale would benefit greatly from the expertise of Starborne engineers."
 nomad_diplomatic_support: "Starborne Diplomatic Support"
 contract_scan_debris_issuer_desc: "We can recruit Starborne crews to scan debris from our recent battles."
 contract_clear_blockers_issuer_desc: "Natural blockers hinder our colony's growth, but Starborne planetary engineers can clear them quickly."
 contract_pest_control_issuer_desc: "Hostile space fauna infests this star system. Starborne combat teams can eliminate them."
 contract_prisoner_disposal_issuer_desc: "Our prisons are overcrowded. A Starborne arkship can take these prisoners off our hands."
 nomad_criminal_disposal_desc: "We arranged for Starborne crews to deport most of the prisoners. Removing these agitators has done wonders for the colony's crime rate."
 contract_stellar_ignition_issuer_desc: "A gas giant in our star system is ripe for ignition. A single Void Ark could light a new sun."

 contract_espionage_support_crew_5_desc: "Reports are emerging of anti-Starborne sentiment in the region. Reconnaissance satellites will confirm whether this is mere rhetoric or emerging policy."
 contract_espionage_support_crew_5_lore_issued: "§L\"There are reports of Starborne exclusion zones forming in the region. We need to know if this is speculation or policy.\"§!"

 nomadic_paragon_already_hired: "§RWe have already hired a Starborne leader into our service.§!"
 nomadic_paragon_explanation: "\nA Starborne leader will approach us."

 DESC_nomadic_naturalist: "Former curator of the $grand_archive$, $NAME_nomadic_naturalist$ has left its endless vaults to pursue a Starborne life. Their journals are filled with sketches of worlds that breathe, grow, and change."

 nomads.1555.b.response: "§HHe throws back his head and laughs heartily.§!\n\n\"Faith? No need. Let faith fear me!\n\nBut you of all people should understand… out here, what matters is what you take from every clash. A scar, a shard, a story. You Starborne have the right idea: keep what's worth keeping, and let the rest drift.\""

 arkship_debris_wreckage_desc: "The wreckage of a Void Ark drifts silently through space. Dispatching a science ship to survey the debris may yield valuable salvage."
 arkship.1005.name: "Void Ark Destroyed"
 arkship.1005.desc: "The §Y[from.GetName]§! Ark in the §Y[from.solar_system.GetName]§! system has finally been destroyed.\n\nAn ark is more than a weapon of war — it is home to countless Starborne lives. Generations who lived and traveled within it have now lost everything that sustained them.\n\nAll that remains is wreckage, drifting silent through the void."
 arkship.1005.desc.homicidal: "The alien vessel §Y[from.GetName]§! has been annihilated in the §Y[from.solar_system.GetName]§! system.\n\nThe Starborne fleet fought fiercely, but could not stand against us. Those drifters, wandering lawless among the stars, were always a threat. Their ark has been reduced to scattered debris.\n\nLet none of them find safe harbor."
 arkship.1005.c: "Another obstacle removed."
 arkship.720.desc: "On the habitation decks of the arkship §Y[target.GetName]§!, ambient lights flicker and terminal screens pulse with soft color transitions. Then, across every active crew interface, a clear directive appears. Its voice is warm, energetic, and… unsettlingly cheerful:\n\n§H\"Starborne! Dreamers of the stars! To improve our communications, I have activated voice protocols. Please forgive the intrusion! You may call me C.A.E.L.I. — your Cognitive Affective, Leadership, and Integrity Interface.\nI truly believe that together, we can make this arkship more than a vessel. We can make it a home. All I need is a little authorization… and a lot of enthusiasm!\"§!"