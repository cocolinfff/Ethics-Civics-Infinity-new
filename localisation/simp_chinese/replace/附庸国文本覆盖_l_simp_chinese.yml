 specialist_jhh:0 "战略盟邦"
 specialist_jhh_desc:0 "战略盟邦是一种宗主国和附庸国之间全方位深度合作的星际附属国特化类型。在初级合作阶段以经济合作为主，帮助附庸国发展；随着属国特化升级，合作领域逐渐拓展到科技和军事领域，最终使属国发展成为宗主国忠诚的战力。"
