 holding_jhh_building_1:0 "驻附庸军事基地"
 jhh_subject_building_modifier:0 "$holding_jhh_building_1$"
 jhh_subject_building_modifier_desc:0 "宗主国驻附庸国军事基地，也可以称为附庸国的高级军事学校。双方在此签订了高级军事合作协议，故需要双方消耗一定影响力维护，但比起庞大的军事加成，这显然是值得的。"
 mod_jhh_on_building_modifier:0 "§K驻附庸军事基地§!的加成等级"
 mod_jhh_on_building_modifier_desc:0 "$jhh_subject_building_modifier_desc$"
 holding_jhh_building_1_modifier_desc:0 "当这个行星上驻扎至少五支来自宗主国的陆军时，将给予附庸国额外的§G+50%§!舰船建造速度、§G+500§!海军容量以及§G+1§!$r_loyalty$，每额外驻扎5支军队时这个加成将会翻倍，当驻扎20支军队时最大加成可达到§G+400%§!舰船建造速度、§G+4000§!海军容量以及§G+8§!$r_loyalty$。"
 holding_jhh_building_1_desc:0 "$holding_jhh_building_1_modifier_desc$"
 holding_jhh_building_2:0 "稀有资源生产指导中心"
 holding_jhh_building_2_desc:0 "宗主国向附庸国进行稀有资源生产指导的建筑，该建筑会提高附庸国的岗位效率，同时为宗主国提供稀有资源产出，适合发展程度较高的附庸国使用"
