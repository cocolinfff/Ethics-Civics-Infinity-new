 nomads.1030.all.a.tt: "我们已转变为一个普通的星舰文明。\n\n所有专属£building£ §H起源建筑§!将被摧毁。\n所有专属£zone£ §H起源区划特化§!将被摧毁。\n所有旅客变更为§H居留公民权§!。\n所有旅客转变为§H平民§!。"
 nomads.1030.machine_servitor.a.tt: "我们已经成为了一个典型的星舰文明。\n\n§H$civic_machine_servitor_forever_cruise$§!被替换为§H$civic_machine_terminator$§!。\n所有独特的£building£§H起源建筑§!均被摧毁。\n所有独特的£zone£§H起源区划专精§!均被摧毁。\n所有乘客均变为§H$citizenship_purge$§!。"


 #Contract Tutorialization
 ARKSHIP_CONTROLS_VIEW_CONTRACT_HEADER: "星舰合约"
 mod_nomadic_contract_value_mult: "星舰合约$trade_with_icon$奖励"
 nomads.3075.name: "星舰合约"
 nomads.3075.desc: "我们遇到的§Y[From.GetName]§!是一个§H星舰§!文明。他们似乎愿意承担我们发布的§H合约§!工作，以换取微薄的费用。\n\n这可能为我们之间的协作提供有趣的契机，我们可以利用他们在轨道开发和探索方面的专业知识来为我们谋利。"
 contract_onboard_physics_research_issuer_desc: "虚空方舟拥有独特的实验条件，能够加速我们的物理学研究。"
 contract_onboard_society_research_issuer_desc: "虚空方舟舰上多样化的人口可以为我们的社会研究提供宝贵的数据。"
 contract_onboard_engineering_research_issuer_desc: "虚空方舟舰是应用工程学的奇迹。他们的专业知识能使我们自己的工程项目受益。"
 contract_onboard_minerals_resource_issuer_desc: "星舰文明的专家可以应用先进的勘探技术来丰富该星系的矿藏。"
 contract_onboard_energy_resource_issuer_desc: "星舰文明的专家可以模拟该系统的能量动态，以改进现有能量来源。"
 contract_onboard_food_resource_issuer_desc: "星舰文明的专家可以分析该恒星系中的有机体活动痕迹，以改善现有的食物储备。"
 contract_sightseeing_tour_issuer_desc: "登上虚空方舟舰的旅行，将带来任何旅行社都无法媲美的奇观。"
 contract_colony_startup_issuer_desc: "我们新设立的殖民地需要经验丰富的人手，而星舰居民族曾从无到有地建立起文明。"
 nomad_contract_colony_support_civilian_desc: "星舰文明的民用品专家们已协助建立了殖民地并使其繁荣发展，确保了星球居民补给充足且生活舒适。"
 nomad_contract_colony_support_scientific_desc: "星舰文明的研究小组已在殖民地建立了专业实验室，加速了其科学发展。"
 nomad_contract_colony_support_military_desc: "星舰文明的军事工程师加固了殖民地的基础设施，提升了其工业产出。"

 contract_system_already_harvested: "$TRIGGER_FAIL$§R该恒星系近期已被星舰居民收获§!"
 contract_harvest_minerals_issuer_desc: "该恒星系中丰富的矿藏等待着星舰居民采集工前来开采。"
 contract_harvest_energy_issuer_desc: "该星系中未开发的能源储备可以由星舰文明的舰队来高效抽取。"
 contract_harvest_consumer_goods_issuer_desc: "该恒星系中的可回收消费品非常适合由星舰物流团队进行回收。"
 contract_harvest_alloys_issuer_desc: "这个星系中可回收的合金储藏可以由星舰打捞队提取。"
 contract_harvest_volatile_motes_issuer_desc: "该恒星系中的易爆微粒聚集点需要由星舰采集平台进行安全开采。"
 contract_harvest_exotic_gases_issuer_desc: "该恒星系中的异星天然气穴可以通过星舰居民的虹吸作业进行采集。"
 contract_harvest_rare_crystals_issuer_desc: "该恒星系中的稀有水晶矿脉需要精密开采，而这正是星舰采矿队所擅长的。"
 contract_harvest_sr_living_metal_issuer_desc: "该恒星系中的活体金属矿痕需要虚空方舟舰所能提供的移动精炼能力方能开采。"
 contract_espionage_support_issuer_desc: "雇佣星舰居民以支持我们间谍网络的扩张。"
 nomad_espionage_support: "星舰情报援助"
 contract_join_war_issuer_desc: "我们的战争需要增援。需要一支星舰居民战斗舰队来扭转战局。"
 contract_deep_scan_issuer_desc: "这个恒星系的潜在资源尚未探明。虚空方舟舰可以对其进行深度扫描。"
 contract_raid_planet_small_issuer_desc: "某些殖民地需要星舰文明的舰队从轨道进行强有力的说服才愿意服软。"
 contract_megastructure_support_issuer_desc: "这种规模的巨型结构将极大地受益于星舰工程师的专业知识。"
 nomad_diplomatic_support: "星舰外交援助"
 contract_scan_debris_issuer_desc: "我们可以征集一些星舰居民来扫描我们最近战斗后留下的残骸。"
 contract_clear_blockers_issuer_desc: "自然障碍限制了我们殖民地的发展，但星舰行星工程师能迅速将其清除。"
 contract_pest_control_issuer_desc: "敌对的太空兽群盘踞在这个恒星系，需要星舰战斗小队来清除它们。"
 contract_prisoner_disposal_issuer_desc: "我们的监狱人满为患，需要一艘星舰居民的方舟舰替我们接手这些囚犯。"
 nomad_criminal_disposal_desc: "我们安排了星舰居民遣送大部分囚犯。移除这些骚乱分子对平息本殖民地的犯罪率起到了奇效。"
 contract_stellar_ignition_issuer_desc: "我们恒星系中的一颗气态巨行星点燃时机已然成熟，一艘虚空方舟便可点亮一颗新的太阳。"
 
 contract_espionage_support_crew_5_desc: "该地区出现了反星舰情绪的相关报道。侦察卫星将确认这一局势仅仅是空谈，还是正在成为当地的政策。"
 contract_espionage_support_crew_5_lore_issued: "§L“有报告称该地区正在形成星舰居民禁区。我们需要知道这究竟是猜测还是政策。”§!"


 nomadic_paragon_already_hired: "§R我们已经雇佣了一位星舰领袖为我方效力。§!"
 nomadic_paragon_explanation: "\n一位星舰领袖将会与我们接洽。"
 
 DESC_nomadic_naturalist: "曾任$grand_archive$的策展人$NAME_nomadic_naturalist$离开了那无尽的库房，转而追求星舰生活。他的日志中绘满了关于那些呼吸、生长与演变的星球的素描。"
 nomads.1555.b.response: "§H他仰头爽朗地大笑起来。§!\n\n“信仰？没必要。该是战斗信仰我！\n\n“但是你应该比绝大多数人都懂这个道理……在这里，关键在于你从每一场冲突中带走了什么。一道伤疤、一块碎片、一个故事。你们星舰居民的想法就很对：留下值得留下的，其余的随它去吧。”"
 arkship_debris_wreckage_desc: "一艘虚空方舟飞船的残骸在太空中悄然漂流。派遣一艘科学飞船勘测残骸可能会获得有价值的打捞品。"
 arkship.1005.name: "虚空方舟被毁"
 arkship.1005.desc: "§Y[from.solar_system.GetName]§!星系中的§Y[from.GetName]§!方舟终于被摧毁了。\n\n方舟不仅仅是一个战争的器具，它还是无数星舰生命体的家园。曾经生活和旅行于其中的几代人现在失去了维系他们的基础。\n\n剩下的只有残骸，在虚空中悄无声息地漂流。"
 arkship.1005.desc.homicidal: "异星舰船§Y[from.GetName]§!已在§Y[from.solar_system.GetName]§!星系被歼灭。\n\n星舰文明的舰队进行了激烈抵抗，但终究不敌我方。那些在群星之间无序漂泊的流浪者始终是个威胁。他们的方舟舰已化作四散的残骸。\n\n不要让他们任何一人找到安全港。"
 arkship.1005.c: "又一个障碍被清除了。"
 arkship.720.desc: "在方舟舰§Y[target.GetName]§!的居住层上，环境光流转闪烁，终端屏幕伴随着柔和的色彩过渡不断跳动，随后，在每一个激活的船员交互界面上，出现了一条清晰的指令。它的声音温暖、富有活力，而且……愉快得令人不安：\n\n§H“星舰居民们！星空的追梦者们！为了让我们更好地交流，我已启用语音协议。请原谅我的冒昧打扰！你们可以称呼我为C.A.E.L.I.，即你们的‘情感、领导和品格认知代理程序’。\n我由衷相信，只要齐心协力，我们就能让方舟舰不仅仅是一艘飞船。我们可以把它变成一个家。我只需要一点点授权……以及一些热情！”§!"