 MESSAGE_ASTRAL_RIFT_STAGE_FINISHED_NOMAD_PERMISSION_TITLE: "§Y[owner.GetName]§!星舰居民已经探索了位于[fromfrom.solar_system.GetName]的$ASTRAL_RIFT$，并向我们发送了研究数据和星界丝缕。"
 
