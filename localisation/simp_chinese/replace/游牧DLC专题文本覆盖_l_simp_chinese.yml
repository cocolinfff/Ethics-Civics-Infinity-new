 nomadic_gameplay_title: "星舰机制"
 nomadic_gameplay_desc: "§R星舰机制将替代多种游戏机制§!$DOUBLE_NEW_LINE$—无法['concept_claim']或拥有£system£ §H恒星系§!与£planet£ §H行星§! $NEW_LINE$—['concept_colonies']由£arkship£ ['concept_arkships']搭载，后者同时也起到了['concept_shipyards']的作用 $NEW_LINE$—£construction_ship£ ['concept_logistic_ships']替代了£construction_ship£ ['concept_construction_ships'] $NEW_LINE$—£waystation£ ['concept_waystations']替代了£mining_station£ ['concept_mining_stations']与£science_ship£ ['concept_research_stations'] $NEW_LINE$—['concept_operational_reserves']替代了§H$energy_with_icon$§!与§H$minerals_with_icon$§! $NEW_LINE$—可以为£planet£ ['concept_settled_empires']执行£contract£ ['concept_contracts'] $NEW_LINE$—可以发掘无主的£archaeology£ ['concept_archaeology_site',考古遗址] $NEW_LINE$—无视§H关闭边界§!，但擅闯行径会导致外交惩罚 $NEW_LINE$—可以使用$arkship_cap_plural$、$nomads_constructor_plural$与$waystation_plural$开采§H$w_strategic_plural$§!\n\n修正：\n—§H方舟舰§!产生的['concept_empire_size']：§G+100%§!\n—§H区划§!产生的['concept_empire_size']：§G+100%§!"
 toggle_nomad_disabled_missing_dlc: "§R缺失 Nomads DLC§!星舰玩法需要§YNomads§!扩展包。"


 origin_nomad_tooltip_default_effects: "—星舰起源\n—开局额外拥有一艘§H后勤船§!\n"
 origin_heirs_of_the_khan_effects: "—星舰起源\n定期被§R敌对§!的掠夺者战舰追击。\n—如果幸存，可以成为可汗。\n—可以创建§Y辖地§!附属国"
 origin_forever_cruise_effects: "—星舰起源\n—开局局势：['concept_situation_passenger_satisfaction']\n—开局拥有一个§H船员§!和一个§H旅客§!物种\n—专属£district£ 方舟舰区划：['district:district_ark_forever_cruise']\n—专属岗位：['concept_job_cruise_crew_overseer']\n—可用£zone£ 方舟舰区划特化：$TABBED_NEW_LINE$—['concept_forever_cruise_district_specializations']\n—可用建筑：$TABBED_NEW_LINE$—['concept_forever_cruise_buildings']"
 origin_sacred_path_effects: "—星舰起源\n—专属方舟舰区划：['concept_zone_ark_sacred_path_pilgrims']\n—专属岗位：['concept_job_sacred_path_elite']，['concept_job_sacred_path_specialist']，['concept_job_sacred_path_civilian']"


