 eoe_menu.56.desc:0 "§R这将永久清除所有编年史里程碑标志、路径选择与轴分数。§!\n\n你的选项设置将被保留。此操作不可撤销。"
 eoe_menu.56.opt.confirm:0 "§R确认 - 清除所有编年史数据§!"
 eoe_menu.56.opt.cancel:0 "取消"

 eoe_menu.57.title:0 "编年史重置完成"
 eoe_menu.57.desc:0 "所有编年史里程碑标志与轴分数已清除。你的选项设置未变。\n\n编年史重新开始。"
 eoe_menu.57.opt.done:0 "明白"

 # ── 十字路口：飞升 ────────────────────────────────────────────────
 eoe_crossroads.10.title:0 "门槛时刻"
 eoe_crossroads.10.desc:0 "首个飞升天赋已被选择。孤立地看，这是件小事——在议政厅中做出的决定，悄无声息地批准，毫无仪式地记录在编年史中。\n\n但有朝一日，你的史学家们会争论，这一刻正是你帝国转变之时。问题不在于你选择了什么。问题在于为何如此。"
 eoe_crossroads.10.opt_a:0 "我们飞升。此乃天性——我们生而不凡。"
 eoe_crossroads.10.opt_a.tt:0 "超越之道。研究速度+5%，飞升天赋槽位+1。"
 eoe_crossroads.10.opt_b:0 "我们飞升，因其实用。力量是工具。"
 eoe_crossroads.10.opt_b.tt:0 "务实飞升。影响力+5%，舒适度消耗-5%。"
 eoe_crossroads.10.opt_c:0 "我们审慎飞升。骄者必遭天谴。"
 eoe_crossroads.10.opt_c.tt:0 "克制之道。人口增长速度+5%，稳定度+3。"

 eoe_crossroads.11.title:0 "超越之道"
 eoe_crossroads.11.desc:0 "你的学者们已记录了这份决定及其缘由。指引你们踏出超越凡常界限第一步的哲学框架，将塑造你的人民对后续每一步的理解。\n\n你不仅仅选择了一个天赋。你选择了一种身份。"

 eoe_crossroads.12.title:0 "务实飞升"
 eoe_crossroads.12.desc:0 "务实观点有其明晰之处。力量服务于目的；目的为手段正名。你的顾问们赞许地注意到了这一做法——他们说，将飞升视为优势而非超越，正是一个成熟文明的标志。\n\n历史将裁决他们是否正确。"

 eoe_crossroads.13.title:0 "克制之道"
 eoe_crossroads.13.desc:0 "银河中满是前进过快的文明。你的人民深知这一点。你的帝国为其飞升所选择的审慎、有度的步伐并非怯懦——这是那些读过足够历史，明白鲁莽者通常结局如何之人的智慧。\n\n至少现在，你已选择不鲁莽行事。"

 # ── 十字路口：胜利 ──────────────────────────────────────────────────
 eoe_crossroads.20.title:0 "胜利之重"
 eoe_crossroads.20.desc:0 "最后一支舰队已撤离。和平条款已被口述。你的首场战争结束，且你赢得了它。\n\n败者任你处置。你是何种胜利者将被铭记——被他们，被他们的后裔，被每一个从安全距离旁观和议进程的帝国所铭记。"
 eoe_crossroads.20.opt_a:0 "我们展现仁慈。败者乃未来邻邦。"
 eoe_crossroads.20.opt_a.tt:0 "仁慈的征服者。外交权重+5%，影响力+10%。约200年后将触发一项遗产回响。"
 eoe_crossroads.20.opt_b:0 "我们巩固优势。胜利必须被夯实。"
 eoe_crossroads.20.opt_b.tt:0 "铁腕霸主。射速+5%，厌战度-10%。"
 eoe_crossroads.20.opt_c:0 "我们缔造和平。这场战争本不该是必要的。"
 eoe_crossroads.20.opt_c.tt:0 "无奈的胜利者。厌战度-15%，人口幸福度+3%。"

 eoe_crossroads.21.title:0 "仁慈的征服者"
 eoe_crossroads.21.desc:0 "条款非常慷慨。你的顾问们曾反对——资源留在了桌上，影响力拱手相让，敌人被允许舔舐伤口并重建。\n\n但银河中有人注意到了。事实证明，仁慈自有其外交分量。这份分量在二百年后是否还重要，仍有待观察。"

 eoe_crossroads.22.title:0 "铁腕霸主"
 eoe_crossroads.22.desc:0 "和约毫无含糊之处。败者对新秩序的形态不再存有疑问。你的军事顾问们满意了。你的外交官们暗自忧虑。\n\n恰当运用的力量，往往会令未来的挑战者们望而却步。至少理论上是如此。"

 eoe_crossroads.23.title:0 "无奈的胜利者"
 eoe_crossroads.23.desc:0 "战争结束了。编年史会将其记录为一场胜利，尽管你的领导层并不觉得自己是胜利者。他们感觉自己像是经历了某种他们但愿并非必要之事的人。\n\n或许那份清醒——对代价的不适——将使你的帝国在未来冲突中变得更明智。或许它只会让它变得更犹豫。时间会给出答案。"

 # ── 十字路口：巨构 ────────────────────────────────────────────
 eoe_crossroads.30.title:0 "建筑师之问"
 eoe_crossroads.30.desc:0 "巨构已竣工。一件将比你帝国内每一个在世之人、每一届现任政府，甚至可能比你文明本身更长久的东西，现在因你选择建造它而存在了。\n\n你的工程师们正在庆祝。你的哲学家们正在追问那个总是伴随最大野心之举而来的问题：我们建造了它，这说明了我们的什么？"
 eoe_crossroads.30.opt_a:0 "这说明我们是建造者。这是众多中的第一个。"
 eoe_crossroads.30.opt_a.tt:0 "永恒建筑师。巨构建造速度+10%，矿物收入+5%。"
 eoe_crossroads.30.opt_b:0 "这说明我们务实。它服务于一个目的。"
 eoe_crossroads.30.opt_b.tt:0 "务实雄心。能量币收入+5%，贸易额+5%。"
 eoe_crossroads.30.opt_c:0 "这说明我们凡俗且雄心勃勃。务须心怀谦恭。"
 eoe_crossroads.30.opt_c.tt:0 "勉强的建造者。影响力收入+10%，稳定度+2。"

 eoe_crossroads.31.title:0 "永恒建筑师"
 eoe_crossroads.31.desc:0 "宣言已经做出。你的帝国已公开地、哲学上地、工业上地投身于巨型尺度。建造场已开始为下一个项目进行初步勘测。\n\n你不仅仅是建造了一座巨构。你已成为了建造巨构的那种文明。这一区别很重要。"

 eoe_crossroads.32.title:0 "务实雄心"
 eoe_crossroads.32.desc:0 "工程师们已提交了竣工报告。经济学家们模拟了产出预测。哲学家们提出了他们的问题，并被礼貌地告知，该结构每月产出847单位能量币，这才是真正相关的指标。\n\n在某处，一位史学家正在撰写一个脚注，关于一个以能量币衡量其最伟大成就的帝国。这不是一个恭维的脚注。你的帝国不在乎。"

 eoe_crossroads.33.title:0 "勉强的建造者"
 eoe_crossroads.33.desc:0 "最终的代价清单已编制：资源，岁月，机会成本，所耗费的政治资本。你的领导层阅读了报告，并与之相伴了许久。\n\n此结构壮丽非凡。所付代价极为高昂。此两者皆为真实。你的帝国决定同时持守这两个真相，而不是将其消解为一个舒适的叙事。你的哲学家们指出，这本身就是一种智慧。"

 # ── 共享 ──────────────────────────────────────────────────────────────
 eoe_crossroads.opt.noted:0 "已知悉。编年史载录此事。"

 # __ 修正名称与描述 __________________________________________

 eoe_mod_ascension_transcendent:0 "超越之道"
 eoe_mod_ascension_transcendent_desc:0 "你的帝国已将飞升命名为其文明天召。研究加速，且一个额外的飞升天赋槽位开启。"

 eoe_mod_ascension_pragmatic:0 "务实飞升"
 eoe_mod_ascension_pragmatic_desc:0 "你的帝国将飞升视为手段而非终点。影响力产出增加，且你的人民较少提出令人不适的问题。"

 eoe_mod_ascension_restrained:0 "克制之道"
 eoe_mod_ascension_restrained_desc:0 "你的帝国审慎飞升，每一步都对照着被抛在身后的东西加以衡量。人口稳定增长，且稳定度保持稳固。"

 eoe_mod_victory_merciful:0 "仁慈的征服者"
 eoe_mod_victory_merciful_desc:0 "你的首场胜利后继以仁慈。外交权重增加，且影响力从一个以施予仁慈著称的帝国更顺畅地流出。"

 eoe_mod_victory_hegemon:0 "铁腕霸主"
 eoe_mod_victory_hegemon_desc:0 "你的首场胜利后继以巩固。舰队运作更精准，且厌战度积累更慢。"

 eoe_mod_victory_reluctant:0 "无奈的胜利者"
 eoe_mod_victory_reluctant_desc:0 "你的首场胜利所耗超出预期。厌战度积累更慢，且你的人民在随后的和平中找到了平静的满足。"

 eoe_mod_mega_architects:0 "永恒建筑师"
 eoe_mod_mega_architects_desc:0 "你的帝国投身于巨型尺度。巨构建造加速，且矿物物流相应改善。"

 eoe_mod_mega_practical:0 "务实雄心"
 eoe_mod_mega_practical_desc:0 "你的帝国因回报足以值得投资而建造了此巨构。能量币产出与贸易额增加。"

 eoe_mod_mega_reluctant:0 "勉强的建造者"
 eoe_mod_mega_reluctant_desc:0 "你的帝国建造了此巨构，并诚实地计算了代价。影响力从所汲取的教训中累积，且稳定度因帝国理解雄心真正所需而保持。"

