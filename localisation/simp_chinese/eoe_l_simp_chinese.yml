 # __ 渗透：共享 ________________________________________________
 eoe_bleed.opt.noted:0 "已知悉。银河并非寂静之地。"
 eoe_bleed.opt.noted.tt:0 "此信息已记录于编年史中。"

 # __ 渗透：雄心 ______________________________________________
 eoe_bleed.1.title:0 "征服者们"
 eoe_bleed.1.desc:0 "有一种雄心，不会在该停的时候停下。你的分析师们已监测银河中某个主要强权一段时间了，而他们现在所观察到的，并非一个已达成目标的帝国。\n\n而是一个发现自己根本没有目标的帝国。战役在继续。扩张在继续。在某个节点——你的战略家们不确定是何时——这已变得不再像是一种政策，而更像是一种天性。\n\nThe Chronicle has flagged this. 一个没有天然极限的帝国，是一个值得关注的帝国。"
 eoe_bleed.2.title:0 "支配的建筑学"
 eoe_bleed.2.desc:0 "你的情报部门已编制了一份关于某个重要区域强权的报告。所浮现出的图景，并非一个为领土而战的帝国。而是一个为定义其他势力存在的条件而战的帝国。\n\n这一区别并非学术性的。一个想要土地的帝国可以被满足。一个想成为定义区域秩序之帝国的帝国则不能。编年史指出，此文明现已，以任何合理标准衡量，在他们所处的银河角落达到了此地位。\n\n他们接下来会如何利用它，才是问题所在。"

 # __ 渗透：智慧 ________________________________________________
 eoe_bleed.3.title:0 "漫长的飞升"
 eoe_bleed.3.desc:0 "你的学者们追踪一个遥远文明的研究与哲学产出已有数十年。他们所识别出的模式非同寻常：此帝国的飞升不是作为一个项目，不是作为一项政策，而是作为一种天职。\n\n编年史的评估是，他们现已达成了某种你自己的文明会从内部认出的东西：那个追求更强能力成为社会核心组织原则的点。不是通向目的的手段。而是目的本身。\n\n你的哲学家们对此有看法。编年史记录下它们而不作裁断。"
 eoe_bleed.4.title:0 "一个心灵的文明"
 eoe_bleed.4.desc:0 "编年史已标记了某个遥远帝国中的一项发展，你的顾问们认为其要么令人钦佩，要么令人担忧，取决于你问的是哪位顾问。\n\n此文明已达到其飞升计划浸透其文化的地步。他们的研究产出已改变了性质：更抽象，更自我指涉，短期看明显不那么有用。你的经济学家称之为颓废。你的科学家称之为先进。\n\n编年史记录下两种描述，并拒绝在它们之间做出选择。"

 # __ 渗透：遗产 ________________________________________________
 eoe_bleed.5.title:0 "他们所建造的"
 eoe_bleed.5.desc:0 "在一个遥远星系中，有一座一个世纪前不在那里的巨构。现在那里还有第二座，以及第三座，而一个遥远帝国的建造场毫无停歇的迹象。\n\n你的工程师们已计算了数字。要产出此文明所产出的所需资源投入，以任何合理标准衡量，都非同寻常。你的经济学家们不断追问的问题的是：它从哪来的？你的工程师们不断追问的问题的是：他们怎么建得这么快？\n\n编年史记录下这些结构。问题仍然敞开。"
 eoe_bleed.6.title:0 "永久的印记"
 eoe_bleed.6.desc:0 "银河彼端的一个帝国一直在建造东西。你的分析师们知晓此事已有一段时间。他们直到最近才确认的是规模。\n\n此文明现已以一种不再是计划的方式投身于巨型建造。这是一种身份。银河将因他们所建造的而看起来不同。不是因为结构可见——它们可能从你所在的银河角落并不可见——而是因为建造它们的资源将无法用于其他目的。\n\n编年史将此记为一种最高等级的文明承诺。至于是否明智，是留给那些比它们更长久之帝国的问题。"

 # __ 渗透：影响力 _____________________________________________
 eoe_bleed.7.title:0 "关系的分量"
 eoe_bleed.7.desc:0 "你的外交官们有时说，力量不仅在于你能做什么。更在于别人会为你做什么。\n\n以此衡量，一个遥远的帝国已变得确实非常强大。你的情报部门已编录了它们的附庸、伙伴与客户网络。所浮现的图景，是一个花了数十年时间不是去征服，而是去安排——将外交版图变成一面能向他们反射其利益的镜子——的文明。\n\n编年史将此记为一种容易被低估、难以被拆解的文明成就。这些安排本身就是力量。"
 eoe_bleed.8.title:0 "静默的扩张"
 eoe_bleed.8.desc:0 "你的分析师们标记了某件事，如果你只看错误的指标，这件事很容易被忽略。\n\n一个遥远的帝国在过去几十年中，其领土或舰队实力并未特别增长。增长的是，通过某种机制或另一种机制，已进入其势力范围存在的较小强权的数量。附庸、客户、结盟的伙伴。这些不会出现在地图上，但会重构该区域每个人可用的实际选项的那种关系。\n\n编年史将此标记为规模化的影响力。比征服更难看见。往往更持久。"

