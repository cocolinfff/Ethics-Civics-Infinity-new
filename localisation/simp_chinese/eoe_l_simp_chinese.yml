 # ── eoe_dlc.87 - 星海天罚（涅墨西斯 DLC） ─────────────────────
 # 为与其他灾殃逻辑分组，从 v2.0 块移至此。
 # （标题/描述键已在上面 L1331 处定义——此处仅添加节
 # 标题以供参考；无重复键。）

 # ── eoe_dlc.88 - 宇宙创生宣言（机械时代 DLC） ─────
 eoe_dlc.88.title:0 "编年史：终结的建筑学"
 eoe_dlc.88.desc:0 "决定已做出。你的帝国已投身于宇宙创生——不是在寻常意义上毁灭银河，而是取代它。飞升天赋已被选取。道路现已固定。在你的史学家们将标记为文明史上最重要日期的某个时刻，这个宇宙将终结，另一个将开始，按照你的帝国已确定的规格建造。\n\n编年史以不寻常的困难记录下此点。大多数里程碑有类似之事。这一个没有。星海天罚至少仍留在现存秩序之内——它变成了当前银河所容纳的最坏之物。宇宙创生完全走出了秩序之外。它不想统治银河。它已判定银河是一个草稿。\n\n你的史学家们指出，抵达这一节点的先前文明，通常没有考虑谁（如果真有的话）会在这一转变中幸存的问题。编年史记录道，你的帝国也尚未公开处理此问题。这反映了自信、疏忽，还是对此事的一个深思熟虑的立场，编年史不做推测。\n\n道路已选取。建筑学已开启。"

 # ── eoe_dlc.89 - 巨兽之怒（创生 DLC） ─────────────────────────
 eoe_dlc.89.title:0 "编年史：饥饿信条"
 eoe_dlc.89.desc:0 "决定已做出。你的帝国已投身于巨兽之道——蓄意繁殖并部署活体世界级掠食者，作为文明政策的工具。飞升天赋已被选取。首批巨兽将会到来。\n\n编年史以一种它保留给武器与政策之间区别完全崩溃的时刻的特定注意力，记录下此点。一头巨兽不是以部署一支舰队的方式被部署的。它是被释放的。建造巨像的文明决定毁灭一个世界。繁殖并释放巨兽的文明，决定让食欲成为其外交政策的统摄原则。\n\n你的史学家们已开始了以帝国人口能接受的措辞框定此决定的工作。几种框定正在被测试：对更高级生命形式的管理，自然秩序通过你的指引彰显自身，被蓄意为之的进化必然性。编年史记录下这些框定的存在，并拒绝评估其准确性。\n\n天赋已被选取。巨兽正在到来。饥饿信条，现在是你的帝国在银河为何而存在这一问题上的官方立场：供以掠食。"

 # ── eoe_dlc.90 - 银河热寂（地狱物种包 DLC） ──────
 eoe_dlc.90.title:0 "编年史：最终温度"
 eoe_dlc.90.desc:0 "决定已做出。你的帝国已投身于银河热寂——将银河温度递增并系统性地提升至与当前存在的大多数生命形式不相容的水平。飞升天赋已被选取。过程已经开始。\n\n编年史指出，这以一种值得记录的方式有别于其他灾殃路径。星海天罚宣战。宇宙创生替换银河。巨兽之怒释放食欲。热寂做的是某种更安静、在某些方面更绝对的事：它改变条件。银河并非戏剧性地终结。它变得不宜居住。在你的帝国正运作的尺度上，战争与环境政策之间的区别已不再有意义。\n\n在此选择中蕴含着一份编年史觉得独特的自信。帝国并非对银河感到愤怒。它并未在任何常规意义上宣告银河的其他居民为敌人。它只是决定了，正确的银河终端温度，是你的帝国感到舒适的那种，而其他物种的舒适往好里说，也只是次要考量。\n\n天赋已被选取。温度正在上升。编年史记录下日期。"

 # ── eoe_init.3 - 存档中途引入启幕 ───────────────────────────
 eoe_init.3.title:0 "编年史"
 eoe_init.3.desc:0 "帝国编年史已开启。\n\n编年史观望着。它记录你的帝国所做的选择——不是结果，而是选择，以及那些选择关于你正在建造何种文明所讲述的。大多数 Stellaris 系统奖赏你成就了什么。编年史更感兴趣的是如何成就的。\n\n五条文明轴线——雄心、智慧、遗产、影响力与飞升——跨三个层级追踪你帝国的品格。五条十字路口链在主要里程碑处触发，并要求你的帝国决定那些时刻意味着什么：你的首个飞升天赋，首场赢得的战争，首座巨构，首次接触，以及迈向超凡的第一步。每个选择是永久的，每条链运行一个完整的250年弧线，而每条弧线以编年史对你所建造之物的闭合评估结束。\n\n37个DLC里程碑跨越所有主要扩展被追踪。当相关DLC缺失时，所有里程碑均安全地保持惰性。\n\n随时通过你首都的帝国编年史决议进入编年史。若任何十字路口链的条件在安装前已被满足，使用调试 > 强制里程碑检查来赶上。\n\n你的帝国接下来做什么，便是记录。"

 # -- eoe_init.3 修正开关选项 --
 eoe_init.3.opt.begin:0 "编年史开启。"
 eoe_init.3.opt.begin.tt:0 "十字路口选择将应用永久性被动修正。这些对所有路径均可用，且没有哪条路径在机制上是绝对主导的。"
 eoe_init.3.opt.no_modifiers:0 "编年史开启。（仅叙事）"
 eoe_init.3.opt.no_modifiers.tt:0 "十字路口选择将不应用修正。纯叙事模式——编年史观察并记录，而无机制性效果。选择后无法更改。"

 # ── 叙事模式工具提示变体 (eoe_no_modifiers) ─────────────────
 eoe_crossroads.10.opt_a_nomod.tt:0 "超越之道。"
 eoe_crossroads.10.opt_b_nomod.tt:0 "务实飞升。"
 eoe_crossroads.10.opt_c_nomod.tt:0 "克制之道。"
 eoe_crossroads.20.opt_a_nomod.tt:0 "仁慈的征服者。约200年后将触发一项遗产回响。"
 eoe_crossroads.20.opt_b_nomod.tt:0 "铁腕霸主。"
 eoe_crossroads.20.opt_c_nomod.tt:0 "无奈的胜利者。"
 eoe_crossroads.30.opt_a_nomod.tt:0 "永恒建筑师。"
 eoe_crossroads.30.opt_b_nomod.tt:0 "务实雄心。"
 eoe_crossroads.30.opt_c_nomod.tt:0 "勉强的建造者。"
 eoe_crossroads.40.opt_a_nomod.tt:0 "超凡乃是文明发展的逻辑延续。每个足够先进的物种都会抵达此点。我们以应用于一切其他事务的同一种务实取向来对待它。"
 eoe_crossroads.40.opt_b_nomod.tt:0 "有些事物已然真正改变了，而这改变需要被当作重大的来对待。不必然是宗教性的，而是心怀敬畏的。我们认识到这是一场无法被完全预见或掌控的蜕变。"
 eoe_crossroads.40.opt_c_nomod.tt:0 "超凡是真的且是重大的，但我们以刻意的注意力，关注着正被抛在身后的是什么。问题不仅在于我们正变成什么，更在于我们曾是什么，以及其中哪些是应当被留存的。"
 eoe_legacy.410.opt_affirm_nomod.tt:0 "朝向超越的驱动力是正确的。原初的理解被重申并加深。"
 eoe_legacy.410.opt_partial_nomod.tt:0 "驱动力是真实的，但这个世纪揭示了细微差别。我们在不放弃原初哲学的情况下调整它。"
 eoe_legacy.420.opt_affirm_nomod.tt:0 "务实主义框架是正确的。成果为框架正名。"
 eoe_legacy.420.opt_partial_nomod.tt:0 "成果是真实的但也是复杂的。我们在不放弃框架的情况下整合批评者的观点。"
 eoe_legacy.430.opt_affirm_nomod.tt:0 "克制是智慧。稳定的记录不言自明。"
 eoe_legacy.430.opt_partial_nomod.tt:0 "克制是真实的，但这个世纪已显示出容纳更多的空间。我们在不放弃核心谨慎的情况下重新平衡。"
 eoe_legacy.430.opt_reverse_nomod.tt:0 "克制已被重铸为犹豫。我们否定原初框架，并拥抱我们所曾却步不前的东西。"
 eoe_legacy.510.opt_affirm_nomod.tt:0 "此世纪验证了仁慈。外交记录不言自明。"
 eoe_legacy.510.opt_partial_nomod.tt:0 "仁慈产生了复杂的结果。我们同时承认智慧与代价。"
 eoe_legacy.520.opt_affirm_nomod.tt:0 "巩固是智慧。它所产生的稳定是证据。"
 eoe_legacy.520.opt_partial_nomod.tt:0 "严苛的和平产生了它意在产生的东西，也产生了它无意产生的东西。两者皆被承认。"
 eoe_legacy.520.opt_reverse_nomod.tt:0 "怨恨已超过了稳定。战争被重铸为关于无仁慈的力量之局限性的教训。"
 eoe_legacy.530.opt_affirm_nomod.tt:0 "审慎对待胜利的方式是正确的。产生的稳定是证据。"
 eoe_legacy.530.opt_partial_nomod.tt:0 "无奈是真诚的，但我们已学会在需要时也采取行动。我们在不放弃根本性谨慎的情况下重新平衡。"
 eoe_legacy.530.opt_reverse_nomod.tt:0 "审慎的框架已被重铸为自我设限的克制。战争现在被理解为谨慎变成一项负债的时刻。"
 eoe_legacy.610.opt_affirm_nomod.tt:0 "建造者的文明身份被此世纪的记录所确证。"
 eoe_legacy.610.opt_partial_nomod.tt:0 "建造者身份是真实的，但已被这个世纪关于大规模建造代价的教训所调和。"
 eoe_legacy.610.opt_reverse_nomod.tt:0 "建造者的文明身份被重铸为具象化的狂妄。此世纪被理解为一份关于雄心代价的记录。"
 eoe_legacy.620.opt_affirm_nomod.tt:0 "此结构的效用被一个世纪的产出所证实。务实主义框架被重申。"
 eoe_legacy.620.opt_partial_nomod.tt:0 "此结构既产生了效用，也出乎意料地产生了意义。我们将两者都整合进更新后的框架。"
 eoe_legacy.620.opt_reverse_nomod.tt:0 "纯粹务实主义的框架已被发现是不完整的。此结构比原初决定所承认的意味更多。"
 eoe_legacy.630.opt_affirm_nomod.tt:0 "承认代价是智慧。此世纪确认了它。"
 eoe_legacy.630.opt_partial_nomod.tt:0 "此世纪已表明代价是真实的，且成就也是真实的。我们整合两者。"
 eoe_legacy.630.opt_reverse_nomod.tt:0 "审慎的框架已被重铸为过度的克制——那个建造得宏伟壮丽、然后花了一个世纪为其道歉的帝国。"
 eoe_contact.410.opt_affirm_nomod.tt:0 "伸出的手政策是智慧。此世纪的记录确认了它。"
 eoe_contact.410.opt_partial_nomod.tt:0 "开放性是真的，但并非不复杂。我们承认两者。"
 eoe_contact.410.opt_reverse_nomod.tt:0 "开放性是不足的或错置的。此世纪教给了不同的东西。逆转带有代价。"
 eoe_contact.420.opt_affirm_nomod.tt:0 "谨慎的方式是正确的。积累的情报是证据。"
 eoe_contact.420.opt_partial_nomod.tt:0 "谨慎是合理的，但比所实践的更多的开放性也是。"
 eoe_contact.430.opt_affirm_nomod.tt:0 "谨慎是正确的。产生的稳定是证据。"
 eoe_contact.430.opt_partial_nomod.tt:0 "谨慎是对的，但已被经验所精炼。"
 eoe_trans.410.opt_affirm_nomod.tt:0 "一个世纪的证据已验证了原初的框定。宣言成立。"
 eoe_trans.410.opt_partial_nomod.tt:0 "一个世纪揭示了原初框定未能捕捉的细微差别。在不抛弃方向的情况下承认复杂性。"
