 eoe_menu.21.opt.profile_survivor:0 "概况：§Y幸存者§!"
 eoe_menu.21.opt.profile_survivor.tt:0 "他们屹立不倒。这并非小事。"
 eoe_menu.21.opt.profile_diplomat:0 "概况：§Y外交家§!"
 eoe_menu.21.opt.profile_diplomat.tt:0 "他们的力量以关系衡量，而非领土。"
 eoe_menu.21.opt.profile_warlord:0 "概况：§Y战略家§!"
 eoe_menu.21.opt.profile_warlord.tt:0 "他们凭智谋战斗。战争是手段；胜利是终点。"
 eoe_menu.21.opt.profile_philosopher:0 "概况：§Y哲学家§!"
 eoe_menu.21.opt.profile_philosopher.tt:0 "他们将追求智慧作为一项文明天职。"
 eoe_menu.21.opt.profile_unknown:0 "概况：§H未知领域§!"
 eoe_menu.21.opt.profile_unknown.tt:0 "尚无足够历史来定义他们。他们仍在形成中。"

