 # ── eoe_trans.411 - 重释解决（所有路径共享） ───────
 eoe_trans.411.title:0 "编年史：重释已被记录"
 eoe_trans.411.desc_affirm:0 "此世纪被肯定。在门槛处做出的宣言成立——不是因为帝国没有改变，而是因为框定已被证明足够准确，足以继续。一个帝国在一百年的证据之后肯定其创立宣言，是一个已诚实地检验了自身的帝国。所应用的强化修正反映出，信念是因时间而加深，而非仅因惯性而维持。"
 eoe_trans.411.desc_partial:0 "此世纪被部分修正。原初的框定捕捉到了某些真实的东西，但并非全部真相。帝国承认了什么是对的，以及什么需要调整。一份部分修正不是原初宣言的失败——它是帝国一直在留心的证据。所应用的平衡修正反映出，一种已成熟至超越其创立之时的朴素性的取向。"
 eoe_trans.411.desc_reverse:0 "此世纪已推翻了原初的宣言。你的帝国在跨越之时所相信的超凡意味着什么，并非一百年的证据所显示它意味着的东西。逆转带有代价：制度记忆不会没有摩擦地自我修正。但取代原初框定的，是从那个世纪诚实的证据中建立起来的，这给予了它一份原初所缺乏的基础。"

 # ── eoe_trans.601 - 150年反思 ─────────────────────────────────────
 eoe_trans.601.title:0 "编年史：一个半世纪的超凡"
 eoe_trans.601.desc_a:0 "一百五十年。编年史审视一个将其超凡框定为逻辑必然性、并已在此框定内生活了一个半世纪的帝国的当前状态。必要的一步哲学产生一种与蜕变之间的特定关系：高效，不感情用事，始终向前看。在百年之际，该框定被肯定或被修正。这是随之而来的事物的中点。编年史观察到：实务取向，在此帝国如何处理它所遭遇的每一道后续门槛中都是可见的。超凡不是最后一次改变。它是另一种类型的第一次。编年史观看此帝国如何迎接那些随之而来的。"
 eoe_trans.601.desc_b:0 "一百五十年。编年史审视一个将其超凡视为神圣、并在数代人间维持了那取向的帝国。对神圣门槛而言，在一百五十年之际的问题，不是敬畏是否幸存——它幸存了——而是当敬畏已不再是直接的时候，它看起来是什么样。跨越发生在一个半世纪前。无任何在世者直接经历它。编年史观察，当原初经历不再可得时，意义是如何跨越时间被传递的。这是百年重释预备此帝国面对的那场考验。编年史观看这预备证明自身，或未能。"
 eoe_trans.601.desc_c:0 "一百五十年。编年史审视一个已花了一个半世纪实践谨慎进化——刻意致意于被保留之物以及被获得之物——的帝国。谨慎的进化哲学，是最需费力才能经时间维持的，因为它要求持续的主动选择，而非一份既定信念的被动惯性。在一百五十年之际，编年史发问：谨慎仍是主动的，抑或它已沉淀为习惯？主动的谨慎与习惯性的谨慎产生相似的行为，但不同的文化。编年史正观看此帝国已变成哪种。"

 # ── eoe_trans.710/720/730 - 200年回响（每条路径一个） ────────────────────
 eoe_trans.710.title:0 "编年史：两个世纪的超凡"
 eoe_trans.710.desc:0 "两百年前，你的帝国跨越了一道它无法逆转的门槛，并宣告那跨越是此前一切事物的逻辑延续。必要的一步。编年史自那以来一直在观看。两个世纪的证据已经积累。那个宣告了超凡不可避免的帝国，现已在此不可避免性中活得足够久，足以知晓它产生了什么——不是在理论上，而是在事实上。编年史不问宣言是否正确。它问做出了它的帝国已变成了什么。"
 eoe_trans.710.opt_a:0 "这一步是必要的。随之而来的证明了它。"
 eoe_trans.710.opt_a.tt:0 "两个世纪的务实超凡已造就了一个被前行的惯性所定义的文明。宣言成立。"
 eoe_trans.710.opt_b:0 "这一步是必要的。它所产生的不完全被预料到。"
 eoe_trans.710.opt_b.tt:0 "两个世纪揭示了原初框定未能捕捉的复杂性。宣言是准确的，但不完整。"
 eoe_trans.720.title:0 "编年史：两个世纪的超凡"
 eoe_trans.720.desc:0 "两百年前，你的帝国跨越了一道门槛，并命名那跨越为神圣——一场过于深重而不能被当作寻常进步的蜕变。神圣的门槛。两个世纪已经过去。在跨越那一刻所宣告的敬畏，已被传递跨越了数代并未直接经历它的人，由那些必须使继承来的意义对将超凡视为历史而非经历的人变得可读的制度所维持。编年史一直在观看这传递。"
 eoe_trans.720.opt_a:0 "那道门槛是神圣的。两个世纪已深化了对那意味着什么的理解。"
 eoe_trans.720.opt_a.tt:0 "敬畏幸存并成长了。神圣的门槛造就了一个具有真正深度的集体身份的文明。"
 eoe_trans.720.opt_b:0 "那道门槛是神圣的。两个世纪已使那神圣性变得复杂了。"
 eoe_trans.720.opt_b.tt:0 "敬畏幸存了，但并非毫未改变。那道门槛意味着什么，已被时间的分量的重量所修正。"
 eoe_trans.730.title:0 "编年史：两个世纪的超凡"
 eoe_trans.730.desc:0 "两百年前，你的帝国跨越了一道门槛，并宣告它将带着谨慎前行——致意于被保留之物以及被获得之物。谨慎的进化。两个世纪审慎的、有管理的蜕变，已造就了一个从未停止选择的帝国。每项获得的能力都被权衡。每一次改变都被参照它正从何而改变来衡量。编年史已观看了这纪律跨越两百年，并在回响时刻发问，它产生了什么。"
 eoe_trans.730.opt_a:0 "谨慎是正确的。两个世纪审慎的进化产生了某种值得拥有的东西。"
 eoe_trans.730.opt_a.tt:0 "纪律得以维持并证明了自身。被保存的是值当被保存的。"
 eoe_trans.730.opt_b:0 "谨慎是真实的，但其代价也是真实的。"
 eoe_trans.730.opt_b.tt:0 "两个世纪有管理的变化，揭示了在管理所获之外，因管理所失的是什么。"

 # ── eoe_trans.711 - 200年回响解决（共享） ────────────────────────
 eoe_trans.711.title:0 "编年史：回响已被记录"
 eoe_trans.711.desc_affirm:0 "两个世纪的必要一步，在百年之际被肯定，已造就了一个带着它应用于任何其他问题的同一种清晰，进入超凡的文明。编年史记录：框定成立。务实的超凡并不产生最深的文化，但它产生一个始终如一可运作的文化。帝国知道它在做什么以及为什么。两百年的那知识已积聚为某种持久之物。编年史合上此章。250年的总结将是其最终评估。"
 eoe_trans.711.desc_partial:0 "两个世纪的必要一步，在百年之际被部分修正，已造就了一个知晓其自身复杂性的文明。原初的务实主义遇到了某种它无法完全解释的东西——实际正发生之事的深重的分量——而修正承认了它，同时没有抛弃前行的惯性。编年史记录：部分修正产生了三种结果中最诚实的那种。帝国在门槛处不完美地理解了自身，并在百年之际纠正了理解。那是诚实的文明所做的事。编年史合上此章。"
 eoe_trans.711.desc_reverse:0 "两个世纪始于逻辑必然性、并在百年之际被推翻的超凡，已造就了一个从证据中重建其自我理解的帝国。取代原初框定的——无论你的帝国现在相信超凡意味着什么——不是在跨越之时选择的。它是通过生活在跨越内部一个世纪、然后对那世纪所揭示的诚实以对而赢得的。编年史将此记录为必要一步在智识上最诚实的弧线。总结将是其结语。"

 # ── eoe_trans.750 - 250年总结 ──────────────────────────────────────
 eoe_trans.750.title:0 "编年史：超凡总结"
 # 路径 A（必要的一步）
 eoe_trans.750.desc_a_affirm:0 "两个半世纪前，你的帝国跨越了超凡门槛，并宣告那是此前一切事物的逻辑延续。必要的一步，在百年之际被肯定，并在此后又持守了一个半世纪。编年史发布其对此章的最终评估。一个将超凡视为逻辑必然性的帝国，并不产生文化上最丰富的记录——此处没有敬畏，没有跨越的戏剧性。它产生的，是一个文明毫无犹豫地穿过了那些曾瘫痪其他文明的蜕变。效率是真实的。研究优势积累了。此哲学所支撑的后勤能力，从跨越数个世纪的改变中将帝国维系在一起。编年史记录：必要的一步已迈出。两百五十年的证据确认它是正确的。"
 eoe_trans.750.desc_a_partial:0 "两个半世纪前，你的帝国宣告超凡为文明发展的逻辑延续，然后在百年之际承认，那逻辑并未完全捕捉实际正发生之事。部分修正是诚实的。原初框定所错失的——真正蜕变的深重，成为与你曾是之物不同的什么东西的文化质地——被承认了，同时不被允许阻止前行的惯性。编年史发布其最终评估。部分修正产生了三种长期取向中最准确的一种。一个既理解自己在做什么、又理解它代价什么的帝国，维持着一种纯粹的务实主义或纯粹的敬畏都无法企及的清晰。编年史将此记录为必要的一步找到了它诚实的形态：高效且自觉。"
 eoe_trans.750.desc_a_reverse:0 "两个半世纪前，你的帝国宣告超凡不可避免，然后花了一个世纪生活在那宣言内部，并得出结论它是错的。逆转是重大的。取代原初框定的——无论你的帝国现在相信超凡实际意味着什么——是从一百年仔细留意所宣告的逻辑与所经历的现实之间差距而建立起来的。编年史发布其最终评估。逆转并非失败。一个宣告其创始哲学是错误的、并从证据中重建的帝国，做了比一个第一次就对了的帝国更难的事：它在舒适之上选择了诚实。逆转所累积的传统影响力，反映了一个知道自己为走到如今放弃了什么的文明。编年史记录下两百五十年：宣言，修正，以及从所剩之物中构建真实之物的漫长工作。"
 # 路径 B（神圣的门槛）
 eoe_trans.750.desc_b_affirm:0 "两个半世纪前，你的帝国跨越了超凡门槛并命名那跨越为神圣——一场过于深重而不能被当作寻常进步的蜕变。神圣的门槛，在百年之际被肯定，已在数代将超凡视为继承而来而非亲身经历的人之间被维持。编年史发布其最终评估。敬畏幸存了。不止幸存——它深化了。一个将其自身蜕变视为神圣的帝国，产生了一种特定类型的集体身份：稳定，连贯，围绕某种不能被简化为资源或领土的东西所定向。此哲学所累积的稳定度加成，反映了一个被给予了一个理解什么改变了、并发现此框架有意义的人口的稳定度。编年史记录此章闭合。门槛被跨越了。跨越被以其配得的对待方式对待了。两百五十年的证据确认，那对待方式是正确的。"
 eoe_trans.750.desc_b_partial:0 "两个半世纪前，你的帝国宣告超凡为神圣，然后在百年之际修正了那宣言，以承认一个世纪的实践所揭示的：没有务实基础的敬畏最终会变成仪式，而没有意义的仪式是其自身的一种不诚实。部分修正在二者间取得了平衡。编年史发布其最终评估。修正后的取向产生了某种原初纯粹的敬畏无法无限期维持的东西：一种将跨越持守为真正重大的、同时理解那重大性必须被更新，而非仅仅被继承的文化。编年史将此记录为神圣的门槛达其成熟形态——不是原初的敬畏完好无损，而是从它生长出的某种更持久的东西。"
 eoe_trans.750.desc_b_reverse:0 "两个半世纪前，你的帝国命名超凡为神圣，然后一个世纪后得出结论，那神圣性已成为一种约束而非基础。逆转释放了原初框定所僵固的某种东西。取代敬畏的——无论你的帝国现在用何种框架来理解发生在其身上的事——是在一个世纪诚实地评估神圣框定提供了什么、未提供什么之后被选择的。编年史发布其最终评估。有些真相需要一个世纪才能变得可见。你的帝国找到了它们，命名了它们，并据以建造。逆转所累积的传统影响力，反映了一个将自身所放弃之物的分量的重量，转化为某种生成性的东西的文明。编年史记录下完整的弧线：宣言，一个世纪的实践，诚实的清算，以及一个半世纪建造清算所揭示之所需的工作。"
 # 路径 C（谨慎的进化）
 eoe_trans.750.desc_c_affirm:0 "两个半世纪前，你的帝国选择审慎地跨越超凡门槛——致意于被保留之物以及被获得之物，带着对正被抛在身后之物的明确意识继续前行。谨慎的进化，在百年之际被肯定，并在此后维持了一个半世纪。编年史发布其最终评估。纪律得以维持。一个管理其自身蜕变、而非向之投降的帝国，产生了某种罕见之物：一个真正知道自己选择变成什么的文明，因为它在整个选择过程中始终在留意。此哲学所累积的传统影响力与稳定度，反映了跨越非凡改变而被维持的延续性。编年史将此记录为最经深思的超凡形式：一场跨越，知晓它是从什么跨越而来的，并审慎选择了它将携带什么前行。"
 eoe_trans.750.desc_c_partial:0 "两个半世纪前，你的帝国以刻意的谨慎进入超凡，然后在百年之际得出结论，那谨慎已偶尔变成了为其自身之故而谨慎。部分修正释放了值当释放之物，同时保留了曾产生真正价值的取向。编年史发布其最终评估。修正后的谨慎的进化找到了此哲学可运作的形态：专注却不被瘫痪，保留着却不静止。原初纯粹的谨慎所保护的东西——跨越蜕变的身份延续性——被修正比被僵固持有的原初更好地服务了。编年史将此记录为审慎的进化完成自身：在门槛处所需的谨慎，以及一旦门槛被远远抛在身后取代了谨慎的自信。"
 eoe_trans.750.desc_c_reverse:0 "两个半世纪前，你的帝国以谨慎的深思熟虑跨越了超凡门槛，然后一百年后得出结论，那深思熟虑已服务于其目的，可被搁置一旁。逆转不是对谨慎所建造之物的抛弃——是谨慎达其结论。你观察了。你学会了那门槛是什么。然后你选择停止管理它，转而生活于其中。编年史发布其最终评估。逆转之前那一个世纪的仔细致意，给予了你的帝国那些不加谨慎就前行的帝国所没有的东西：在决定停止将其视为一个过渡之前，对自身已变成什么的透彻理解。逆转所累积的传统影响力，反映了一个将两百五十年审慎的实践，转化为终于无需思虑而行动的自信的文明。编年史记录下完整的弧线闭合。"

 # ── 超凡修正本地化 ──────────────────────────────────
 eoe_mod_trans_necessary:0 "必要的一步"
 eoe_mod_trans_necessary_desc:0 "你的帝国将超凡框定为文明发展的逻辑延续。研究进步，人口以一个不为其正变成什么而痛苦的帝国的效率增长。"
 eoe_mod_trans_sacred:0 "神圣的门槛"
 eoe_mod_trans_sacred_desc:0 "你的帝国将超凡视为一场配得敬畏的蜕变。稳定度反映了一个被给予了一个理解什么改变了的框架的人口；影响力从集体信念的重力中累积。"
 eoe_mod_trans_cautious:0 "谨慎的进化"
 eoe_mod_trans_cautious_desc:0 "你的帝国以刻意的注意力，关注着在被获得之物一旁正被留存的是什么，进入超凡。影响力稳定地累积，稳定度维持，研究继续向前。"
 eoe_mod_trans_affirmed:0 "已肯定的门槛"
 eoe_mod_trans_affirmed_desc:0 "一个世纪已确认了原初的框定。研究进一步加速，人口以重获的惯性增长，稳定度反映出因证据而加深、而非因惯性而继承的信念。"
 eoe_mod_trans_partial:0 "已修正的门槛"
 eoe_mod_trans_partial_desc:0 "一个世纪的证据揭示了原初框定未能捕捉的细微差别。研究继续，影响力更顺畅地流动，稳定度反映出一种已成熟至超越其创立之时的朴素性的取向。"
 eoe_mod_trans_reversed:0 "已重新考虑的门槛"
 eoe_mod_trans_reversed_desc:0 "原初的框定在一个世纪的证据后被推翻。影响力从在新基础上重建而累积，稳定度维持；研究承担修正制度记忆的代价。"

