 # ── eoe_crossroads.40/41/42/43 - 超凡十字路口 ───────────────
 eoe_crossroads.40.title:0 "编年史：超凡门槛"
 eoe_crossroads.40.desc:0 "某些事物已然改变。不是以政策改变的方式，或领导层更迭的方式，甚至不是以战争改变事物的方式——那些是对你的帝国所做之事的变改。已然改变的是你的帝国之所是。编年史不常记录此类时刻。大多数文明史是增量的：能力累积，领土扩张，关系形成又消解。这不一样。你的帝国已跨越了一道无法回溯的门槛。编年史所记录的问题，不是跨越是否发生了——它发生了——而是你的帝国相信这跨越意味着什么。"
 eoe_crossroads.40.opt_a:0 "必要的一步"
 eoe_crossroads.40.opt_a.tt:0 "必要的一步。研究速度+4%，人口增长速度+5%。\n超凡乃是文明发展的逻辑延续。每个足够先进的物种都会抵达此点。我们以应用于一切的其他事务的同一种务实取向来对待它。"
 eoe_crossroads.40.opt_b:0 "神圣的门槛"
 eoe_crossroads.40.opt_b.tt:0 "神圣的门槛。稳定度+3，影响力+8%。\n有些事物已然真正改变了，而这改变需要被当作重大的来对待。不必然是宗教性的，而是心怀敬畏的。我们认识到这是一场无法被完全预见或掌控的蜕变。"
 eoe_crossroads.40.opt_c:0 "谨慎的进化"
 eoe_crossroads.40.opt_c.tt:0 "谨慎的进化。影响力+0.75/月，稳定度+2，研究速度+2%。\n超凡是真的且是重大的，但我们以刻意的注意力，关注着正被抛在身后的是什么。问题不仅在于我们正变成什么，更在于我们曾是什么，以及其中哪些是应当被留存的。"
 eoe_crossroads.41.title:0 "必要的一步"
 eoe_crossroads.41.desc:0 "编年史记录下此宣言。被框定为逻辑必然性的超凡，承载着一种特定的分量：它取消了这是否本应发生的问题。它发生了，因为它始终是要发生的。以这种方式框定其蜕变的帝国，不会为此跨越而痛苦。它带着它向来给予文明发展的同一种清晰明澈的取向，向前展望随之而来的一切。所应用的修正是适度但持久的。编年史将重返此宣言。"
 eoe_crossroads.42.title:0 "神圣的门槛"
 eoe_crossroads.42.desc:0 "编年史记录下此宣言。被框定为神圣的超凡，承载着一种与被框定为仅仅是进步不同的分量。此帝国已把发生在其身上的事，命名为某种值得敬畏之事——不必然在宗教意义上，而是在某些改变如此深刻、以至于继续前行而不承认其分量的意义上，那会是某种不诚实。所应用的修正反映了这种取向：稳定度与集体身份的重力。编年史将重返此宣言。"
 eoe_crossroads.43.title:0 "谨慎的进化"
 eoe_crossroads.43.desc:0 "编年史记录下此宣言。被框定为谨慎进化的超凡，是三种框定中最具自我意识的一种。此帝国不仅命名了它正变成什么，还命名了它正抛下什么——并承诺了将两者同时保持在心中。进步与失落。蜕变与延续。所应用的修正反映了这双重取向：来自被维持的传统的影响力，伴随着一个仍在前进的文明的研究效率。编年史将重返此宣言。"

 # ── eoe_trans.401/402/403 - 进展标记 25年 / 50年 / 75年 ────────────
 eoe_trans.401.title:0 "编年史：四分之一世纪的超凡"
 eoe_trans.401.desc_a:0 "四分之一世纪足够长，足以让框定沉淀于制度记忆之中。必要的一步不再是一份宣言——它是背景。此帝国不再讨论超凡是否不可避免。它继续前行，仿佛那问题从未有趣过。编年史将这观察为，框定是否在寻常时间下站得住的首个证据。"
 eoe_trans.401.desc_b:0 "四分之一世纪足够长，足以让那份敬畏要么已深化、要么已钙化。神圣门槛的框定，被以真诚的情感持守着，随着时间推移，倾向于两个方向之一：对蜕变意味着什么的更丰富理解，或已失去其内在生命的仪式性遵从。编年史尚不能辨别此帝国正走向哪个方向。它观望着。"
 eoe_trans.401.desc_c:0 "四分之一世纪的谨慎进化，意味着一代人的刻意注意力，关注着在被获得之物一旁正被留存的是什么。编年史指出：谨慎在维持着。此帝国并未加速进入它的新本性。它正如所宣告的那样审慎前行。问题是，谨慎是智慧还是犹豫。编年史尚不会回答那个问题。"
 eoe_trans.402.title:0 "编年史：半个世纪的超凡"
 eoe_trans.402.desc_a:0 "五十年。做出宣言的那代人仍存在，但不再占主导。蜕变的孩子们现在是延伸它的人。被持守了半个世纪的必要的一步，已产生了务实框定倾向于产生的东西：高效的发展，不足为奇的进步，一种此处并无非凡之事发生的静默信念。"
 eoe_trans.402.desc_b:0 "五十年将超凡视为神圣对待，已在此文化中产生了某种可见之物。编年史观察到：那份敬畏已成为生成性的，而非仅仅是纪念性的。此帝国不只是记得那道门槛——它持续地从曾跨越它而汲取意义。这是神圣框定较好的结果。替代方案在百年之际显现。"
 eoe_trans.402.desc_c:0 "五十年的谨慎进化。编年史指出，这双重取向——同时向前与向后——既未产生必要一步的效率，也未产生神圣门槛的凝聚。它产生的是一种更具质地的东西：一个真正知道在改变时它在选择保留什么的帝国。那知识是否值得付出代价，是百年之际的问题。"
 eoe_trans.403.title:0 "编年史：四分之三世纪的超凡"
 eoe_trans.403.desc_a:0 "七十五年。这场蜕变已有四分之三世纪的历史。编年史指出，必要一步的框定已证明了其持久性：无身份危机，无哲学层面对必然性逻辑的反叛。帝国继续前行。曾是不可避免的，继续被如此对待。编年史观望着这在百年之际会产生什么。"
 eoe_trans.403.desc_b:0 "七十五年。神圣门槛的框定已幸存得足够久，足以被未曾经历最初跨越的世代所检验。编年史观看，对于超凡是继承而来而非亲身经历的那些人，帝国如何传递所发生之事的含义。这是百年重释的关键问题。"
 eoe_trans.403.desc_c:0 "七十五年。谨慎的进化已被维持了四分之三世纪。编年史观察着一个仍在管理其自身蜕变、而非向之投降的文明。这很罕见。在此节点，大多数帝国要么已加速进入其新本性，要么已从中撤退。这一个仍在，年复一年地，选择着要携带什么前行。"

 # ── eoe_trans.410/420/430 - 100年重释（每条路径一个） ────────────────
 eoe_trans.410.title:0 "编年史：一百年的超凡"
 eoe_trans.410.desc:0 "自你的帝国首次跨越超凡门槛并宣告它相信那跨越意味着什么以来，一个世纪已经过去。一百年足以积累证据。编年史提出此问题，不是作为考验，而是作为一次诚实的核算：你的帝国所选择的框定，是否仍描述着它已变成的样子？原初的宣言——必要的一步——是在一个转变时刻做出的。生活在此宣言内部的一百年，已产生了后果。编年史发问，你的帝国如何解读它们。"
 eoe_trans.410.opt_affirm.tt:0 "一个世纪的证据已验证了原初的框定。宣言成立。肯定它加深了信念并应用一个强化修正。"
 eoe_trans.410.opt_partial.tt:0 "一个世纪揭示了原初框定未能捕捉的细微差别。在不抛弃方向的情况下承认复杂性。一个平衡修正取代原初修正。"
 eoe_trans.410.opt_reverse.tt:0 "一个世纪的证据已推翻了原初的框定。别的什么是真的。逆转在带来新益处的同时，也带有断裂的代价。"
 eoe_trans.420.title:0 "编年史：一百年的超凡"
 eoe_trans.420.desc:0 "自你的帝国首次跨越超凡门槛并宣告它相信那跨越意味着什么以来，一个世纪已经过去。一百年足以积累证据。编年史提出此问题，不是作为考验，而是作为一次诚实的核算：你的帝国所选择的框定，是否仍描述着它已变成的样子？原初的宣言——神圣的门槛——是在一个转变时刻做出的。生活在此宣言内部的一百年，已产生了后果。编年史发问，你的帝国如何解读它们。"
