 eoe_menu.21.opt.profile_ascendant.tt:0 "投身于超凡之道——尚未完成。"

 # ── 编年史子菜单 - 新的里程碑条目 ─────────────────────────────
 eoe_menu.10.opt.tradition_done:0 "§Y第一条道路§! - 首个传统树已完成。"
 eoe_menu.10.opt.tradition_pending:0 "§H第一条道路§! - 尚无传统树完成。"
 eoe_menu.10.opt.tradition_done.tt:0 "你的帝国已完成其首个传统树。哲学根基已被奠定。"
 eoe_menu.10.opt.tradition_pending.tt:0 "你的帝国尚未完成一整个传统树。"
