 # ── eoe_dlc.82 - 首次宇宙风暴 (宇宙风暴) ─────────────────────
 eoe_dlc.82.title:0 "风暴"
 eoe_dlc.82.desc:0 "你的侦察兵最初报告它，是作为远程传感器上的一个异常——某种巨大、高能且以不符标准模型的方式运动的物体。当你的舰队靠得足够近确认它是什么时，你的气象学家们早已开始争论该叫它什么。\n\n一场宇宙风暴。不是充斥政治演说那种隐喻式的，而是一种你的仪器并非完全设计来测量的、实际的大规模电磁现象。你的科学家们很兴奋。你的海军上将们很谨慎。编年史指出，你的帝国现已遭遇了银河中更为壮观的自然现象之一，并带着些许轻描淡写地记录道，银河比任何一张关于它的星图都更浩瀚、更奇异。"

 # ── eoe_dlc.83 - 利维坦残骸 (利维坦) ───────────────────────────
 eoe_dlc.83.title:0 "守护者所遗留的"
 eoe_dlc.83.desc:0 "此残骸区是仅存的一切。你的科学团队花了数周编录它——在标准制造条件下本不可能出现的构成的金属合金，你的工程师们仍在尝试逆向工程的武器系统的能量残留，似乎是生长而非建造而成的结构组件。\n\n无论你的舰队击败了什么，它都不是最近才进化出来的东西。编年史记录下此交战，而不对其伦理性发表评论。它所指出的是，你的帝国现已与某样古老到令你的文明显得短暂的事物进行了接触——暴力的、终结性的接触，但终究是接触。从残骸中恢复的知识将比产生它的东西更长久。"

 # ── eoe_dlc.84 - 首次旁路被探索 (遥远星辰) ───────────────────
 eoe_dlc.84.title:0 "穿越之路"
 eoe_dlc.84.desc:0 "你的探险者们不知道另一边是什么。从确切意义上说，这正是关键所在。该旁路在星图上被定性为一个可航性不确定的特征，以科学界的说法就是，没有任何尝试穿越它的人回报过。\n\n你的舰队还是穿过去了。编年史将此次穿越记为一个文明时刻——不是因为另一边发现了什么，那是有待持续分析之事，而是因为决定去穿越了。有些帝国，遇到通往未知的通道时，会建立观察站并等待更好的数据。你的帝国派去了一支舰队。"

 # ── eoe_dlc.85 - 首次接触完成 (第一次接触) ─────────────────
 eoe_dlc.85.title:0 "接触"
 eoe_dlc.85.desc:0 "首次接触协议已完成。你的外交官们、异星语言学家们、文化分析师们，以及你的行政机构为此目的而集结的各类专家们，都已完成了他们的工作。另一个文明现在知道你的帝国存在了。你的帝国现在知道了，比以前多了些确定性，他们存在。\n\n编年史记录下此完成，而不预测这段关系。首次接触是那种其意义完全由后续发展决定的事件之一。已完成的只是最低限度——相互承认存在。接下来的是什么，才是文明级别的问题。"

 # ── eoe_dlc.86 - 宏大宝库展品 (宏大宝库) ───────────────────
 eoe_dlc.86.title:0 "首件添加"
 eoe_dlc.86.desc:0 "宏大宝库已收到其首件展品。你的策展人们花了比严格必要更多的时间在陈列上，编年史将此记为一个迹象，表明你的帝国已决定此机构是重要的——不仅是作为一个储藏所，更是作为一项声明。\n\n现珍藏于宝库中的物品或记录，将比获取它的人、批准收集它的行政机构，以及极有可能比你帝国当前所采取的特定政治形式都更长久。编年史观察到，那些致力于保存银河知识的文明，正在做出一个关于未来的隐含主张：即未来将会存在，并且它将因知晓过去种种而获益。"

