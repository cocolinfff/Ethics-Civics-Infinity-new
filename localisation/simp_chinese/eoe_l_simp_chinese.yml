 eoe_legacy.404.title:0 "一百五十年"
 eoe_legacy.404.desc_a:0 "一百五十年来，因那是你们的天性而飞升。\n\n做出那宣言的帝国，在你当前的文明中仍可辨认，但它已老化为某种比原初哲学所预料的更复杂的东西。朝向更高境界的驱动力是真实的。它也已在一个半世纪间，积累了一系列原初制定者们没有问过的具体问题：比什么更高？向什么方向更高？而一个帝国何时知晓自己已抵达？\n\n你的学院正在产出你的帝国三代人以来所见的最有趣的哲学家们。他们正在仔细而认真地追问这些问题。你的帝国是否准备好听取答案则是另一回事——一件接下来五十年将开始解决的事。"
 eoe_legacy.404.desc_b:0 "一百五十年来，因其有用而飞升。\n\n效用已被反复证明，跨越一个半世纪可衡量的成果。你的帝国有这些数字。它也日益拥有那些阅读这些数字、并追问数字是否捕捉到了所有重要之事的史学家——它们未曾捕捉的那些，是否本可能讲述一个不同故事的事情。\n\n务实主义框架并未受到威胁。它正受到审视。那是另一回事，而你的顾问们仔细留意着此区别：一个能在不抛弃其方法的情况下审视它们的帝国，是一个制度健康良好的帝国。"
 eoe_legacy.404.desc_c:0 "一百五十年来，审慎地飞升。\n\n你的克制所产生的稳定，如今已深植三代人。你周围的诸文明已然改变——有些成长得更快，有些在其雄心的重压下崩溃，多数占据着银河历史的寻常中段。你的帝国已在那中段占据了一个稳定的位置，既不壮阔也不灾难，始终如一地存在于一个一致性比其表面看起来更罕见的银河中。\n\n年轻一代，继承了这份稳定，正开始追问它是为了什么。不是为了批评缔造者们——证据未免太强了——而是出于真诚的好奇：一个已谨慎了一个半世纪的帝国，在接下来的五十年里该做什么？那份答案尚未被写下。"

 eoe_legacy.504.title:0 "一百五十年"
 eoe_legacy.504.desc_a:0 "仁慈以来，一百五十年了。\n\n你击败的那个帝国已有一个半世纪，变成无论它在你的仁慈所使之可能的和约下将要变成的样子。这段关系既非你最乐观顾问所预测的伙伴关系，亦非你的批评者所警告的警示故事。它是比两者都更寻常的某种东西：两个共享一段复杂历史的文明，已发展出了某种运作起来像相互理解的东西，即便并非相互温暖。\n\n你的史学家们指出，总的来说，这是真诚的仁慈在长时间尺度上更可能的结果——不是转化，而是常态化。接下来五十年的问题是，常态化是否是你帝国当初的目标。"
 eoe_legacy.504.desc_b:0 "铁腕和平以来，一百五十年了。\n\n和约已经稳固，这是你的战略家们对它的主要衡量标准。被击败的帝国在强加的限制下运作——不是热切地，并非在边缘毫无抵抗，而是在其之内。你首场胜利所建立的秩序，已证明是持久的。\n\n你的顾问们现在更仔细关注的是次级效应：观察到你首场胜利的区域性强权，随后如何调整了它们对你帝国的行为，以及该和约的威慑价值，在一个半世纪间是升值了还是贬值了。评估是喜忧参半的，你的战略规划团队认为这颇具启发性。"
 eoe_legacy.504.desc_c:0 "无奈胜利以来，一百五十年了。\n\n你第一场战争所产生的谨慎冲突的信条，已在一个半世纪间，经受了银河生成的全部范围情境的检验。那些检验中的一些，它以优异地通过。有几项，它以一个个不那么无奈的帝国或许不会付出的代价通过。总体记录仍为正面的——你的顾问们继续相信此信条是明智的。\n\n他们现在更仔细审视的是此信条的边界：那些制度性的避战预设导致延误，而结果代价高昂的案例。那些案例并非为数众多。它们足够具体以资研究，而研究正在进行中。"

 eoe_legacy.604.title:0 "一百五十年"
 eoe_legacy.604.desc_a:0 "建造以来，一百五十年了。\n\n第一座巨构如今是深层历史——完成它的工程师们已逝去数代，而结构本身已被如此彻底地改造、扩建并整合进你帝国的基础设施，以至于不再有人将其视为一座纪念碑。它仅仅是你文明赖以运行之物的一部分。\n\n你的史学家们发现这很有趣。原初的建筑师们建造的是某种他们预期会被铭记为一项宣言的东西——一个文明宣告它是什么。他们实际建造的，是某种通过效用而变得不可见的东西。那是否是他们所意图的那种成功，是当前一代学者正开始处理的问题。"
 eoe_legacy.604.desc_b:0 "务实建造以来，一百五十年了。\n\n那座务实的巨构，已在一个半世纪的运作中继续保持务实。它运作，正如它被建造来运作的那样，而对其的论证从未需要哲学补充。你的经济学家们满意了。你的产出数字令人满意。\n\n你的史学家们正以日益增长的兴趣注意到的是，一个半世纪这种与巨型基础设施的特定关系的文化效应：你的帝国将大型建造视为一个技术问题而非一项文明声明。这种框架有其优势。它也有代价，即技术上解决的技术问题，很少会问它们本是否根本不该被解决。"
 eoe_legacy.604.desc_c:0 "巨构竣工，而你的领导层坐对其所耗费的全部分量以来，一百五十年了。\n\n那一刻所产生的谦恭，已在一个半世纪间，塑造了你的帝国如何对待此后每一项重大承诺。你在承诺前计算代价。你建造你所需要的，而非你所能建造的。你在某些银河圈子中，享有一种比其应有的更罕见的文明智慧的名声。\n\n继承了此名声而未亲历挣得它的一代人，现在正在审视，实际拥有这种他们被告知自己拥有的美德，意味着什么。他们将通过肯定它、还是通过检验它的极限来回答这个问题，在一百五十年之际，尚未定论。"

 eoe_legacy.112.title:0 "编年史合上此章"
 eoe_legacy.112.desc_a_affirm:0 "两百五十年前，你的帝国宣告飞升是它的天性。在百年之际你的史学家们肯定了它。在两百年时辩论回归，并再次以支持原初框架而解决。编年史现在合上此章。\n\n评估是：你的帝国是它曾说是的样子。朝向更高境界的驱动力，跨越两个半世纪的证据，一直是真诚的。哲学没有钙化为教条，也没有消解为感伤。它仍是一个你的帝国继续回答着的鲜活问题。\n\n大多数宣告自己被一种价值所定义的文明，会失去此价值而保留此宣告。你的帝国，跨越两百五十年，保留了两者。编年史记录下此点。记录已言明一切。"
 eoe_legacy.112.desc_a_revised:0 "两百五十年前，你的帝国宣告飞升是它的天性。在百年之际你的史学家们修正了那宣言——不是否定最初的冲动，而是重释了它意味着什么，以及它为了什么。两个半世纪生活在此修正后的框架中，已产生了编年史现在所阅读的证据。\n\n证据是：一个能在百年之际审视自己创建宣言、并发现框架不足——不是成就，而是框架——然后又在修正后的理解中继续生活一个半世纪的帝国，是一个具有某种特定制度诚实的帝国。那种诚实比最初的雄心更罕见，且当其降临时更持久。\n\n此章合上于一个因选择飞升而飞升，而非因其宣告它必须如此才飞升的帝国。此区别，跨越两百五十年，结果证明是重要的。"
 eoe_legacy.112.desc_b_affirm:0 "两百五十年前，你的帝国选择飞升，因为那是有用的。务实主义框架在百年之际被评估，又在两百年时再次被评估，每次都被发现是可靠的。编年史以它自己的评估合上此章。\n\n跨越两个半世纪持续应用、并定期对照证据加以检验的务实主义，是一座比通常所被认为的更富韧性的基础。你的帝国不需要一颗哲学北极星，因为它有了某种更可靠的东西：一种方法。一种评估它所做之事是否奏效的方法。\n\n编年史将此记为一个知晓其自身尺度并诚实地应用它的帝国。这不是编年史所记录的最鼓舞人心的故事。但它是更可信的故事之一。"
 eoe_legacy.112.desc_b_revised:0 "两百五十年前，你的帝国选择飞升，因为那是有用的。在百年之际你的史学家们判定，务实主义框架虽非错误，却是不完整的——一个只衡量其所能衡量的文明，正在遗漏某些重要之物。修正是不易的。\n\n编年史的闭合评估是，那不易正是关键所在。一个在其百年之际选择去问一些比其框架被设计来回答的更困难问题的帝国——然后花了下一个半世纪发展回答它们的能力——是一个理解成长实际需要什么的帝国。它需要愿意发现你的方法是不足的。你的帝国是愿意的。编年史记录下此点。"
 eoe_legacy.112.desc_c_affirm:0 "两百五十年前，你的帝国选择审慎飞升，因为银河惩罚骄者，而谨慎似乎是更明智的姿态。克制已被肯定，在百年之际和在两百年时，被你自己的史学家们。编年史在此肯定中加入自己的声音。\n\n两个半世纪审慎的飞升已造就了一个稳定、连贯、且存在于一个稳定与连贯并不像乐观史书所暗示那么普遍的银河中的帝国。那些行进得更快的文明，拥有了有趣的历史。有好几个已根本不再拥有历史。\n\n你的帝国仍在此处。它仍是它所立志成为的样子。谨慎是真诚的，且它是正确的。编年史以此作为记录，合上此章。"
 eoe_legacy.112.desc_c_revised:0 "两百五十年前，你的帝国选择审慎地飞升。在百年之际你的史学家们得出结论，谨慎已在某些领域染上了自我设限——克制已从智慧钙化为条件反射。帝国修正了它对其自身的理解。编年史已观看此修正展开了一个半世纪。\n\n闭合评估是：一个能在其百年之际认识到，其美德之一已沦为负债——然后做那艰难的工作，收回美德、同时解除负债——的文明，是一个具有某种特定成熟度的文明。这比单纯地肯定或单纯地逆转都更难。它要求知晓事物与其影子之间的区别。\n\n你的帝国，跨越两百五十年，发展出了那份知识。编年史记录下它。"

 eoe_legacy.212.title:0 "编年史合上此章"
 eoe_legacy.212.desc_a_affirm:0 "两百五十年前，你的帝国赢得了一场战争，并对战败者展现了仁慈。在百年之际你的史学家们肯定，那份仁慈是智慧。编年史已观看了随后一个半世纪，现在合上此章。\n\n评估是：仁慈是正确的——不是因为它善良，尽管它是，而是因为它产生了，跨越两百五十年，一个比你战略分析师们所模拟的替代方案更稳定的区域秩序。一个在其影响力最大的时刻选择为战败者留出重建空间的帝国，在胜利的那一刻就理解了某种关于长时间尺度的、真正难以理解的东西。\n\n大多数帝国在拥有优势时便巩固其优势。你的帝国选择了一种不同的算计。两个半世纪的结果已在记录中。编年史无以复加，除了：算计是正确的。"
 eoe_legacy.212.desc_a_revised:0 "两百五十年前，你的帝国在胜利后选择了仁慈。在百年之际你的史学家们得出结论，仁慈并未产生所希望的结果——算计在形式上是正确的，数字却错了。修正承认了局限性，而没有否定原则。编年史已观看了那之后的一个半世纪。\n\n闭合评估是，修正是诚实的，且诚实是有成效的。一个能审视自己的记录、并说出仁慈是真诚但不足够的帝国，是一个已学到了一堂关于仁慈实际上如何运作的具体课程的帝国——不是说它无效，而是说它在特定尺度与条件下运作，而原初缔造者们并未完全绘制出这些。\n\n你的帝国携此知识前行。它比原初的乐观主义更有用，且远比放弃原则而非精炼其应用的替代方案更有用。"
 eoe_legacy.212.desc_b_affirm:0 "两百五十年前，你的帝国将一份严苛的和平强加于一个战败的敌人。在百年之际你的史学家们肯定，那和约是正确的。编年史已观看了随后一个半世纪，现在做出其闭合评估。\n\n在长时间尺度上持续应用的威慑，按照它所宣传的那样运作——但代价是威慑理论家们通常低估的。你首场胜利所建立的秩序已经稳固。它也以超出战略核算的方式，塑造了你区域关系的特征，长达两个半世纪。\n\n编年史不带评判地记录下此点。你的帝国选择了一种特定类型的秩序。它得到了那种秩序。记录就是它所是的样子。"
 eoe_legacy.212.desc_b_revised:0 "两百五十年前，你的帝国将条款强加于一个战败的敌人。在百年之际你的史学家们得出结论，那些条款所产生的怨恨，已结晶为某种比预期更有组织、更持久的东西。修正承认了代价，而未逆转政策。编年史已观看了那之后的一个半世纪。\n\n闭合评估是：一份严苛的和平是一种特定类型的稳定——就它不崩溃而言是稳定的，就它需要持续管理且永不停止产生使其成为必要的那些条件而言是不稳定的。你的帝国已管理这种稳定长达两百五十年。\n\n若有可用的两个半世纪的证据，它是否会再次选择同样的和约，是编年史不予回答的问题。它记录所选择的以及它所产生的是什么。那是编年史的职能。"
 eoe_legacy.212.desc_c_affirm:0 "两百五十年前，你的帝国赢得了一场它未曾寻求的战争，并小心地背负着其代价。在百年之际你的史学家们肯定，那份无奈曾是智慧。编年史合上此章。\n\n在两个半世纪间被制度化并经受检验的无奈，产生了一种特定类型的文明品格——一种既非侵略性亦非被动，而是真正能辨别出何时冲突的代价值得承担的品格。大多数规避冲突的文明，之所以如此是因为它们恐惧它。你的帝国已发展出某种更罕见的东西：一种关于何时冲突必要、何时不必要的真诚核算实践。\n\n跨越两百五十年的记录是，此实践服务你的帝国良好的时候，多过不良好的时候。编年史将之记为一项成就。它是一项成就。"
 eoe_legacy.212.desc_c_revised:0 "两百五十年前，你的帝国无奈地赢得了一场战争，并从这份经历中构建了一种审慎冲突的信条。在百年之际你的史学家们得出结论，此信条偶尔会在需要速度时产生犹豫。修正向其中建立了一种识别其自身极限的机制。编年史已观看了那之后的一个半世纪。\n\n闭合评估是，一个能够审视其自身默认设置并在不抛弃它们的情况下精炼它们的制度，是一个健康良好的制度。你的无奈信条现在比它在百年之际时更复杂了。它更知道何时坚守，也更知道何时不要。\n\n两百五十年的审慎冲突，已造就了一个理解大多数帝国所不理解的某事的帝国：战斗的决定与不战斗的决定，两者皆是主动的选择，而默认选择其中任何一个，是一种不做决定的形式。你的帝国已学会去做决定。编年史将此记录为意义重大。"

 eoe_legacy.312.title:0 "编年史合上此章"
 eoe_legacy.312.desc_a_affirm:0 "两百五十年前，你的帝国宣告自己以其所建之物定义。在百年之际你的史学家们肯定了那宣言。在两百年时辩论回归，并再次以支持建造者而解决。编年史合上此章。\n\n一个选择被其建造所定义、然后切实建造，在两个半世纪间，以此宣言所要求的尺度——而非缩减抱负以匹配现实——的帝国，是一个具有不寻常一致性的帝国。大多数宣告自己为建造者的文明，建造的比它们意图的要少，并称此差距为战略灵活性。你的帝国建造了它说它会建造的东西。\n\n结构屹立。记录卷帙浩繁。宣言是诚实的，执行是诚实的，而一份诚实的宣言在两百五十年间被诚实地执行，是一件比它听起来的更罕见的事。"
 eoe_legacy.312.desc_a_revised:0 "两百五十年前，你的帝国宣告自己以其所建之物定义。在百年之际你的史学家们得出结论，宣言已超越了智慧——巨型尺度的承诺是在完全理解代价之前做出的，而对这些代价的诚实清算，比最初的自我形象更有价值。修正持续了一个世纪。\n\n编年史的闭合评估是，修正是更重要的成就。一个建造得宏伟壮丽的帝国并不罕见。一个建造得宏伟壮丽、然后在百年之际，诚实地审视那份承诺在其未优先考虑的领域花费了什么代价——并将那知识融入其后一个世纪如何建造——的帝国，则更罕见。\n\n你的帝国是第二种。这是更难以成为的样子，编年史如此记录。"
 eoe_legacy.312.desc_b_affirm:0 "两百五十年前，你的帝国因建造一座巨构合乎理性而建造了一座。大型建造的务实主义框架已在百年之际和两百年时被肯定为正确的方式。编年史以其自己的评估合上此章。\n\n在巨型建造中的务实主义，在两个半世纪间持续应用，恰好产生它说它会产生的：高效的基础设施，可衡量的回报，以及一个非常擅长解决它已认定为问题的那些问题的文明。\n\n编年史不争议此点。它在合上时指出，你的帝国也非常擅长认定哪些问题算作问题——而这第二项技能，原初的务实主义框架并未明确培养，却已在两百五十年间与第一项并肩发展。一个建造得好、且也知道该建造什么的帝国，与一个只知道如何建造的帝国并非同一回事。此区别值当记录。"
 eoe_legacy.312.desc_b_revised:0 "两百五十年前，你的帝国因经济意义而建造了一座巨构。在百年之际你的史学家们得出结论，纯粹务实主义的框架，无论在其所衡量的东西上多么有效，一直在衡量某种比实际重要之物更狭隘的东西。修正开始了以某种更难量化的东西补充指标的工作。编年史已观看那工作持续了一个半世纪。\n\n闭合评估是，工作仍在进行中——两个世纪的务实文化，不会在五十年内完全重新定向，而你的帝国在两百五十年之际，处于它立志成为的纯粹务实主义文明，与它决定成为的更具哲学完整性的文明之间的某处。\n\n编年史将此记为一个处于一场真诚转变中途的文明。那是一种比一个已完成成为某物的文明、或一个已认定自己已然是某物的文明，更有趣的存在状态。"
 eoe_legacy.312.desc_c_affirm:0 "两百五十年前，你的帝国竣工了一座巨构，并选择了谦恭而非自得。那份谦恭已在百年之际和两百年时，被肯定为正确的回应。编年史合上此章。\n\n一个建造了其最伟大成就、然后诚实地问它代价是什么，而非庆祝它所获得之物的文明，是一个与其自身能力有着不寻常关系的文明。它不将力量视为通行许可。它不将成就视为正当理由。它建造，然后它清算，而清算是真诚的。\n\n两百五十年的这种实践，已造就了一个以更野心勃勃、却跑得太快而无法做诚实核算的文明通常所不具备的方式了解自身的帝国。编年史将此记为一种特定形式的文明智慧——比雄心累积得更慢，但当其降临时更持久。"
 eoe_legacy.312.desc_c_revised:0 "两百五十年前，你的帝国竣工了一座巨构并选择了谦恭。在百年之际你的史学家们得出结论，谦恭已在某些领域从美德染上了习惯——那种文明性的克制反射，偶尔在行动明显被指示时阻止你的帝国行动。修正没有抛弃谦恭，而是精炼了它。编年史已观看了那之后的一个半世纪。\n\n闭合评估是，一个能够精炼其自身美德的文明，是一个制度健康良好的文明。你的缔造者们所示范的谦恭是真的。你的帝国在百年之际所做的，将那份谦恭与其影子——与过度谨慎、与制度惰性、与不做决定的舒适——区分开来的工作，也是真的。\n\n两百五十年已造就了一个知晓其克制何时是智慧、又何时是智慧之影子的帝国。那是比全然的雄心或全然的谨慎都更难的知识。编年史将其记为更有价值的那种。"

 # -- eoe_dlc.87 -- 星海天罚（涅墨西斯 DLC）
 eoe_dlc.87.title:0 "编年史记下一份宣言"
 eoe_dlc.87.desc:0 "有一类编年史通常不会遇到的决定。大多数文明选择是增量的——你的帝国增添一项能力，赢得一场战争，建造一座结构，形成一段关系。即使是巨像的使用，在编年史的记录中，也只是一项行为：一件所行之事，一个被改变的世界，一项带有后果的决定。这不一样。\n\n你的帝国没有做某件事。它宣告了它是什么。\n\n朝向灾殃的飞升不是一种军事姿态或一项外交立场。它是一份关于文明力量之目的的声明：你的帝国所能成为的顶点，是银河组织起来对抗的那个东西。不是最强的帝国。不是最先进的。而是通过成为所有其他文明必须要么击败、要么被其吞噬之物，来定义这个时代的那个。\n\n编年史是一份记录文明是什么的文件。大多数条目描述成就、选择、关系、决定时刻。这条描述了一种身份。\n\n雄心轴移动。不是因为你的帝国在寻常意义上展现了雄心——它展现了超越那之上的某种东西。它展现了雄心，被带至其逻辑终点后，会变成某种银河识别为一种存在性状态的东西。\n\n编年史记录下此宣言。随后之事，并非编年史所能预想。"

