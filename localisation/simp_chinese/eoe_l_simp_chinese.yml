 # ════════════════════════════════════════════════════════════════════════
 # v1.7.5 - 碎星者与主宰里程碑
 # ════════════════════════════════════════════════════════════════════════

 # ── eoe_dlc.21 - 巨像行星毁灭（启示录） ───────────────
 eoe_dlc.21.title:0 "终结的世界"
 eoe_dlc.21.desc:0 "编年史记录下这一刻。一个世界已被终结——不是被损坏，不是其人口被轨道轰炸抹除，不是被占领与吸收，而是被终结。无论机制为何，结果是相同的：曾有一个世界之处，如今不再有一个世界。你的帝国所建造与瞄准的巨像，最终被用于了其最绝对的目的。\n\n史学家们将争论这意味着什么。军事理论家们将计算其威慑价值及它所创下的先例。外交官们将监测邻邦们的反应，他们现在知晓了你的帝国有能力且愿意做什么。编年史不记录那些计算。它记录的是，一个世界曾存在，而它如今不复存在，而你的帝国是其原因。"

 # ── eoe_dlc.31 - 主宰建成（联邦） ──────────────────────────
 eoe_dlc.32.title:0 "主宰"
 eoe_dlc.32.desc:0 "主宰已驶出船坞。在过去几年间在干船坞中成形之物，不完全是舰船，也不完全是空间站——它同时是两者，而此区别不如其能力重要。\n\n一个移动的行动基地。一个携其自身基础设施穿越虚空的自主平台。在历史记载中，建造主宰的文明之所以如此，是因为它们已超越了力量需要固定地址这一假设。你的帝国现已加入它们。\n\n编年史记录下服役日期、建造时间以及名字——若有给予的话。其余则是行动史了。"

 # ════════════════════════════════════════════════════════════════════════
 # v1.7.6 - 四个新的里程碑事件
 # ════════════════════════════════════════════════════════════════════════

 # ── eoe_dlc.33 - 首个殖民地 ────────────────────────────────────────────
 eoe_dlc.33.title:0 "第二个世界"
 eoe_dlc.33.desc:0 "一艘殖民船已在一个你母星系以外的世界着陆，殖民者们已提交了将营地转化为殖民地的手续。你的帝国已不再是一个单一星球文明。\n\n编年史不带仪式地记下此转变。你的帝国最终将成为的大部分事物，已因此殖民地的存在这一事实而启动：行政扩张、外交暴露、补给线、文化扩散，以及当你拥有不止一个世界要治理时，你意图成为何种帝国的问题。\n\n对此问题的答案将需要数世纪才能变得清晰。编年史已开始计时。"

 # ── eoe_dlc.34 - 首场战争战败 ──────────────────────────────────────────
 eoe_dlc.34.title:0 "首次战败"
 eoe_dlc.34.desc:0 "一场战争已结束，而你的帝国输掉了它。\n\n编年史记录下此点，而不附加评论。战败不是文明的失败——它是关于此文明的信息：关于它视什么为值得一战，它误算了什么，它低估了什么，以及它将采取何种不同的做法。从未输掉过战争的帝国，要么极为幸运，要么从未为任何值得输掉的事物而战。\n\n你的帝国现已以让教训刻骨铭心的那种货币，学到了误判的代价。编年史记下所接受的条款，所割让的领土，所咽下的骄傲。它也指出，你的帝国在战败中存活了下来，这并非必然，且本身值得记录。"

 # ── eoe_dlc.35 - 首次考古完成 ─────────────────────────────
 eoe_dlc.35.title:0 "完成的记录"
 eoe_dlc.35.desc:0 "发掘结束了。器物被编目，遗址报告被归档，而留下这些遗骸的文明，已被证据所允许的彻底程度加以研究。\n\n考古学是阅读死者的学科——从生者逝去后所遗留之物中，重建意图、文化与日常生活。你的科学家们现已在你帝国历史上首次做到了这一点。他们已审视了另一个文明所遗留的，并学会了阅读它。\n\n编年史记下此遗址、所涉研究员及主要发现。它也指出，每个文明都会留下遗骸。你的帝国已正在积累它们。"

 # ── eoe_dlc.36 - 天堂之战 ───────────────────────────────────────────
 eoe_dlc.36.title:0 "天堂之战"
 eoe_dlc.36.desc:0 "天堂之战结束了。\n\n编年史在此停驻。觉醒的上古失落帝国之间——在比你文明有记载的历史更古老的强权之间，它们从蛰伏中归来，带着银河仍该由它们瓜分的假设——的银河冲突，已达其终局。一个觉醒的上古失落帝国已被毁灭，而你的帝国见证了此点，或对此有所贡献，或从中幸存。\n\n上古失落帝国在历史记载中代表什么，是有争议的。它们是文明能达到非凡高度的证据。它们也是非凡高度并非永久的证据。编年史记下这两项事实。它也指出，存在于天堂之战终结时的银河，与存在于其开始时的银河是不同的，而你的帝国——无论扮演了什么角色——是其原因的一部分。"

 # ── eoe_dlc.22 - 非毁灭性巨像使用 ────────────────────────────
 eoe_dlc.22.title:0 "被改变的世界"
 eoe_dlc.22.desc:0 "编年史记录下这一刻。一个世界已被改变——不是被殖民，不是被轨道轰炸至屈服，不是通过战争声明占有，而是以唯有巨像使之可能的文明尺度被改变。那个世界上的居民将不会简单地如常继续。行星本身或许也不会简单地如常继续。所行之事无法以任何寻常手段撤销。\n\n编年史在此处所做的区分是精确的：此世界存续。它仍在其所在的星系。它仍有质量与地表，且在大多数情形下，有居民。但它已不是你舰队抵达之前的那个世界了。无论对它做了什么——无论巨像被建造来做什么——已被施行。彻底地。在远距下。未经地面上任何人的同意。\n\n编年史记录下此点，而不附加评论。它记下目标、方法与日期。无论地表上具体结果如何，银河对巨像使用的反应是一致的——你的帝国已同时展示了能力与意愿。这两项是令所有观望者在意的事实。"

