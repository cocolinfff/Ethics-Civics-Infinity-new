 eoe_trans.430.desc:0 "自你的帝国首次跨越超凡门槛并宣告它相信那跨越意味着什么以来，一个世纪已经过去。一百年足以积累证据。编年史提出此问题，不是作为考验，而是作为一次诚实的核算：你的帝国所选择的框定，是否仍描述着它已变成的样子？原初的宣言——谨慎的进化——是在一个转变时刻做出的。生活在此宣言内部的一百年，已产生了后果。编年史发问，你的帝国如何解读它们。"
 eoe_trans.430.opt_affirm.tt:0 "一个世纪的证据已验证了原初的框定。宣言成立。肯定它加深了信念并应用一个强化修正。"
