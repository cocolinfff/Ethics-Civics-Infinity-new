 # ════════════════════════════════════════════════════════════════════════
 # v1.5.0 - 扩展的里程碑追踪 + DLC里程碑
 # ════════════════════════════════════════════════════════════════════════

 # ── 共享选项 ────────────────────────────────────────────────────────
 eoe_dlc.opt.noted:0 "已知悉。编年史载录此事。"

 # ── eoe_dlc.1 - 首个传统树完成 ───────────────────────────
 eoe_dlc.1.title:0 "第一条道路完成"
 eoe_dlc.1.desc:0 "你的帝国已完成其首个传统树。这并非小事。一个传统树不是一份习惯清单——它是一种哲学承诺，逐步渐进，最终变得结构化。终结者并非重点。导致它的选择模式才是。\n\n编年史注意到此完成。它所等待观察的，是第二棵树，以及那选择会是一致的还是矛盾的。"

 # ── eoe_dlc.2 - 关键科技里程碑 ────────────────────────────────
 eoe_dlc.2.title:0 "理解的顶点"
 eoe_dlc.2.desc:0 "你的研究员们已跨越了一道大多文明从未触及的门槛。他们手中的科技，并非渐进式的改进。它是一种类别上的改变——那种能重写可能之事，进而重写想象之事的知识。\n\n编年史不是技术文档。它不记录规格或产量。它所记录的是，你的文明现已变成拥有此物的那种文明。那是一种与科技本身不同类别的事实。"

 # ── eoe_dlc.3 - 星海共同体 ──────────────────────────────────────
 eoe_dlc.3.title:0 "星海共同体"
 eoe_dlc.3.desc_founder:0 "你的帝国在场于创建之初。这并非偶然——星海共同体的形态反映了建立它的文明所做的选择，而你的帝国是决定它将成为什么的一员。\n\n编年史记下这一刻。它所尚不能记录的是，这制度是否会比其背后的意图更长久。"
 eoe_dlc.3.desc_member:0 "你的帝国已加入星海共同体。此共同体由他人所建，由他人所塑，而你的帝国是按其既存的样子进入的——而非按你帝国会建造它的方式。\n\n编年史记录下此成员身份。加入一个并非由自己设计的制度，其中蕴含着一种特定的文明成熟。"

 # ── eoe_dlc.4 - 首个附庸被整合 ────────────────────────────────
 eoe_dlc.4.title:0 "整合"
 eoe_dlc.4.desc:0 "进程已完成。曾是独立帝国者，如今是你的一部分——其人口，其行政，其理解银河的特定方式。这些东西不会干净地消融于一个新的整体。它们被带向前，有时以吸收的帝国未曾预料的形式。\n\n编年史记录下此整合。你的帝国如今更大了，并与其所吸收的成比例地不同了。这两者是否同一回事，是你下一代史学家将开始回答的问题。"

 # ── eoe_dlc.5 - 首个行星被征服 ──────────────────────────────────
 eoe_dlc.5.title:0 "攻取的第一世界"
 eoe_dlc.5.desc:0 "地面部队已确保地表。此行星的旗帜，无论曾是何物，已从行政中心消失。你的旗帜取而代之。\n\n编年史注意到此区别。你的帝国以前殖民过，整合过，交易过世界。这是它首次直接夺取一个。曾生活在此的人民并未对此事投票。那是另一种类别的获取——在编年史的记录中，并不比其他的更好或更坏，但不同。编年史保有各自的账目。"

 # ── eoe_dlc.6 - 虚境契约 ─────────────────────────────────────────
 eoe_dlc.6.title:0 "契约"
 eoe_dlc.6.desc:0 "连接已经建立。寻常现实另一侧的某物，已直接与你的帝国接触——不是作为待研究的现象，而是作为一项安排的当事方。你的灵能学者们花了数周争论究竟达成了什么。条款在你外交官受训的任何框架中都是不可读的。\n\n编年史记录下此契约，并记下可被记录之事：一道门槛被跨越了。你的帝国现对一个不承认你法律学者所操作的那些范畴的实体负有义务。此类安排的历史并不鼓舞人心。拒绝它们的历史无案可查。"

 # ── eoe_dlc.7 - 国家类型/角色变更 ─────────────────────────────
 eoe_dlc.7.title:0 "权力的特征"
 eoe_dlc.7.desc_awakened:0 "长眠已结束。那个曾一度退出银河的古老帝国已经归来，而它是作为你的帝国归来的。你文明所代表的蛰伏潜能，已被你帝国的缔造者无法预测、或许也不愿见到的境况所激活。\n\n编年史记录下此觉醒。它指出，银河即将领教你的帝国将是何种长老文明。"
 eoe_dlc.7.desc_custodian:0 "你的帝国已接受守护者之职。星海共同体已将其延续性部分置于你手中，带着一个任期与一份期望。编年史指出，这并非一场征服。这是一份责任。此区别是你的帝国将受考验之处。"
 eoe_dlc.7.desc_emperor:0 "银河帝制有了一个新的重心，而它是你的帝国。编年史记录下此事，而不带此刻无疑在你的首都所受到的礼遇。历史将裁定的不是加冕，而是随之而来的事。"
 eoe_dlc.7.desc_generic:0 "关于你帝国在银河中位置的某些根本之处已经改变。先前定义它的范畴已不再完全适用。编年史记录下此转变，并等待观察新的定义将是什么。"

 # ── eoe_dlc.10 - 灵能飞升 ──────────────────────────────────────
 eoe_dlc.10.title:0 "心智超凡"
 eoe_dlc.10.desc:0 "你的帝国已投身于灵能之道。这不是一个研究计划或一项政策议程。它是一种文明取向——决定意识本身的发展便是你的人民将成长的方向。\n\n编年史注意到此承诺。达到成熟期的灵能文明将这种经历描述为不可逆的：不是因为它们不能放弃此道，而是因为此道改变了“想象放弃它”意味着什么。"

 # ── eoe_dlc.11 - 合成飞升 ────────────────────────────────────
 eoe_dlc.11.title:0 "合成进化"
 eoe_dlc.11.desc:0 "你的帝国已投身于合成进化。你文明的生物基质已不再是其最终形态。你的人民正在变成什么，是你的生物学家们能描述、你的工程师们能规划、但你的哲学家们仍在争论的一个问题。\n\n编年史记录下此承诺，而不假装争论已尘埃落定。它所指出的是，决定已做出，而此等规模的决定往往会决定随后一切事物的形态。"

 # ── eoe_dlc.12 - 生物飞升 ───────────────────────────────────
 eoe_dlc.12.title:0 "生物学的顶点"
 eoe_dlc.12.desc:0 "你的帝国已投身于精通生物生命。你所属的物种并非你将是的物种——你的科学家们已决定，文明的终点是生命体的完美，而非其超越。\n\n编年史注意到此取向。生物飞升文明往往在三大主要飞升道路中产生最多样化的长远结果。你的帝国是否会位列那些找到了它们所寻之物的帝国之中，尚无法回答。"

 # ── eoe_dlc.13 - 环世界/戴森球 ───────────────────────────────
 eoe_dlc.13.title:0 "旷世巨作竣工"
 eoe_dlc.13.desc_ringworld:0 "环世界已竣工。一个包含着比已知银河中多数有人居住的星系还要多的可居住表面的结构，环绕着一颗你的先祖曾从一艘比此环最小结构部件还小的飞船上勘测过的恒星。\n\n编年史记录下此竣工。并非带着惊讶——你的工程师们是称职的，你的资源是充足的。编年史所记录的是，此竣工对一个文明的自我尺度感意味着什么。你的帝国现在以与大多数文明不同的数量级进行建造。"
 eoe_dlc.13.desc_dyson:0 "戴森球已竣工。恒星被包裹。其曾向四面八方逃逸、进入一个大多并未从中受益的宇宙的总能量输出，现在完全属于你的帝国。\n\n编年史记录下这一文明将一颗太阳包覆起来的时刻。设计最初阶段的工程师们早已逝去。完成最后阶段的工程师们正在庆祝。那颗恒星，无意见可陈，继续燃烧。"

 # ── eoe_dlc.20 - 摧毁恒星系 ──────────────────────────────────
 eoe_dlc.20.title:0 "不复存在的星系"
 eoe_dlc.20.desc:0 "恒星消失了。环绕它的一切都消失了。曾生活在那里的一切——如果曾有过，无论你的情报部门记录下了关于它的什么——都消失了。巨像已展示了它被建造来展示的东西。\n\n编年史记录下此事件，而不评论其必要性。你的帝国现已摧毁了一个恒星系。从此刻起，这句话将出现在每一部关于你文明的重要历史中。编年史无法告诉你它将以警告、转折点、罪行，还是单纯的事实出现。那份裁定属于比你更长久者。"

 # ── eoe_dlc.30 - 联邦里程碑 ───────────────────────────────────
 eoe_dlc.30.title:0 "联邦深化"
 eoe_dlc.30.desc_max:0 "你的联邦已达到最大凝聚力。起初是权宜的——或必要的，或利益共享的，取决于你相信哪位创始成员的记述——联盟，已变得更加结构性地稳固。\n\n编年史记录下此成就，而不预测其持久性。处于最大凝聚力的联邦，要么成为它们所在银河区域中最稳定的实体，要么遭受最壮观的崩溃。其差别往往归结于接下来发生什么。"
 eoe_dlc.30.desc_joined:0 "你帝国内部在联邦中的地位已然深化。你文明与其伙伴们之间的关系，已通过了另一道承诺的门槛。编年史记录下此里程碑，而不推测其他成员是否也感同身受。"

 # ── eoe_dlc.31 - 星海共同体创建 ────────────────────────────────────────
 eoe_dlc.31.title:0 "在创建之时"
 eoe_dlc.31.desc:0 "星海共同体建立之时，你的帝国在场。将会有文明后来加入，它们将永远是成员而非创建者。你的帝国并非其中之一。\n\n编年史记录下此创建时刻。你帝国曾参与创建的制度，要么将成为银河中最重要的结构之一，要么将成为野心勃勃却最终失败的银河治理尝试史上的一个注脚。你的帝国在其成为何者上押下了赌注。"

 # ── eoe_dlc.40 - 守护者 / 皇帝 ────────────────────────────────────
 eoe_dlc.40.title:0 "银河之重"
 eoe_dlc.40.desc_custodian:0 "你的帝国已接受守护者之职。星海共同体已授予其信任——有条件地，带着任期，附有期望。编年史指出，这是一个完全由其如何履行来定义的角色。一位利用此职位巩固自身权力的守护者，与一位真正保护了其被要求守护之制度的守护者，将被以不同的方式铭记。"
 eoe_dlc.40.desc_emperor:0 "银河有了一位皇帝，且他是你帝国的领袖。银河帝制是一项非凡的制度——将霸权的逻辑转化为某种具有宪政合法性的事物的一次尝试。它是否成功，是历史将在当前职位占有者离去许久之后才会回答的问题。编年史记录下此加冕。它已在关注接下来发生什么。"

 # ── eoe_dlc.50 - 虚境被突破 (SotS) ─────────────────────────────────
 eoe_dlc.50.title:0 "帷幕之外"
 eoe_dlc.50.desc:0 "寻常现实与无论其另一侧存在着什么之间的边界已被跨越。你的灵能者们不只是侦测到了虚境或对它进行了理论化——他们进入了它。他们归来了，这并非必然。他们随身带回了什么，就知识而言和就改变而言，仍在评估之中。\n\n编年史记录下此突破。它指出，那些突破虚境的文明往往将这次经历描述为定义性的——作为将其历史划分为之前和之后的事件。你的帝国现已进入了之后。"

 # ── eoe_dlc.51 - 宗主契约 (SotS) ─────────────────────────────────
 eoe_dlc.51.title:0 "宗主的关注"
 eoe_dlc.51.desc:0 "虚境中的某个实体已选择直接与你的帝国接触。此关系的性质并不简单——所提供的并非无条件给予，所要求的并非无足轻重。\n\n编年史记录下此契约。你的学者们争论这是盟友、交易，还是某种在文明范畴中没有恰当名称的事物。编年史所指出的是，某个拥有相当力量的存在已决定你的帝国值得持续接触。这份评估的含义需要时间才会变得清晰。"

 # ── eoe_dlc.60 - 物种改造 ───────────────────────────────────
 eoe_dlc.60.title:0 "我们之所是的形态"
 eoe_dlc.60.desc_synthetic:0 "改造已完成。你的物种——或其相当大的一部分——已不再是它曾所是。你的工程师们所达成的合成转化并非表面的或渐进的。它是关于你的人民是何种实体的一次类别性改变。\n\n编年史记录下此转化。未来的史学家们将争论，在改造之后它是否应该被称为与改造之前相同的物种。你的帝国已决定不等待那场争论得出结论。"
 eoe_dlc.60.desc_biological:0 "此改造计划已产生其预期结果。你的物种已被改变——不是出于偶然，不是出于适应，而是出于将生物知识审慎应用于你的人民应成为什么这个问题。\n\n编年史记录下此成就而不裁断伦理。生物改造计划已产生了从真正有益到真正灾难性的各种结果。你帝国的科学家们相信他们取得了前者。编年史将观察。"
 eoe_dlc.60.desc_generic:0 "一项重大的物种改造已完成。在此之前你的人民所是之样貌，现在也是他们不再所是之样貌——同时是起点和被改变了的东西。你的生物学家们已提交了竣工报告。你的哲学家们尚未就其含义达成一致。\n\n编年史记录下这两种状态。它们之间的间隙，便是那有趣问题所在之处。"

 # ── eoe_dlc.70 - 首个遗珍 ─────────────────────────────────────────────
 eoe_dlc.70.title:0 "某件古老之物"
 eoe_dlc.70.desc:0 "你的考古学家们发现了某件比你的文明早出一个数量级、令此比较几乎毫无意义的物品。这件器物古老得如同星辰那般古老——不是制度或传统古老的那种古老。\n\n编年史记录下此获取。它所指出的是，你的帝国如今拥有一件由一个不再存在的文明所造之物，而他们与你帝国之间的鸿沟大到足以令人谦恭。你的研究员们是会感到谦恭，还是仅仅感到好奇，仍有待观察。"

 # ── eoe_dlc.71 - 星界裂隙被探索 ───────────────────────────────────
 eoe_dlc.71.title:0 "裂隙被横跨"
 eoe_dlc.71.desc:0 "星界裂隙已被完全探索。你的舰船已穿越了某种并非寻常意义上太空区域的事物——现实中的一道褶皱，其内容并不遵循你的工程师们受训所用的物理学。\n\n编年史记录下此探索。从一处完全探索的星界裂隙带回的，不仅是资源或情报。还有一种特定的知识，即银河中存在按不同规则运行的地方，而你的帝国拥有无论如何都会穿越其中的那种探索者。"

 # ── eoe_dlc.80 - 专家附庸 ─────────────────────────────────────
 eoe_dlc.80.title:0 "专门化的关系"
 eoe_dlc.80.desc:0 "你的帝国已定义了一个附庸在其结构内的用途。此关系不再仅仅是等级性的——它是功能性的，围绕附庸做什么而非仅仅它欠什么来塑造。你的行政官员们发现这更有效率。你的外交官们发现这更稳定。\n\n编年史记录下此安排而不裁断其正义性。一个被赋予既定角色的附庸，有着更少需要应对的模糊性和更少可以行使的选项。他们会将此体验为明晰还是受限，取决于你问的是安排中哪一边的人。"

 # ── 飞升轴 - 调试菜单标签 ──────────────────────────────────
 eoe_menu.52.opt.ascendance_3:0 "飞升：§Y层级3§! - 他们已超越凡尘。"
 eoe_menu.52.opt.ascendance_2:0 "飞升：§C层级2§! - 道路已定。"
