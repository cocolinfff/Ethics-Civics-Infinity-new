 eoe_menu.10.opt.reframe_asc_affirmed:0 "§Y飞升：已肯定§! - 原初哲学被重新验证。"
 eoe_menu.10.opt.reframe_asc_partial:0 "§C飞升：经深思§! - 部分重释已应用。"
