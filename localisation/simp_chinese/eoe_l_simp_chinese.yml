 # 飞升链 - 进展标记
 # ════════════════════════════════════════════════════════════════════════

 eoe_legacy.401.title:0 "四分之一世纪之后"
 eoe_legacy.401.desc:0 "首个飞升天赋已在四分之一世纪前被选择。你的顾问们已准备了惯常的总结。惯常的总结指出，此决定已变得结构化——融入预算中，融入任命中，融入你的行政官员们开展工作时所带的假设中。他们大多从未知晓无天赋的帝国。对他们来说，这仅仅是你的文明被定向的方式。\n\n编年史记录下此四分之一世纪。它还不够长到做出一份裁决。但它已够长到知道此选择已扎下了根。"

 eoe_legacy.402.title:0 "第一批史学家们"
 eoe_legacy.402.desc:0 "五十年。完全在飞升决定之后成长起来的第一代人，已撰写了他们的学位论文，加入了学院，并开始对他们父母的选择有了看法。\n\n分歧在形式上若非内容上是可以预见的。一些人将首个天赋视为一个新文明时代的拐点。另一些人则将其视为被赋予了回顾性重要性的渐进政策决定。第三群人指出争论本身即是证据——文明不会以这种强度争论那些无关紧要之事。\n\n编年史记录下此史学史的出现。五十年足够近得能感受到热度，又足够远得能开始绘制火势。"

 eoe_legacy.403.title:0 "从中生长出来的"
 eoe_legacy.403.desc:0 "七十五年。此决定已不再是一个决定。它是一种状态——你文明存在的背景事实之一，人们恰恰因其如此彻底地无处不在而不再注意到它。\n\n你的文化分析师们已在今年的调查数据中注意到一些意料之外的事。飞升选择的最初意图——无论你帝国的领导层当时自认为决定的是什么——经过七十年的制度性阐发，已产生了未曾预料、且不易归因于原初决定的次级后果。有些东西从那选择中生长了出来，而那选择并未播种下它。\n\n百年之后，你的史学家们将不得不决定如何处理所有这些。编年史正在记录他们将要使用的材料。"

 # ── 飞升重释 - 路径 A（超越之道） ──────────────────────
 eoe_legacy.410.title:0 "超越之道在百年之际"
 eoe_legacy.410.desc:0 "一百年前，你的帝国选择飞升，因为那是你们的天性——因为朝向更高境界的驱动力被理解为你的文明之所是，而不仅仅是它正在做之事。\n\n自那以来，一个世纪的后果已然累积。你的哲学家们，你的史学家们，你的公共知识分子们，以及你的普通公民们，都已对原初选择意味着什么以及它产生了什么形成了看法。那些看法并不统一。\n\n编年史现在发问：你的帝国如何理解它所选择的？不是发生了什么——那已被记录。但它意味着什么？对一个文明决定的框架设定，其本身即是一个文明决定。史学家们正在等待你的答案。"
 eoe_legacy.410.opt_affirm:0 "肯定原初的框架。"
 eoe_legacy.410.opt_affirm.tt:0 "朝向超越的驱动力是正确的。原初的理解被重申并深化。现有的飞升修正被已肯定的变体取代。"
 eoe_legacy.410.opt_partial:0 "承认复杂性。部分重释。"
 eoe_legacy.410.opt_partial.tt:0 "驱动力是真实的，但这个世纪揭示了细微差别。我们在不否定原初哲学的情况下调整它。修正调整为平衡变体。"
 eoe_legacy.410.opt_reverse:0 "否定它。解读已经改变。"
 eoe_legacy.410.opt_reverse.tt:0 "曾被视为天命之事，如今被理解为强迫。此哲学被重铸。新的修正反映此清算——伴随着历史修正所带来的文化断裂的代价。"

 eoe_legacy.411.title:0 "新的记录"
 eoe_legacy.411.desc_affirm:0 "史学家们有了他们的答案。原初的框架被重申——并非不加批判地，并非不承认这个世纪所产生的一切，而是在其本质特征上被重申。你的帝国飞升，是因为那是你帝国之所是。这个世纪没有改变这一点。若说有什么，它使论据更清晰了。\n\n编年史记录下此肯定。原初的修正被一个反映了回顾印证所加深的信念的修正所取代。一个重访其创立决定并发现它们是正确的帝国，是一个了解自身的帝国。"
 eoe_legacy.411.desc_partial:0 "史学家们已产生了某种比背书更为复杂的东西。原初的选择是真实的，后果是真实的，而这个世纪揭示出，真相坐落在原初框架与其批评者之间。你的帝国承认这一点。\n\n修正被调整，以反映一个已经代谢了其自身复杂性的文明——在其原初取向上不那么纯粹，在其对飞升选择实际产生了什么的理解上更为成熟。"
 eoe_legacy.411.desc_reverse:0 "史学家们已得出一个缔造者们本不会认得的裁决。曾被框定为天命之事已被重铸为警示故事——不是对技术成就的否定，而是对其曾经意味着什么的根本性修正。\n\n此修正的代价是真实的。集体记忆不会在没有摩擦的情况下改变方向。新的修正同时反映了重释的收益——一个已对抗过自身神话的文明——以及随之而来的文化断裂。"

 # ── 飞升重释 - 路径 B（务实飞升） ──────────────────────
 eoe_legacy.420.title:0 "务实飞升在百年之际"
 eoe_legacy.420.desc:0 "一百年前，你的帝国选择飞升，因为那是实用的——因为力量是工具，而超越是一个希望保持影响力的帝国可用的工具之一。\n\n一个世纪已检验了此框架。起作用的工具产生拥护者。令人失望的工具产生修正主义者。你的帝国已积累了这两种人。务实主义的论点——即原初选择应根据其结果来评估——如今自身正根据其结果被评估。\n\n编年史发问：经验案例站得住脚吗？而如果它不完全站得住脚，最初的框架又有多少能幸存下来？"
 eoe_legacy.420.opt_affirm:0 "成果证实了此道。"
 eoe_legacy.420.opt_affirm.tt:0 "务实主义框架是正确的。成果为框架正名。已肯定的修正适用——比原初更强。"
 eoe_legacy.420.opt_partial:0 "情况是复杂的。承认它。"
 eoe_legacy.420.opt_partial.tt:0 "成果是真实的但也是复杂的。我们在不放弃框架的情况下整合批评者的观点。平衡修正适用。"
 eoe_legacy.420.opt_reverse:0 "务实主义曾是一种合理化。"
 eoe_legacy.420.opt_reverse.tt:0 "成果揭示出原初框架往好里说是不完整的，往坏里说是自私自利的。完全逆转——伴随着修正制度叙事的代价。"

 eoe_legacy.421.title:0 "新的记录"
 eoe_legacy.421.desc_affirm:0 "经验案例被复审了，批评者被聆听了，议会作出了其裁决：务实主义框架是正确的，而此世纪的成果为原初框架正名。\n\n一个依据证据评估其选择并发现证据确凿的帝国，是一个可以信任其自身方法的帝国。你的史学家们带着些许满足感记下这一点：务实道路以其自身标准验证了自身，他们承认，这要么是完美的证实，要么是一个自我证成式的论据，取决于你的哲学承诺。\n\n议会对这种模棱两可泰然处之。产出数字仍然令人信服。"
 eoe_legacy.421.desc_partial:0 "情况是复杂的，而你的帝国已决定如实说出。此世纪的成果是真实且大体正面的。正如部分重释所承认的，它们同样在原初框架未曾预料的方面是不完整的。\n\n一个能审视自己的记录，并将成就与差距都整合起来——而不坍缩为自我庆祝或自我批评——的帝国，是一个已发展出与自身历史的成熟关系的帝国。务实主义框架幸存下来，被补充而非被取代。\n\n未来世代继承了一个按其自身标准成功了的文明，并有诚实注意到那些标准在何处过于狭隘。"
 eoe_legacy.421.desc_reverse:0 "逆转是真诚的，而自那以后的一个世纪检验了它是否也是正确的。\n\n你的帝国在百年之际做出了一个艰难的选择：它审视了自身的务实主义框架，并判定该框架，无论在其衡量的东西上多么有效，一直在衡量错误的东西。那项认承的代价是真实的——围绕一个框架建立起来的制度不会平滑地重新定向——但建立一份关于你帝国为何而存的更丰富记述的工作，已持续进行了一个世纪。\n\n史学家们在两世纪之时的评估是谨慎的：逆转产生了一个比延续本会有的更艰难的世纪，以及一个比仅凭务实主义所能建立的更诚实的文明。两者皆为真。两者皆被记录。"

 # ── 飞升重释 - 路径 C（克制之道） ───────────────────────
 eoe_legacy.430.title:0 "克制之道在百年之际"
 eoe_legacy.430.desc:0 "一百年前，你的帝国选择审慎飞升——因为银河已惩罚了骄者，而在变革性力量面前的谨慎似乎像是智慧而非怯懦。\n\n一个世纪审慎的飞升已造就了一个稳定、有度、且积累不受约束野心之问题的速度更慢的帝国。它也已造就了一个看着其他文明更快前进，并周期性地怀疑那份谨慎究竟是智慧还是恐惧的帝国。\n\n编年史既记录下此稳定，也记录下此疑虑。摆在你史学家们面前的问题的是，这两种解释中的哪一种将定义下一个世纪。"
 eoe_legacy.430.opt_affirm:0 "谨慎是正确的。肯定它。"
 eoe_legacy.430.opt_affirm.tt:0 "克制是智慧。稳定的记录不言自明。已肯定的修正——加深的稳定与增长。"
 eoe_legacy.430.opt_partial:0 "谨慎与雄心可以共存。"
 eoe_legacy.430.opt_partial.tt:0 "克制是真实的，但这个世纪已显示出容纳更多的空间。我们在不放弃自身品格的情况下重新平衡。平衡修正适用。"
 eoe_legacy.430.opt_reverse:0 "谨慎曾是一种自我设限。"
 eoe_legacy.430.opt_reverse.tt:0 "克制已被重铸为犹豫。我们否定原初框架，并拥抱我们所曾却步不前的东西。逆转修正——伴随着修正制度记忆的代价。"

 eoe_legacy.431.title:0 "新的记录"
 eoe_legacy.431.desc_affirm:0 "克制被证实了，而你的帝国已决定清晰地说出这一点。\n\n两个世纪审慎的飞升已造就了一个稳定、连贯、且未被降临于其周边文明的那些灾祸所定义的文明。那位年轻史学家的挑战被聆听、被考量，并以比较数据作答：克制，在两个世纪动荡银河中持续践行，并非怯懦。它是一种不同形式的雄心。\n\n下一个世代继承了一个知道自己为何谨慎并选择继续如此的文明。那是它周边更为野心勃勃的文明们仍在努力发展的一种自知形式。"
 eoe_legacy.431.desc_partial:0 "平衡点已然移动，而你的帝国已决定承认账目的两面。\n\n克制产生了稳定。此稳定是真实的，且纵观两个世纪的比较史，明显是有价值的。部分重释也产生了一个更细致的框架——一个能识别出何时谨慎是智慧、何时它仅仅是谨慎，并已开始建立制度能力在那些时刻采取不同行动的框架。\n\n你的史学家们将此记录为你的帝国学会对其克制抱以雄心——学会慎重决定何时坚守与何时行动，而非简单地在每种情形下都默认给出同样答案——的时期。"
 eoe_legacy.431.desc_reverse:0 "逆转是一个艰难的选择，而它已有一个世纪去产生无论它要产生什么。\n\n你的帝国审视了两个世纪审慎的飞升，并判定那份谨慎已在某些领域成为了自我设限——起初是智慧之物已钙化为条件反射，而那份反射已不再服务于它最初被设计来保护的文明。\n\n自逆转以来的这个世纪，在其特征上不同于之前的世纪。在某些地方更雄心勃勃，在另一些地方代价更高昂，且不如之前那些审慎的世纪那般平顺。你的史学家们，在回顾完整弧线时，尚未准备说逆转是错误的。他们准备说它曾是必要的——一个能够认识到其自身美德何时已沦为负债的文明，是一个能够成长的文明。"

 # ════════════════════════════════════════════════════════════════════════
 # 胜利链 - 进展标记
 # ════════════════════════════════════════════════════════════════════════

 eoe_legacy.501.title:0 "战争过后四分之一世纪"
 eoe_legacy.501.desc:0 "自第一场战争结束以来，一代人已经过去。老兵们仍然健在，他们中的大多数对这场战争意味着什么持有与官方说法相左的看法，这种分歧足以令信息部的某人感到不安而将其标记出来。\n\n编年史记录下军队数量、伤亡人数、领土结果。它无法记录战争从内部感受起来是什么样——那份特定的知识已经正在变薄，因为承载它的人已被阅读它的人所超过。这两种知晓方式之间的间隙，是战争留下的、不出现在任何一份和约地图上的事物之一。"

 eoe_legacy.502.title:0 "课程中的战争"
 eoe_legacy.502.desc:0 "五十年。战争已进入课程。你的教育官员们已做出决定——有些明确的，大多隐含的——关于如何教授它，强调什么，以及不强调什么。\n\n编年史指出，五十年是战争开始变得作为历史事件而不是亲身经历可被理解的距离。课程版本的战争比事物本身更干净。它有合理的起因，有解释的决定，以及可以被评估的结果。老兵们，如今大多年事已高，对这个更干净的版本持有看法。"

 eoe_legacy.503.title:0 "战争所造就的"
 eoe_legacy.503.desc:0 "第一场战争结束七十五年了。由那场战争所产生的——或被引战争为据而得以正当化的，或若无战争便不可能发生的——制度和政策，如今比生活于其下的大多数人更年长。\n\n你的史学家们已开始区分什么是战争直接导致的，以及什么仅仅是事后被归因于它的。事实证明，这种区分并不直截了当。战争同时重塑了如此之多的事物，以至于因果链条真的很难厘清。你的帝国既是那场战争的产物，也是服务于其当前利益的对那场战争的一种叙述的制造者。两者皆为真。"

 # ── 胜利重释 - 路径 A（仁慈的征服者） ──────────────────────
 eoe_legacy.510.title:0 "仁慈之战在百年之际"
 eoe_legacy.510.desc:0 "一百年前，你的帝国赢得了它的第一场战争并展现了仁慈——因为败者被理解为未来的邻邦而非永久的敌人，而那份仁慈既被视为一项战略选择，也被视为一项道德选择。\n\n一个世纪已检验了此框架。曾遭击败的帝国已有一百年时间变成它所变成的样子。你的史学家们现在能接触到了他们变成了什么：盟友，对手，一则警示故事，或者某种更复杂的东西。\n\n编年史发问：那份仁慈明智吗？不是它是否正确——那是另一个问题。它是否明智。而无论答案如何，你的帝国如何理解它所做的事？"
 eoe_legacy.510.opt_affirm:0 "仁慈是智慧。肯定它。"
 eoe_legacy.510.opt_affirm.tt:0 "此世纪验证了仁慈。外交记录不言自明。已肯定的胜利修正——更强的外交权重与稳定度。"
 eoe_legacy.510.opt_partial:0 "仁慈是对的，但并非不复杂。"
 eoe_legacy.510.opt_partial.tt:0 "仁慈产生了复杂的结果。我们同时承认智慧与代价。平衡修正适用。"
 eoe_legacy.510.opt_reverse:0 "仁慈被利用了。修正解读。"
 eoe_legacy.510.opt_reverse.tt:0 "此世纪已表明仁慈并未如所希望的那样得到回应。战争现在被理解为一条关于仁慈局限性的教训。完全逆转——带有代价的和平主义清算。"

 eoe_legacy.511.title:0 "新的记录"
 eoe_legacy.511.desc_affirm:0 "史学家们已陈明其论据，而你的帝国已予以认可。一个世纪前展现的仁慈是明智的——不是天真的，不是被利用的，而是在跨越百年跨度所重要的那些方面，在战略上和道德上都是正确的。\n\n记录被更新。战争现在被理解为一个特定外交传统的奠基时刻，一个已产生了你的帝国当前与其昔日对手之间所拥有关系的传统。那段关系即是证据。"
 eoe_legacy.511.desc_partial:0 "史学家们已拿出一份更为诚实的记述。仁慈是真实的，其效果是真实的，而此世纪揭示出，完整的图景既包括仁慈的成功，也包括其代价。你的帝国接受两者。\n\n修正被调整，以反映一个已经代谢了其自身军事史、既不将其神话化也不将其否认的帝国。"
 eoe_legacy.511.desc_reverse:0 "记录已被修正。曾被解读为战略性仁慈之事，如今被理解为一次误判——或许在道德上并非错误，但在实际上是不足的。那个被示以仁慈的帝国利用了被给予的时间。\n\n新的修正反映了一个其军事文化因回应此清算而转变的帝国。此修正的代价，是伴随任何制度性重新定向而来的断裂。"

 # ── 胜利重释 - 路径 B（铁腕霸主） ────────────────────────────
 eoe_legacy.520.title:0 "铁腕和平在百年之际"
 eoe_legacy.520.desc:0 "一百年前，你的帝国在第一场战争后巩固了其优势——因为赢得胜利必须被夯实，而恰当运用的力量被理解为持久和平最可靠的基础。\n\n一个世纪的铁腕和平已产生了稳定。它也在曾被击败者中产生了一种已有一百年时间组织自身的怨恨。你的情报部门已准备了一份关于那份怨恨目前面貌的总结。你的史学家们已准备了一份关于原初决定意欲何为的不同文件。\n\n编年史要求你的帝国调停这两份文件。"
 eoe_legacy.520.opt_affirm:0 "严苛的和平是正确的。肯定它。"
 eoe_legacy.520.opt_affirm.tt:0 "巩固是智慧。它所产生的稳定是证据。已肯定的修正——更强的军事权重与厌战度降低。"
 eoe_legacy.520.opt_partial:0 "稳定与怨恨皆为真实。"
 eoe_legacy.520.opt_partial.tt:0 "严苛的和平产生了它意在产生的东西，也产生了它无意产生的东西。两者皆被承认。平衡修正适用。"
 eoe_legacy.520.opt_reverse:0 "巩固是过度纠正。"
 eoe_legacy.520.opt_reverse.tt:0 "怨恨已超过了稳定。战争被重铸为关于力量作为和平基础之局限性的教训。完全逆转修正——带有代价。"

 eoe_legacy.521.title:0 "新的记录"

 # ── 胜利重释 - 路径 C（无奈的胜利者） ────────────────────────
 eoe_legacy.530.title:0 "无奈之战在百年之际"
 eoe_legacy.530.desc:0 "一百年前，你的帝国赢得了一场它未曾寻求的战争，并仔细计算了代价——因为胜利承载着一份直截了当的凯旋本不会有的分量，而官方将战争定性为可憾但必要的框架，成为了你帝国自我理解的一部分。\n\n一个世纪要么已验证、要么已复杂化了此框架。你的史学家们对此存在分歧。那份无奈是真诚的。悬而未决的是，那份无奈究竟是智慧——对武力代价的恰当承认——还是它在几十年间，变成了一种文化上的局限，阻止了你的帝国在需要果断时采取果断行动。\n\n编年史记录下这两种可能性。"
 eoe_legacy.530.opt_affirm:0 "避战是智慧。肯定它。"
 eoe_legacy.530.opt_affirm.tt:0 "审慎对待胜利的方式是正确的。产生的稳定是证据。已肯定的修正——更强的厌战度降低与人口满足感。"
 eoe_legacy.530.opt_partial:0 "避战与决心可以共存。"
 eoe_legacy.530.opt_partial.tt:0 "避战是真诚的，但我们已学会在需要时也采取行动。我们在不放弃自身品格的情况下重新平衡。平衡修正适用。"
 eoe_legacy.530.opt_reverse:0 "避战变成了犹豫。"
 eoe_legacy.530.opt_reverse.tt:0 "审慎的框架已被重铸为自我设限的克制。战争现在被理解为你帝国选择谨慎而非果断、并在此后一个世纪为此付出代价的时刻。完全逆转修正。"

 eoe_legacy.531.title:0 "新的记录"

 # ════════════════════════════════════════════════════════════════════════
 # 巨构链 - 进展标记
 # ════════════════════════════════════════════════════════════════════════

 eoe_legacy.601.title:0 "建造以来四分之一世纪"
 eoe_legacy.601.desc:0 "巨构已竣工足够长时间，完成它的工程师们已转至其他项目，批准预算的部长们大多已退休，而结构本身继续运行，无需他们中的任何一个。\n\n编年史记录下四分之一世纪的统计：产出数字，维护成本，与预测的比较。预测是部分正确的，这通常是预测所能达到的最好结果。此结构运作良好。那份运作是否值得其所付出之代价，仍被反对过它的人所争议，被未曾反对过的人所了结，这正是在二十五年之时你所能预期的情形。"

 eoe_legacy.602.title:0 "与它一同成长的一代"
 eoe_legacy.602.desc:0 "五十年。此结构已成为基础设施——也就是说，它已达到了运作之物的那种特定不可见性。与它一同成长的一代人，不记得关于是否建造它的政治辩论。他们不记得建设时期、成本超支、工程挑战。他们将其记为一向在那里的东西。\n\n你的史学家们正开始撰写修正主义的叙述。所有大型建设项目在五十年之时都会收到修正主义叙述。编年史将此记为一种可靠的文化现象，而非关于此项目有任何特定之处的迹象。"

 eoe_legacy.603.title:0 "此结构已成为什么"
 eoe_legacy.603.desc:0 "七十五年。此巨构已超越了它原初的目的——不是放弃了它，而是超越了它。该设施做它被设计来做的事，同时也通过七十五年的使用、改造和制度积累，做着它未曾被设计来做的事。\n\n你的工程师们已准备了一份关于当前能力对比设计能力的报告。分歧是显著的。此结构已成为某种部分是原初决定的产物、部分是七十年间由在原初决定中毫无发言权的人所做的后续决定的产物的东西。\n\n编年史记录下七十五年之评估，并指出结构比它们被赋予的意图更长久。"

 # ── 巨构重释 - 路径 A（永恒建筑师） ─────────────────────
 eoe_legacy.610.title:0 "建筑师们在百年之际"
 eoe_legacy.610.desc:0 "一百年前，你的帝国竣工了其首座巨构并宣告它是众多中的第一个——因为建造者建造，而投身于大规模建造的承诺被理解为一种文明身份而非一个项目。\n\n一个世纪已检验了此身份。结构屹立。其他结构或许已随之而来，或许没有。你的帝国已有一百年时间成为它所宣告的建造者帝国，或发现那宣告更多是雄心而非规定。\n\n编年史发问：此身份是否站住了？而如果它站住的方式与预期不同，你的帝国如何理解所宣告的与所建成的之间的差距？"
 eoe_legacy.610.opt_affirm:0 "我们是建造者。记录确认了此点。"
 eoe_legacy.610.opt_affirm.tt:0 "建造者的文明身份被此世纪的记录所确证。已肯定的修正——更快的巨构建造与更强的产出。"
 eoe_legacy.610.opt_partial:0 "我们建造，但如今带着更多智慧。"
 eoe_legacy.610.opt_partial.tt:0 "建造者身份是真实的，但已被这个世纪关于大规模建造代价的教训所调和。平衡修正适用。"
 eoe_legacy.610.opt_reverse:0 "雄心超过了智慧。"
 eoe_legacy.610.opt_reverse.tt:0 "建造者的文明身份被重铸为具象化的狂妄。此世纪被理解为与不受约束野心之代价的一次清算。完全逆转修正——伴随文化断裂的代价。"

 eoe_legacy.611.title:0 "新的记录"
 eoe_legacy.611.desc_affirm:0 "记录已被复审并发现是正确的。你的帝国是其所宣告之样貌：一个建造东西的帝国，大规模地，历时而建，并不停止。此世纪被作为证据而非限定条件呈现。\n\n修正被更新，以反映一个重访其文明身份并发现其被确认的帝国那加深的信念。这并不常见。编年史将其记为一个值得注意的结果。"
 eoe_legacy.611.desc_partial:0 "记录比原初的宣告更为复杂，而你的帝国已决定如实说出。建造者身份幸存下来，被一份关于此世纪代价几何以及它产生了什么不曾被计划之物的诚实记述所调和。\n\n修正被调整，以反映一个已学会比其原初意图更明智地建造的文明——更慢，更审慎，但仍投身于此事业。"
 eoe_legacy.611.desc_reverse:0 "记录已被修正。建造者帝国已被重铸为未曾问询是否应该建造便建造了的帝国——并花了一个世纪继承其后果。\n\n新的修正反映了一个正在重新定向其文明身份的帝国。代价是真实的。制度记忆不会在没有摩擦的情况下改变。帝国所获得的是与其自身雄心之间一种更为诚实关系的开端。"

 # ── 巨构重释 - 路径 B（务实雄心） ─────────────────────────
 eoe_legacy.620.title:0 "务实建造在百年之际"
 eoe_legacy.620.desc:0 "一百年前，你的帝国建造此巨构，因其有回报——因其结构服务于一个目的，而目的正当化了代价，且务实主义论据无需任何神话来支撑它。\n\n一个世纪的效用已产生了一个结果。你的经济学家们能告诉你此结构是否在狭义上有回报。你的史学家们正在提出更宽广的问题：一个为效用而建造的帝国，在一个世纪的为效用而建造之后，会变成什么？务实帝国算是一种帝国吗？或者它是一个尚未决定自己是何种帝国的帝国？\n\n编年史既记录下经济数据，也记录下此哲学问题。"
 eoe_legacy.620.opt_affirm:0 "务实主义的论据仍然成立。"
 eoe_legacy.620.opt_affirm.tt:0 "此结构的效用被一个世纪的产出所证实。务实主义框架被重申并加深。已肯定的修正适用。"
 eoe_legacy.620.opt_partial:0 "效用与意义并非对立。"
 eoe_legacy.620.opt_partial.tt:0 "此结构既产生了效用，也出乎意料地产生了意义。我们将两者都整合进更新后的框架。平衡修正适用。"
 eoe_legacy.620.opt_reverse:0 "务实主义遗漏了某些重要东西。"
 eoe_legacy.620.opt_reverse.tt:0 "纯粹务实主义的框架已被发现是不完整的。此结构比原初决定所承认的意味更多，而未承认这一点已付出代价。完全逆转修正。"

 eoe_legacy.621.title:0 "新的记录"

 # ── 巨构重释 - 路径 C（勉强的建造者） ──────────────────────────
 eoe_legacy.630.title:0 "勉强的建造在百年之际"
 eoe_legacy.630.desc:0 "一百年前，你的帝国竣工了此巨构，并承认代价是非凡的——它应为其所作所为感到谦恭，因为在此等规模上的资源消耗承载着一份简单的庆祝无法充分应对的分量。\n\n一个世纪要么已验证、要么已质疑了此谦恭。你的哲学家们持有看法。结构屹立，运作，并已被在原初决定或原初清算中毫无份位的后世子孙们所改造。\n\n编年史发问，那份谦恭是否正确，是否充足，或者它是否在岁月中变成了一种姿态而非一份真诚的核算。"
 eoe_legacy.630.opt_affirm:0 "谦恭是正确的。肯定它。"
 eoe_legacy.630.opt_affirm.tt:0 "承认代价是智慧。此世纪确认了它。已肯定的修正——稳定度与影响力产出加深。"
 eoe_legacy.630.opt_partial:0 "谦恭是真实的，但成就也是。"
 eoe_legacy.630.opt_partial.tt:0 "此世纪已表明代价是真实的，且成就也是真实的。我们整合两者。平衡修正适用。"
 eoe_legacy.630.opt_reverse:0 "谦恭变成了自我贬低。"
 eoe_legacy.630.opt_reverse.tt:0 "审慎的框架已被重铸为过度的克制——那个建造得宏伟壮丽、然后花了一个世纪为其道歉的帝国。完全逆转修正——伴随修正制度叙事的代价。"

 eoe_legacy.631.title:0 "新的记录"

 # __ v1.6.0: 重释修正本地化 ______________________________
 # Stellaris 要求静态修正同时具有 KEY:0 和 KEY_desc:0。

 eoe_mod_ascension_affirmed:0 "已肯定的道路"
 eoe_mod_ascension_affirmed_desc:0 "一个世纪已加深了原初的信念，而非仅仅保留它。研究进一步加速，一个额外的天赋槽位开启，而稳定度反映了一个知道其信仰为何的人口。"

 eoe_mod_ascension_partial:0 "经深思的飞升"
 eoe_mod_ascension_partial_desc:0 "这个世纪揭示了原初框架未能捕捉到的细微差别。研究持续推进，影响力更顺畅地流动，而舒适度需求有适度降低。"

 eoe_mod_ascension_reversed:0 "清算"
 eoe_mod_ascension_reversed_desc:0 "原初的哲学已被否定。集体记忆不会在没有摩擦的情况下改变。稳定度与人口增长反映在全新基础上的重建；研究承受修正的代价。"

 eoe_mod_victory_affirmed:0 "被证实的和平"
 eoe_mod_victory_affirmed_desc:0 "一个世纪确认了关于战争及其后果的原初判断。外交权重加深，军事精准度锐化，而厌战度进一步被抑制。"

 eoe_mod_victory_partial:0 "经深思的和约"
 eoe_mod_victory_partial_desc:0 "既非单纯的自豪，也非单纯的悔意——这个世纪教给了比两者都更复杂的东西。外交权重与稳定度反映了一个承认代价、而不否认行为的帝国。"

 eoe_mod_victory_reversed:0 "和平主义清算"
 eoe_mod_victory_reversed_desc:0 "战争已被重铸为一则警示记述，而非奠基性胜利。厌战度积累大大变慢，而人口满足感上升；军事射速反映姿态的转变。"

 eoe_mod_mega_affirmed:0 "建造者的世纪"
 eoe_mod_mega_affirmed_desc:0 "一个世纪确认了首座巨构竣工时所宣告的身份。建造进一步加速，矿物收入上升，而稳定度反映了一个已为其所建之物感到自豪的人口。"

 eoe_mod_mega_partial:0 "更明智的建造"
 eoe_mod_mega_partial_desc:0 "这个世纪教给了原初决定未能预料的东西。建造继续以稳健速度进行，能量币产出上升，而影响力从一个以比开始时更多诚实在建造的文明中累积。"

 eoe_mod_mega_reversed:0 "被重新考虑的尺度"
 eoe_mod_mega_reversed_desc:0 "巨构已从奠基性成就被重新框定为警示性纪念碑。影响力从清算中累积；稳定度因一个知道自己放弃了什么的帝国而保持。巨构雄心被调和。"

 # ════════════════════════════════════════════════════════════════════════
 # v1.7.0 本地化
 # 功能：联络链、逐路径标记、编年史重释状态、
 #           轴阈值、对手回响、文明层级
 # ════════════════════════════════════════════════════════════════════════

 # ── 联络十字路口修正 ─────────────────────────────────────────
 eoe_mod_contact_open:0 "伸出的手"
 eoe_mod_contact_open_desc:0 "你的帝国以伸出的手面对未知。外交权重从一个以给予而非拒绝承认而闻名的文明中增加。"

 eoe_mod_contact_careful:0 "谨慎的观察者"
 eoe_mod_contact_careful_desc:0 "你的帝国以在承诺之前的警戒面对未知。加密能力增强，而研究从一个将观察视为方法论的文明中进步。"

 eoe_mod_contact_reluctant:0 "无奈的遭遇"
 eoe_mod_contact_reluctant_desc:0 "你的帝国以有管理的谨慎面对未知。边境摩擦减少，而稳定度因一个知晓接触与暴露之间区别的帝国而保持。"

 eoe_mod_contact_affirmed:0 "已肯定的开放"
 eoe_mod_contact_affirmed_desc:0 "一个世纪确认了原初框架：接触是值得追求之事的开端。外交权重加深，而研究从一个嵌入银河而非仅仅观察它的帝国中获益。"

 eoe_mod_contact_partial:0 "经深思的接触"
 eoe_mod_contact_partial_desc:0 "这个世纪已表明，开放与谨慎在不同度量上皆有其道理。外交权重、加密能力与稳定度反映了一个在不放弃其方向的情况下修正了其方式的帝国。"

 eoe_mod_contact_reversed:0 "外交清算"
 eoe_mod_contact_reversed_desc:0 "原初框架已被推翻。稳定度上升，边境摩擦减少，因帝国围绕有管理的距离进行重组；外交权重反映逆转的代价。"

 # ── 联络十字路口事件 ─────────────────────────────────────────────
 eoe_contact.10.title:0 "识认之刻"
 eoe_contact.10.desc:0 "他们存在。信号被确认了——不是自然现象，不是传感器伪迹，而是一个源自并非你自身的另一个智能的信号。你的首次接触完成了。你的外交官们为此刻所准备的协议现在正在使用中，几周后，或许几个月后，他们也会知道你存在。\n\n编年史发问：你的帝国如何理解此刻？不是发生了什么——那已被记录。但它意味着什么？首次接触是某事的开端，但它是联盟、竞争、共存还是冲突的开端，尚未被书写。你的帝国决定它意味着什么，将塑造它成为其中哪一个。"
 eoe_contact.10.opt_a:0 "这是比我们自身更宏大之事的开端。"
 eoe_contact.10.opt_a.tt:0 "伸出的手：接触是一个开口。外交权重与好感加成。影响力轴递增。"
 eoe_contact.10.opt_b:0 "我们在承诺之前先学习。首先观察。"
 eoe_contact.10.opt_b.tt:0 "谨慎的观察者：接触是情报。加密与研究加成。智慧轴递增。"
 eoe_contact.10.opt_c:0 "每一个新文明都是一个未知变量。我们谨慎行事。"
 eoe_contact.10.opt_c.tt:0 "无奈的遭遇：接触是风险管理。边境摩擦降低与稳定度加成。影响力轴递增。"

 eoe_contact.11.title:0 "伸出的手已递出"
 eoe_contact.11.desc:0 "编年史记录下此选择。你的帝国已决定，另一个文明的存在主要不是一个战略问题——它是一个开口。手先伸出去了。\n\n什么会回应，尚未确定。编年史记录姿态。它也将记录姿态产生了什么，在时间的圆满之中。"

 eoe_contact.12.title:0 "耐心的评估"
 eoe_contact.12.desc:0 "编年史记录下此选择。你的帝国已决定，对一个未知智能的恰当反应既非温暖也非敌意，而是观察。你的分析师们已被赋予了他们更偏好的权限：在行动之前观察，在承诺之前理解。\n\n图景正在形成。编年史将记录它所显示的。"

 eoe_contact.13.title:0 "有管理的距离"
 eoe_contact.13.desc:0 "编年史记录下此选择。你的帝国已决定，谨慎并非恐惧——知晓你在与什么打交道之前，便承诺与之打交道，是一项合理的政策，而非开放性的失败。\n\n协议已就位。边境在监视之中。编年史指出，有管理的距离，一贯践行之，倾向于产生一种与开放性不同的稳定。不更好也不更坏。在接下来的一个世纪中，差别将以将会变得清晰的方式展现。"

 # ── 联络标记 - 25 年 ────────────────────────────────────────────
 eoe_contact.401.title:0 "四分之一世纪的接触"
 eoe_contact.401.desc_a:0 "你的外交官们曾跨越虚空去承认的那个帝国，已有一代人的时间变成无论它相对于你的帝国已变成什么样子。伸出的手政策在此时间中已产生了某种可以被衡量的东西：不完全是友谊，但熟悉。双方现在都对彼此有了足够了解，以至于知道自己不知道什么。\n\n编年史记录下四分之一世纪。起初伸出的手既未被握住，也未被拍开。它在二十五年间，被研究着。"
 eoe_contact.401.desc_b:0 "你的情报装置已有一代人的时间，来编制它最初去寻找的东西：关于另一个文明是谁及是什么的清晰图景。可以预见，此图景比最初的评估所暗示的更复杂。\n\n编年史记录下四分之一世纪。你的分析师们比开始时对自己的不确定性更有信心了，你的情报理事会向编年史保证，这是正确的行进方向。"
 eoe_contact.401.desc_c:0 "谨慎的距离已得以保持。你的帝国当作一项风险来管理之事，已在一代人的时间里，成为一项被管理的风险——也就是说，它既未产生一场危机，也未产生一次突破。\n\n编年史不附加评论地记录下此四分之一世纪。有管理的距离，要么最终闭合，要么最终钙化。这个会变成哪一个，尚不清晰。"

 # ── 联络标记 - 50 年 ────────────────────────────────────────────
 eoe_contact.402.title:0 "半个世纪的接触"
 eoe_contact.402.desc_a:0 "五十年。参与最初接触协议工作的第一代外交人员已退休；第二代在他们所继承的关系内部长大。伸出的手政策已不再是一项政策，而更多是一种制度性的倾向——你的帝国行事的方式，不再参照最初的决定。\n\n你的史学家们正开始撰写关于此接触的著作。编年史指出，伸出的手框架已挺过了向制度习惯的过渡，这要么是它原本就正确的证据，要么是制度习惯难以改变的证据。"
 eoe_contact.402.desc_b:0 "五十年。两代分析师已处理过接触档案。第一代专注于建立图景；第二代继承了一幅图景并一直在完善它。谨慎的观察者立场已产生了外交史上某种不寻常的东西：一个帝国，在对它的接触伙伴做出任何特定承诺之前，就已真正对其有了相当多的了解。\n\n编年史将此记录为对原初策略的一次成功执行，同时指出它仍尚未回答该策略是为了什么这一问题。"
 eoe_contact.402.desc_c:0 "五十年。有管理的距离已成为熟悉的距离。你的帝国与接触帝国，就大多实际目的而言，存在于同一银河中而彼此间摩擦最小。首次接触时最坏的恐惧与最乐观的解读都未实现。\n\n编年史记录下此中位数结果而不带屈尊俯就。稳定并非空无。"

 # ── 联络标记 - 75 年 ────────────────────────────────────────────
 eoe_contact.403.title:0 "四分之三世纪的接触"
 eoe_contact.403.desc_a:0 "七十五年。此接触已成为结构性的——不是你帝国历史上的一桩事件，而是它的一个状况。另一个文明已以一种任何后续首次接触都未能完全匹敌的方式，成为你外交、商业与文化存在的背景的一部分，因为它是首次。\n\n编年史注意到某件意料之外的事：伸出的手政策已产生了一种从未被明确寻求的影响力。通过将另一个文明视为值得了解的，你的帝国已经成为，对他们而言，一个值得了解的帝国。"
 eoe_contact.403.desc_b:0 "七十五年。你的分析师们有一则悖论要报告：经过四分之三世纪的谨慎观察，他们一直在观察的帝国在某些方面已变得更清晰可读，而在另一些方面更不透明。最初的未知是另一个文明的存在。当前的未知是他们将成为什么——这是一个更有趣也更困难的问题。\n\n编年史以某种近乎对其复杂性表示欣赏的态度，记录下此情报问题的演变。"
 eoe_contact.403.desc_c:0 "七十五年。曾被作为风险来管理之事，已产生了某种不再感觉像是风险管理的东西：一段稳定的关系，存在着，处理着事务，并有它自己的逻辑。定义了首次接触的那份不愿，经过数十年的谨慎处理，已产生了一项稳定的事实。\n\n编年史指出，有管理的距离，有时会变成持久的距离。"

 # ── 联络 100 年重释 ────────────────────────────────────────────
 eoe_contact.opt.reframe_affirm:0 "肯定原初的框架。"
 eoe_contact.opt.reframe_partial:0 "承认所改变了的。部分重释。"
 eoe_contact.opt.reframe_reverse:0 "解读已被修正。"

 eoe_contact.410.title:0 "伸出的手在百年之际"
 eoe_contact.410.desc:0 "一百年前，你的帝国向它遭遇的第一个文明伸出了手——并由此宣告，接触是一个开端而非威胁。自那以来，一个世纪的后果已然累积。\n\n编年史现在发问，你的帝国如何理解它所选择的。关系存在着；它有一个形态；它有一段历史。那段历史是验证了原初框架，复杂化了它，还是要求它被彻底修正，是摆在你史学家们面前的问题。"
 eoe_contact.410.opt_affirm.tt:0 "伸出的手政策是智慧。此世纪的记录确认了它。已肯定的修正——更强的外交权重与好感加成。"
 eoe_contact.410.opt_partial.tt:0 "开放性是真的，但并非不复杂。我们承认两者。平衡修正适用。"
 eoe_contact.410.opt_reverse.tt:0 "开放性是不足的或错置的。此世纪教给了不同的东西。完全逆转——伴随修正创立时的外交姿态的代价。"

 eoe_contact.420.title:0 "谨慎的观察者在百年之际"
 eoe_contact.420.desc:0 "一百年前，你的帝国决定在承诺之前先观察——将首次接触在成为一个外交问题之前，先作为一个情报问题来对待。一个世纪的观察已产生了一幅图景。问题的是，该图景是否证实了此策略。\n\n编年史发问：谨慎为你所用了吗？而无论答案如何，你的帝国现在如何理解它所选择的？"
 eoe_contact.420.opt_affirm.tt:0 "谨慎的方式是正确的。积累的情报是证据。已肯定的修正——更强的研究与安全加成。"
 eoe_contact.420.opt_partial.tt:0 "谨慎是合理的，但比所实践的更多的开放性也是。平衡修正。"
 eoe_contact.420.opt_reverse.tt:0 "谨慎阻碍了本可成为之事。此世纪被重铸为错失的接触机会。完全逆转。"

 eoe_contact.430.title:0 "无奈的遭遇在百年之际"
 eoe_contact.430.desc:0 "一百年前，你的帝国将其首次接触作为一项风险来管理——因为另一个文明的存在，客观上，是审慎的帝国会谨慎对待的一个未知变量。一个世纪已检验了此审慎。\n\n编年史现在发问：那份无奈是智慧吗？而此世纪的记录，是支持原初的谨慎，还是暗示另一种姿态会更好地服务于你的帝国？"
 eoe_contact.430.opt_affirm.tt:0 "谨慎是正确的。产生的稳定是证据。已肯定的修正——加深的稳定度与边境安全。"
 eoe_contact.430.opt_partial.tt:0 "谨慎是对的，但已被经验所精炼。平衡修正。"
 eoe_contact.430.opt_reverse.tt:0 "那份无奈是自我设限。此世纪被重铸为未抓住的机会。伴随代价的完全逆转。"

 eoe_contact.411.title:0 "新的记录"
 eoe_contact.411.desc_affirm:0 "记录已被复审，并发现支持原初框架。史学家们已陈明其论据；你的帝国已接受之。一个世纪前所选择的，已被一个世纪的证据所确认，而该确认被记录在案。\n\n原初的修正被一个反映了回顾印证所加深的信念的修正所取代。"
 eoe_contact.411.desc_partial:0 "记录比原初框架所暗示的更复杂，而你的帝国已决定如实说出。原初的选择是真实的，其后果是真实的，而真相坐落在乐观者与怀疑者之间。\n\n修正被调整，以反映一个已整合了一个世纪的复杂性、却未放弃其本质特征的帝国。"
 eoe_contact.411.desc_reverse:0 "记录已被修正。原初框架不再作为主要解释而成立——并非因为它不诚实，而是因为一个世纪的证据已累积起来，而原初框架未曾预料到这些。\n\n新的修正反映了修正一项创立时的外交姿态的代价与收益。断裂是真实的；随之而来的清晰也是。"

 # ── 联络 200 年回响 ────────────────────────────────────────────────
 eoe_contact.710.title:0 "两个世纪的接触"
 eoe_contact.710.desc:0 "首次接触以来两百年了。你的帝国最初跨越虚空所承认的那个文明，已有两个世纪变成无论它已变成什么样子。你的帝国已有两个世纪变成相对于他们它是什么样子。\n\n编年史闭合其关于首次接触的记录。不是因为关系结束了——它可能无限期地继续——而是因为两个世纪是这段关系已成为未来史学家们将研究的事物、而非你帝国现任领导层所亲身经历之事的地平线。你的帝国对其所选择的作何评价？"
 eoe_contact.710.opt_a:0 "开放是对的。我们了无遗憾。"
 eoe_contact.710.opt_a.tt:0 "伸出的手产生了它被伸出所意在产生的东西。"
 eoe_contact.710.opt_b:0 "这个世纪教给了我们开放未曾预料的东西。"
 eoe_contact.710.opt_b.tt:0 "关系是真实的；其复杂性也是真实的。"
 eoe_contact.711.title:0 "漫长记录闭合"
 eoe_contact.711.desc_a:0 "编年史以肯定的判断闭合首次接触记录。两百年足够长得能知晓。开放是对那次遭遇的正确回应，而它所产生的关系便是证据。\n\n记录被标记为完成。关系继续。"
 eoe_contact.711.desc_b:0 "编年史以一份诚实的核算闭合首次接触记录。两百年已产生了某种真实之物——并非所预料的，不完全如所希望的，但是真实的。复杂性是记录的一部分，而非对它的限定。\n\n记录被标记为完成。关系继续。"

 eoe_contact.720.title:0 "两个世纪的观察"
 eoe_contact.720.desc:0 "首次接触以来两百年了。你的情报装置已有两百年时间研究它所遭遇的文明。图景现在已如图景所能达到的那样完整。摆在编年史面前的问题，不是他们是什么——那已知道——而是你的帝国对选择了在承诺于其他事之前如此仔细地了解他们，作何看待。"
 eoe_contact.720.opt_a:0 "观察是正确的根基。我们坚持它。"
 eoe_contact.720.opt_a.tt:0 "承诺前的了解产生了持久的稳定。"
 eoe_contact.720.opt_b:0 "我们观察得很好。我们本或许可以更早接触。"
 eoe_contact.720.opt_b.tt:0 "图景是准确的；对其的使用有时被延迟了。"
 eoe_contact.721.title:0 "漫长记录闭合"

 eoe_contact.730.title:0 "两个世纪的管理"
 eoe_contact.730.desc:0 "首次接触以来两百年了。你的帝国决定管理的那个风险，已被管理了——两个世纪。摆在编年史面前的问题的是，此管理是否产生了某种值得拥有的东西，抑或它产生了两个世纪的没什么特别。"
 eoe_contact.730.opt_a:0 "谨慎产生了稳定。那是有些价值的。"
 eoe_contact.730.opt_a.tt:0 "有管理的距离是正确的距离。"
 eoe_contact.730.opt_b:0 "我们太谨慎了。谨慎让我们付出了某种真实之物的代价。"
 eoe_contact.730.opt_b.tt:0 "稳定是以牺牲别的东西为代价购得的。"
 eoe_contact.731.title:0 "漫长记录闭合"

