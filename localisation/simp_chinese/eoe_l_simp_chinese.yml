 eoe_menu.opt.tiers.tt:0 "查看编年史按轴分数对银河诸文明的分级评估——非排行，而是按文明深度分类。"

 # ── 文明层级菜单 (eoe_menu.60) ──────────────────────────────
 eoe_menu.60.title:0 "编年史：文明评估"
 eoe_menu.60.desc:0 "编年史不排列文明。它将文明分类。轴系统中八分或以上代表一个具有不寻常广度的文明；四至七分代表显著发展；一至三分，代表涌现。这些不是评判。它们只是描述。"
 eoe_menu.60.opt.tier1_header:0 "-- §Y层级 I -- 广博的文明§! --"
 eoe_menu.60.opt.tier1_you:0 "§Y> 你的帝国持有层级 I 地位。§!"
 eoe_menu.60.opt.tier2_header:0 "-- §C层级 II -- 显著的文明§! --"
 eoe_menu.60.opt.tier2_you:0 "§C> 你的帝国持有层级 II 地位。§!"
 eoe_menu.60.opt.tier3_header:0 "-- 层级 III -- 涌现的文明 --"
 eoe_menu.60.opt.tier3_you:0 "> 你的帝国持有层级 III 地位。"
 eoe_menu.60.opt.unclassified:0 "§H你的帝国尚未被编年史分类。§!"

 # ── 轴阈值通知 ─────────────────────────────────────────
 eoe_poll.10.title:0 "一个具有不寻常广度的文明"
 eoe_poll.10.desc:0 "编年史官们注意到了某件在历史记载中不常出现的事：一个帝国，在同一时刻，在编年史的全部四个基础轴——雄心、智慧、遗产与影响力——上均达到了显著发展。\n\n这不是对任何单一成就的记录。这是对广度的记录。大多数文明主要沿着一或两个轴发展，在特定方向上达到深度，而将其他轴向留作相对未开发。一个同时在全部四项上达到第二层级的帝国，已做出了某种与仅仅做了大量某一件事质性不同的举动。\n\n编年史记录下此称号，而不授予其永久性。广度，一旦达成，必须被维持。"

 eoe_poll.11.title:0 "称号"
 eoe_poll.11.desc:0 "编年史官们有一个他们很少使用的称号。它在记载中仅出现寥寥数次于银河历史中，被授予那些同时在全部四个基础轴——雄心、智慧、遗产与影响力——上达到最高发展层级的文明。\n\n此称号并非一个等级。它是一个描述。它意味着你的文明，跨越编年史所追踪的全部范围，已成为某种编年史没有充分语言来形容的东西。这些轴被设计来捕捉文明发展。一个同时将它们全部最大化的帝国，已不再被此框架恰当描述了。\n\n编年史记录下此称号，并承认其自身的范畴已被超越。"

 # ── 对手弧回响事件 ────────────────────────────────────────────────
 eoe_arc.810.title:0 "一百五十年：对手之影"
 eoe_arc.810.desc_conflict:0 "与你的首个对手的冲突结束以来，一百五十年了。你的文明借以定义自身的那个帝国——通过击败、通过比它更长久、或通过目睹其崩溃——已有一个半世纪变成它在冲突之后所变成的样子。\n\n编年史现在发问：那段竞争留下了什么？不是发生了什么——那已被记录。那个对手的存在对你的帝国做了什么？它产生了什么若无此对立便不会存在的东西？"
 eoe_arc.810.desc_peer:0 "与你的首个对手的均势关系达成其结局以来，一百五十年了。你的文明借以衡量自身的那个帝国——发现自己与之可比，发现自己因这比较而改变——已有一个半世纪时间，在它作为你均势对手时所是之样貌的基础上演变。\n\n编年史发问：那段均势关系产生了什么？均势竞争是不寻常的。大多数文明被它们所击败或被其所击败的对手的较量所定义。被一个实力相当的对手所定义，会留下一种不同的印记。"
 eoe_arc.810.desc_shift:0 "与你首个对手的关系经历其根本转变以来，一百五十年了。曾一度被理解为你的对手的那个帝国——无论那种竞争的性质为何——变成了某种不同的东西，而你的帝国也随之改变。\n\n编年史发问：转变留下了什么？竞争塑造了你的帝国。转变重塑了它。从两者中，什么得以存续？"
 eoe_arc.810.opt_a:0 "对手定义了们。我们因有过一个对手而更强大。"
 eoe_arc.810.opt_a.tt:0 "竞争产生了某种持久之物——一个因经受过考验而知道自己是什么的帝国。"
 eoe_arc.810.opt_b:0 "竞争让我们付出了代价。我们因有过一个对手而不同——不仅仅是更强。"
 eoe_arc.810.opt_b.tt:0 "竞争留下的印记并非都是正面的。编年史承认完整的核算。"
 eoe_arc.811.title:0 "对手记录闭合"
 eoe_arc.811.desc_a:0 "编年史在收益这侧闭合对手记录。你的帝国从中走了出来，比进入时更了解自己是什么——它的阈值，它在压力下的反应，它决心的特定形态。一个未曾被认真考验过的帝国，不以同样的方式了解自身。\n\n对手被标记在记录中。记录继续。"
 eoe_arc.811.desc_b:0 "编年史以一份诚实的核算闭合对手记录。对立产生了真实之物：经考验的能力，更清晰的界定，对你的帝国愿意为何而战、愿意让步什么的一种更具体的理解。它也留下了摩擦——制度的、外交的、文化的——随时间复利增长，其方式未出现在最初的算计中。\n\n账本的两栏皆被记录。记录继续。"

 eoe_arc.820.title:0 "一百五十年：第二道影"
 eoe_arc.820.desc_conflict:0 "与你的第二个对手的冲突结束以来，一百五十年了。在第一个对手形成性的竞争之后，面对第二个重要对手的经历，产生了与首次遭遇不同的东西。到第二个对手之时，你的帝国已经知道一个对手是什么。那份知识改变了这次经历。\n\n编年史发问：第二个对手的竞争在第一个已经产生的基础上，添加了什么？"
 eoe_arc.820.desc_peer:0 "与你的第二个对手的均势关系结束以来，一百五十年了。你的帝国到此为止，已经历了至少一段之前的重要竞争。第二段均势关系是由一个已经知道被对立定义意味着什么的帝国所航行的。\n\n编年史发问：第二段均势竞争的经历，是确认了第一段所教给的，还是修正了它？"
 eoe_arc.820.desc_shift:0 "与你第二个对手的关系经历其根本转变以来，一百五十年了。对手与转变的模式本身便是一种历史——一份关于你的帝国如何与那些最显著地反对或比照它的帝国相处的记述。\n\n编年史发问：此模式揭示出了关于你帝国的什么，是单一竞争本不会展示的？"
 eoe_arc.820.opt_a:0 "第二个对手加深了第一个所确立的。"
 eoe_arc.820.opt_a.tt:0 "竞争的模式已产生了一贯的文明品格。"
 eoe_arc.820.opt_b:0 "第二个对手复杂化了第一个所产生的。"
 eoe_arc.820.opt_b.tt:0 "竞争的模式比任何单一竞争所暗示的都更模糊。"

 # ── 逐路径标记变体：飞升 ──────────────────────────────────
 eoe_legacy.401.desc_a:0 "一代人已安顿于那份宣言：超越不是一个计划而是一种天召。该哲学现已被嵌入你的制度中。编年史官们指出，当一种文明哲学挺过二十五年的实施而未被实质性修正时，它要么已证明了其价值，要么仅证明了制度抵抗改变。此区别尚不清晰。"
 eoe_legacy.401.desc_b:0 "自你的帝国致力于将超越视为工具而非天命以来，一代人已经过去。务实主义框架已被实施。你的行政官员们报告称，务实主义路径已产生了预期的回报，这是一句务实主义框架所欢迎的、且对框架是否正确几乎只字未提的话。"
 eoe_legacy.401.desc_c:0 "自你的帝国致力于审慎的、有度的发展以来，一代人已经过去。有度的进步已产生了有度的成果，这正是当初被意图的。编年史指出，负面意外的缺席，本身即是一个数据点。"

 eoe_legacy.402.desc_a:0 "五十年。完全在超越哲学下成长起来的第一代人已步入成年。他们没有对无天赋帝国的记忆；对他们来说，朝向更高境界的驱动力就是他们文明的样子。编年史官们指出，一种哲学承诺的自然化并不等同于它的验证——但它也并非空无。"
 eoe_legacy.402.desc_b:0 "五十年。两代行政官员已在务实主义框架内工作。第一代人自觉应用它，将每项决策对照框架原则来衡量。第二代人无需指名道姓地应用它，因为它已成为此制度的默认。编年史官们指出，当一个框架变得不可见时，它要么已被完全内化，要么已不再被使用。此区别很重要。"
 eoe_legacy.402.desc_c:0 "五十年。谨慎的道路已积累了五十年间谨慎做出的决定。你的史学家们现在正撰写关于首个天赋选择的作品，而在新兴文献中的主导性解释是，克制是智慧而非怯懦。编年史指出，新兴文献中的主导性解释，有在下一代文献中看起来不同的习惯。"

 eoe_legacy.403.desc_a:0 "七十五年。超越哲学已做到了哲学在给予充分时间时有时会做到的事：它已产生了其原初缔造者未曾意图的后果。你的文化分析师们已在你帝国的公共话语中识别出一股支流，它以原初天赋选择未曾预料的方式，按字面意思理解朝向更高境界的驱动力。编年史官们记录此发展而不加评判。存活得足够久以至于被误解的哲学，通常已存活得足够久以至于重要了。"
 eoe_legacy.403.desc_b:0 "七十五年。务实主义框架已被应用于其原初设计者未曾预见的情境。在某些情况下，该框架保持得很好；在其他情况下，务实主义计算产生了依据该框架自身逻辑可辩解、但对做决定的人们来说仍感觉不对的成果。编年史记录下这些压力测试而不加裁决。一个被检验了七十五年的框架，比一个只被检验了二十五年的更有价值。"
 eoe_legacy.403.desc_c:0 "七十五年。某些意料之外的从谨慎的道路中生长了出来：你的帝国，在广袤银河中，已成为一个以信守承诺且不越界而闻名的帝国。这并非原初选择的意图——那本是关于管理内部发展的——但它已产生了一种原初选择未曾计算在内的外部声誉。编年史记录下此不期而至的收益而不假装它曾被计划。"

 # ── 逐路径标记变体：胜利 ────────────────────────────────────
 eoe_legacy.501.desc_a:0 "第一场战争以仁慈赢得，距今二十五年。被击败的帝国已有二十五年时间，在你帝国为他们设定的条件下变成什么样子。你的外交官们报告称，关系正在大致沿着仁慈所意在产生的方向线发展。编年史注意到“大致”，而不予以详述。"
 eoe_legacy.501.desc_b:0 "第一场战争赢得并巩固了力量，距今二十五年。被击败的帝国已有二十五年时间在你帝国强加的条件下发展。你的情报部门报告称，和约正在维持，而你的顾问们所预测的怨恨尚未达到可付诸行动的水平。编年史注意到“尚未”。"
 eoe_legacy.501.desc_c:0 "第一场战争被赢得——无奈地，带着对代价谨小慎微的核算，距今二十五年。核算仍在进行。你的经济学家们已产出了一份关于战争经济影响的回顾性分析，你的军方正在质疑它。编年史将这场争端记为战争对双方都意味重大的一个迹象。"

 eoe_legacy.502.desc_a:0 "五十年。仁慈政策已成为你的帝国结束其战争的模板。或是因为第一例是成功的，或是因为制度会将第一次奏效的东西编撰成典，你的外交官们现在默认采用仁慈的和约。编年史指出，一项出于原则性原因采用的政策，和一项因其上次奏效而采用的政策，在被以不同方式检验之前，看起来一模一样。"
 eoe_legacy.502.desc_b:0 "五十年。铁腕和平已维持了半个世纪。你的史学家们正开始将其描述为严苛的和约产生稳定结果的证据。被击败帝国的史学家们正在撰写一份不同的记述，你的情报部门已获得它，而它读起来令人不适。编年史记录下两份记述，而不在它们之间裁断。"
 eoe_legacy.502.desc_c:0 "五十年。你的帝国不愿打的那场战争已退入历史——意味着现在做出战和决定的一代人并未亲身经历那份无奈。他们读过关于它的东西。编年史指出，读到关于无奈之事与感受到它是不同的，而此差别很重要。"

 eoe_legacy.503.desc_a:0 "七十五年。与你军队曾击败的帝国之间的关系，已演变为原初仁慈决定使之可能但未决定的东西。那个帝国已在某些情境下成为伙伴，在另一些情境下成为竞争者，在大多数情境下是独立的行动者。编年史记录道，仁慈产生了一个邻邦，而非一个盟友——这或许更有价值。"
 eoe_legacy.503.desc_b:0 "七十五年。严苛和平所产生的稳定，已比产生它的具体条款更长久。帝国并非单纯吸收一份和约并保持静止；它们会适应。你的帝国七十五年前所强加之物，已被双方适应为某种既类似原初条款、又不完全相同的模样。编年史将此演变记录为预期之中的。"
 eoe_legacy.503.desc_c:0 "七十五年。从无奈的胜利中，已涌现出某件未预料之事：你的帝国的军事文化，经过三代人，已内化了第一场胜利的代价意识。你的海军上将们将厌战度作为一个主要变量而非次要变量来计算。编年史将此记录为原初无奈的一项制度性遗产。"

 # ── 逐路径标记变体：巨构 ──────────────────────────────
 eoe_legacy.601.desc_a:0 "巨构竣工，且你的帝国宣告自己为建造者的帝国，距今二十五年。该宣告已被检验了二十五次——每年一次——通过你的行政机构关于资助什么、建造什么、推迟什么的每一次决策。该宣告已幸存下来。编年史记录下其幸存是有意味的，但尚非结论性的。"
 eoe_legacy.601.desc_b:0 "巨构竣工，而建造它的务实论据被其产出所证实，距今二十五年。产出在继续。你的经济学家们已产出了一份二十五年回顾，表明此结构正在按预期运作。编年史记录下此运作，而不问运作是否是唯一重要的标准。"
 eoe_legacy.601.desc_c:0 "巨构竣工，而你的帝国从此成就后退一步，去计算它所花费的代价，距今二十五年。计算仍在继续。你的财政部长们报告称，按大多数指标，此结构正产生足够回报来正当化最初支出。编年史注意到“大多数”。"

 eoe_legacy.602.desc_a:0 "五十年。此巨构已变得不可见——也就是说，它已达到基础设施的不可见性。建造者帝国已花了五十年建造，或未建造，相对于最初的承诺。你的史学家们指出，该承诺已被历届政府以不同方式解读：作为授权，作为愿望，作为遗产。编年史记录下全部三种解读。"
 eoe_legacy.602.desc_b:0 "五十年。务实的巨构已花了五十年保持务实。它运作；它一直在运作；它大概将继续运作。你的经济学家们指出，五十年的运作记录使之成为你帝国历史上记录得最好的基础设施投资之一。编年史准确地记录下此点，并指出“记录良好”与“有意义的”是不同范畴。"
 eoe_legacy.602.desc_c:0 "五十年。伴随巨构竣工而来的谦恭，已成为你帝国文化词汇的一部分——伟大的成就承载重大责任，尺度需要相称的智慧。你的哲学家们已发展这个主题发展了五十年。编年史记录下此哲学发展，而不评估其准确性。"

 eoe_legacy.603.desc_a:0 "七十五年。建造者的帝国发生了一些意料之外的事：此巨构已被超越。不是被毁灭，不是被抛弃——仅仅被随后那些更大、或更复杂、或技术上更雄心勃勃的建筑所超越。最初的巨构现在锚定着一种传统，而非代表其巅峰。编年史将一种传统的成熟记录为，总的来说，一个好的结果。"
 eoe_legacy.603.desc_b:0 "七十五年。务实的巨构已被改造了七十五次——在其运行的每一年一次，以小的方式和大的方式，由那些看到了可改进之处的工程师们。现存的结构可辨认地是竣工时的结构，而并非完全相同的结构。编年史将此记录为被使用的基础设施所会发生之事。"
 eoe_legacy.603.desc_c:0 "七十五年。勉强的建造者们，经过三代人，已产出了更多巨构——因为一个能建造一个的帝国就能建造另一个，而一个成长中文明的现实压力不会等待哲学的解决。谦恭并未消失，但它已被容纳。编年史将这种容纳记录为现实的。"

