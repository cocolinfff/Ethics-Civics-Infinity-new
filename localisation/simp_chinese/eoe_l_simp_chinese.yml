 # 飞升回响
 # ════════════════════════════════════════════════════════════════════════

 # ── 路径 A：超越之道 ─────────────────────────────────────────
 eoe_legacy.110.title:0 "超越之辩"
 eoe_legacy.110.desc:0 "二百年来的飞升信条已造就了一个将超越视为理所当然的文明——以及一代开始质疑他们究竟在向何处超越的年轻哲学家。\n\n辩论已抵达议政厅。一方是原初哲学的继承者，他们主张朝向更高境界的驱动力本身就是其正当性。另一方是批评者，他们指出，一个永远朝着未定义地平线奔跑的文明，可能仅仅是在奔跑而已。"
 eoe_legacy.110.opt_a:0 "信念屹立。更高之境自为其目的。"
 eoe_legacy.110.opt_a.tt:0 "原初哲学得到重申。你文明作为超越追寻者的身份被编订成典。"
 eoe_legacy.110.opt_b:0 "批评者有其道理。我们缓和此哲学。"
 eoe_legacy.110.opt_b.tt:0 "该哲学演进。超越被重新诠释为服务于明确目的的工具。"

 eoe_legacy.111.title:0 "信条落定"
 eoe_legacy.111.desc_a:0 "这场辩论如同大多此类辩论一般，以传统的分量被解决。定义了你帝国跨越凡常界限第一步的超越哲学，已历经两个世纪的审视，不仅得以幸存，甚至更为根深蒂固。\n\n未来世代将继承一个在其核心知晓自身为何而存在的文明。至于他们会否认为这是正确答案，并非你这代人需要操心的。"
 eoe_legacy.111.desc_b:0 "该哲学已演进。超越不再是北极星——它是诸多工具之一，服务于更具体的目的。批评者们赢得了争论，尽管他们不会如此称呼它。\n\n你的帝国并未因改变而变得更渺小。它只是变得不同了。历史将裁定哪个版本建造得更为明智。"

 # ── 路径 B：务实飞升 ─────────────────────────────────────────
 eoe_legacy.120.title:0 "实用主义审计"
 eoe_legacy.120.desc:0 "两个世纪以来将飞升视为实用工具而非哲学天召的做法，已产生了结果——可衡量、可制图、不可否认的正面结果——以及一种日益增长的文化不安，你的文明史学家们正竭力为此命名。\n\n正如一位资深哲学家在如今流传于各学院的论文中所指出的，问题在于，你的帝国在优化既定目标方面异常有效。它不太花时间的是，去追问它所定义的目标是否是正确的那一个。"
 eoe_legacy.120.opt_a:0 "成果证实了此道。"
 eoe_legacy.120.opt_a.tt:0 "实用主义框架得到确认。你帝国的过往记录被作为正当性呈现。"
 eoe_legacy.120.opt_b:0 "那位哲学家有道理。我们提出更艰深的问题。"
 eoe_legacy.120.opt_b.tt:0 "你的帝国开始对其自身目标进行更哲学化的审查。指标被赋予了意义。"

 eoe_legacy.121.title:0 "论据已呈"
 eoe_legacy.121.desc_a:0 "那位哲学家的论文被阅读、考量，而后置于一旁。议会的回应审慎有度：与大多追求更抽象框架的文明相比，你的帝国建造了更多，推进了更远，遭受的更少。记录已言明一切。\n\n或许有朝一日，一个选择超越而非务实的文明，将建成你的帝国所无法建成之物。在那之前，这些数据表仍具说服力。"
 eoe_legacy.121.desc_b:0 "那位哲学家的论文已开启了一些不易闭合之事。你的帝国已开始了漫长而不适的过程，不仅是审计其方法，更是审计其目的——不仅要问它是否实现了既定目标，还要问它是否设定了正确的目标。\n\n这是一个比以往任何世代所想的都更难的问题。你的议会在沉默中也承认，这或许也是更重要的那个问题。"

 # ── 路径 C：克制之道 ───────────────────────────────────────────
 eoe_legacy.130.title:0 "耐心的红利"
 eoe_legacy.130.desc:0 "两个世纪的审慎进步造就了一个稳定、自信的帝国——以及在这稳定中成长起来的一代人，他们并非毫无道理地好奇，他们的祖辈当初究竟在小心些什么。\n\n此问题在学院和媒体中已呈现出多种形式。最尖锐的版本来自一位年轻史学家，其著作已引起显著关注：开国一代那著名的克制，究竟是真正的智慧，还是用智慧的语言包装起来的谨慎，以免自我辩护？"
 eoe_legacy.130.opt_a:0 "那份谨慎是真诚的。稳定即是红利。"
 eoe_legacy.130.opt_a.tt:0 "你开国一代的克制，被两个世纪稳定增长的证据所证实。"
 eoe_legacy.130.opt_b:0 "那位史学家有道理。谨慎让我们付出了代价。"
 eoe_legacy.130.opt_b.tt:0 "你的帝国承认，克制在某些领域已变为停滞。一场清算由此开始。"

 eoe_legacy.131.title:0 "判决"
 eoe_legacy.131.desc_a:0 "那位史学家的论文被仔细考量。在审查了两个世纪的数据后，议会的回应是：环顾四周。\n\n你的帝国完好无损。那些行得更快的邻邦，有好几个已不复存焉。那些在早期世纪追求最大飞升速度的文明，拥有了有趣的历史。你的帝国拥有了一段稳定的历史。议会指出，这一区别并非偶然。"
 eoe_legacy.131.desc_b:0 "那位史学家的论文找到了它的读者。当被诚实地审视时，证据是喜忧参半的：稳定是真实的，但错失的机遇也是。数个领域，若当时行动更快，本可产生复利优势，却被以事后证明过度的谨慎之名略过。\n\n你的帝国并未在这认承下崩溃。它重新校准。这，同样是一种智慧——尽管是更艰难赢得的那种。"

 # ════════════════════════════════════════════════════════════════════════
 # 胜利回响
 # ════════════════════════════════════════════════════════════════════════

 # ── 路径 A：仁慈的征服者 ────────────────────────────────────────
 eoe_legacy.210.title:0 "仁慈的漫长记忆"
 eoe_legacy.210.desc:0 "自首场胜利以来，已过去两个世纪。在那场冲突中被击败的帝国依然存在——诚然被削弱了，是的，但依然完整——而你们文明间的关系，已拥有了二百年时间，朝着和约所容许的方向任意发展。\n\n你的史学家们一直在撰写回顾。结论取决于你翻阅哪份档案。"
 eoe_legacy.210.opt_a:0 "仁慈得到了回报。某种类似伙伴的关系浮现了。"
 eoe_legacy.210.opt_a.tt:0 "首场战争后展现的仁慈，已成熟为一种富有成效的关系。昔日的敌人不再是敌人。"
 eoe_legacy.210.opt_b:0 "仁慈被利用了。他们重建并铭记于心。"
 eoe_legacy.210.opt_b.tt:0 "被击败的帝国利用了你仁慈给予的时间。这关系比你所希望的更为复杂。"

 eoe_legacy.211.title:0 "两个世纪之后"
 eoe_legacy.211.desc_a:0 "回顾的结果良好。你击败而后以仁慈相待的帝国，并未成为紧密盟友——对于两个世纪平常摩擦中的单一仁慈之举，那未免期望过高——但它已成为在某些共同利益上能像伙伴一样运作的存在。\n\n你的史学家们指出，你施压更重、留下更少的那些替代历史，往往不会产生更好的结局。仁慈并非天真。事实证明，它只是一项更为长远的算计。"
 eoe_legacy.211.desc_b:0 "这份回顾令人读来不适。你击败的帝国恢复得比预期更快，重建得比设想得更彻底，并用两个世纪培育了一种怨恨，那和平条约的慷慨尚不足以将其消解。\n\n这并非仁慈的失败——这是程度的失败。算计在形式上是正确的；只是数字搞错了。你的顾问们仔细记下了这一区别，明白此教训是具体的，而非普适的。"

 # ── 路径 B：铁腕霸主 ─────────────────────────────────────────────
 eoe_legacy.220.title:0 "和约的遗产"
 eoe_legacy.220.desc:0 "你的帝国在首场胜利后强加的严苛和平，在两个世纪后，仍被人们所承受。败者在你和约强加的限制内重建，而这些限制塑造了随后的一切——他们的发展、他们的政治、乃至他们怨恨的特有脾性。\n\n你的顾问们已编制了评估。消息既非任何人预想的那么好，也非那么糟。"
 eoe_legacy.220.opt_a:0 "严苛的和平已稳固。力量阻止了抵抗。"
 eoe_legacy.220.opt_a.tt:0 "和约造就了稳定的威慑。战败的帝国未能恢复至足以威胁你的程度。"
 eoe_legacy.220.opt_b:0 "怨恨已成熟为某种有组织之物。"
 eoe_legacy.220.opt_b.tt:0 "严苛的和平催生了一种已结晶为更蓄意谋之的怨恨。一个更棘手的问题正等待着。"

 eoe_legacy.221.title:0 "铁腕的裁决"
 eoe_legacy.221.desc_a:0 "和约稳固了。战败的帝国从未恢复挑战你首要地位的能力，且你首场胜利所树立的榜样，影响了此后每一次谈判被接受的方式。\n\n你的军事顾问们在回顾这个世纪时感到满意。威慑理论家们感到满意。有一派外交史学家们并不满意，他们主张这关系本可以更具建设性。他们很可能是对的。议会对这一权衡泰然处之。"
 eoe_legacy.221.desc_b:0 "怨恨已组织起来。起初是弥散的敌意，已花去两个世纪寻觅其架构：一场政治运动，一种意识形态框架，以及一份朝着一个极具体长期目标而耐心积累的势力。\n\n你的情报部门一直在观察。威胁并非迫在眉睫。然而，它已不再是理论的。你的议会指出，严苛的和平倾向于产生严酷的未来。这并非新闻。但值当被记录。"

 # ── 路径 C：无奈的胜利者 ─────────────────────────────────────────
 eoe_legacy.230.title:0 "避战信条"
 eoe_legacy.230.desc:0 "你的领导层在第一场冲突中承载的厌战情绪，已有两个世纪的时间来塑造你的帝国对后续每一次危机的反应。你的史学家们指出，它已变得比一种情绪更为结构化——它已成为一种信条，一种默认姿态，一套贯注于你军事和外交文化的制度习惯。\n\n这一信条是否良好地服务了你的帝国，是最新一代史学家们以相当热情着手研究的问题。"
 eoe_legacy.230.opt_a:0 "避战是智慧。我们躲开了代价高昂的战争。"
 eoe_legacy.230.opt_a.tt:0 "你的厌战情绪造就了一种审慎避战的文化，使你的帝国远离了数场代价高昂的战争。"
 eoe_legacy.230.opt_b:0 "当需要速度时，避战变成了犹豫。"
 eoe_legacy.230.opt_b.tt:0 "你对冲突的谨慎已偶尔越界为瘫痪。一些机遇需要比该信条所允许的更快的决策。"

 eoe_legacy.231.title:0 "犹豫的代价"
 eoe_legacy.231.desc_a:0 "史学家们已完成核算。你的帝国参与的战争比其区域同侪更少。它参与的战争，总体来说更短、代价更低。外交记录显示，在同侪们选择升级的时刻，一种降级模式。\n\n两个世纪审慎避战的累积效应，是一个将其资源花在了战争以外事务上的帝国。你的议会在些许满足中注意到，这对于一个起源于单纯厌战情绪的信条而言，是个合理的结果。"
 eoe_legacy.231.desc_b:0 "史学家们找到了三个特定时刻，当时更快的军事决策本会产生显著更好的结果。在每一案例中，避战信条都造成了延误；而在每一案例中，延误都是代价高昂的。\n\n你的议会审慎地指出，这并非反对谨慎的论据。这是说，谨慎需要一个能识别何时速度是正确之选的机制。你的帝国此刻正在着手建立该机制，比它或许应该的时间晚了两个世纪。"

 # ════════════════════════════════════════════════════════════════════════
 # 巨构回响
 # ════════════════════════════════════════════════════════════════════════

 # ── 路径 A：永恒建筑师 ────────────────────────────────────────
 eoe_legacy.310.title:0 "后果的建筑学"
 eoe_legacy.310.desc:0 "两个世纪的巨型尺度建造，已造就了一个其身份如今已与其所建之物不可分割的帝国。第一座巨构已是历史；另有其他巨构。催生它们的哲学已奠基为根本。\n\n如今，你的文明首次足够年迈，得以回望其所建之物，并质问代价是否值得——不是以能量币计，而是以全面的核算。"
 eoe_legacy.310.opt_a:0 "我们建造得宏伟壮丽。毫无悔意。"
 eoe_legacy.310.opt_a.tt:0 "你帝国作为建造者的身份，被两个世纪的证据所再次肯定。"
 eoe_legacy.310.opt_b:0 "核算比预估的更艰难。我们加以清算。"
 eoe_legacy.310.opt_b.tt:0 "对巨型尺度的投入，有着只有两个世纪的视角才能揭示的代价。你的帝国诚实地审视它们。"

 eoe_legacy.311.title:0 "建造者的清算"
 eoe_legacy.311.desc_a:0 "全面核算已经完成。两个世纪以来所建成的巨构，代表着资源、政治意志和文明雄心的非凡集中。它们集体产生的产出，令最初预估相形见绌。\n\n你的史学家们指出，那些选择不在此尺度建造的帝国，拥有不同的力量——更大的灵活性，更多的流动资产，不同种类的韧性。它们并非更差的文明。它们是不同的文明。你的帝国做出了它的选择。这些巨构屹立为证。"
 eoe_legacy.311.desc_b:0 "全面核算比任何一位初始建筑师所预见的都更为严峻。这些巨构宏伟辉煌。分析同时揭示，它们也是其他数条发展路径从未被追求的原因。\n\n不是因为资源最终不在那里——而是因为身份在那里。你的帝国成为了建造巨构的那种文明，而那身份使某些其他道路感觉不相容。代价既是文化上的，也是物质上的。它们值当被记录。"

 # ── 路径 B：务实雄心 ────────────────────────────────────────────
 eoe_legacy.320.title:0 "指标所遗漏的"
 eoe_legacy.320.desc:0 "两个世纪的务实框架，如其预料，产生了优异指标。巨构产出已归档。投资回报率已被计算至小数点后数位。经济学家们满意了。\n\n哲学家们则不那么满意。他们的反对意见，已在日益显要的场合中被提出，并非指标是错的。而是指标是完整的。以及，一个以每月能量币衡量其最伟大成就的文明，或许已不经意间将自己定义为那种以每月能量币衡量一切的文明。"
 eoe_legacy.320.opt_a:0 "指标是正确的。结果无需其他意义。"
 eoe_legacy.320.opt_a.tt:0 "你的务实框架因其自身条件而得到捍卫。结果是针对哲学挑战的回答。"
 eoe_legacy.320.opt_b:0 "有些东西在数字中丢失了。我们与之清算。"
 eoe_legacy.320.opt_b.tt:0 "你的帝国承认那位哲学家的观点。一个衡量文明成就的更丰富框架开始发展。"

 eoe_legacy.321.title:0 "指标与意义"
 eoe_legacy.321.desc_a:0 "对哲学挑战的回应，实质上为：看看这些产出数字，然后解释你具体认为丢失了什么。\n\n哲学家们尚未给出令人满意的回答。经济学家们给出了数个令人满意的回答。议会已将这场辩论归入“进行中”档，并回到了优化业务中。你的帝国将继续以其产出为衡量标准。它已决定这是一个可接受的定义。"
 eoe_legacy.321.desc_b:0 "你的帝国已开始艰难的过程，以某种更难量化的东西来补充其指标。此努力并不完美——两个世纪的务实文化不会一夜转向——但意图是真诚的。\n\n史学家们将记录这一刻，作为你的帝国开始追问不仅它建造得有多好，而是它在向何处建造。那是一个更难的问题。你的议会已决定，它亦是一个更重要的。"

 # ── 路径 C：勉强的建造者 ────────────────────────────────────────────
 eoe_legacy.330.title:0 "谦恭审计"
 eoe_legacy.330.desc:0 "在巨构竣工、你的领导层坐对其全部代价的两个世纪后，那一刻所产生的谦恭已成了一种文化遗产。你的文明以审慎、有度的雄心而闻名——只建造其所需要的，而非其所能建造的。\n\n这一声誉如今正被那继承它而未亲历挣得它的一代人所审视。"
 eoe_legacy.330.opt_a:0 "谦恭是正确的。我们建造得明智。"
 eoe_legacy.330.opt_a.tt:0 "你的克制得到证实。那些建造得更雄心勃勃的文明，经历了更艰难的历史。"
 eoe_legacy.330.opt_b:0 "谦恭变成了犹豫。我们束缚了自己。"
 eoe_legacy.330.opt_b.tt:0 "克制的文化遗产偶尔已成为障碍。你的帝国审视那些谨慎跨越为停滞之处。"

 eoe_legacy.331.title:0 "遗产"
 eoe_legacy.331.desc_a:0 "审计发现，你帝国审慎雄心的声誉总体上是实至名归的。那些建造得更为激进——完全投身于巨型尺度而未有你创始者所怀谦恭——的文明，总体来说，拥有了更壮阔的历史。但它们也拥有了更灾难性的历史。\n\n你的帝国两者皆无。它拥有的是一个长久、稳定、富有生产力的文明，建造了其所需要的，并每次都诚实地计算了代价。你的议会私下里认为，这是一种胜利。"
 eoe_legacy.331.desc_b:0 "审计发现在三个特定领域，克制的文化遗产成为了障碍。本应推进的项目被推迟或放弃，因为文明的条件反射是先计算代价，只在数字舒适时才行动。\n\n数字并非总是相关的指标。你的帝国正在学习——于两个世纪之后——去识别它们不是的那些情况。谦恭是真诚且正确的。它偶尔所产生的犹豫，两者皆非。"

 # ════════════════════════════════════════════════════════════════════════
 # 第三阶段 - 长远之局：竞争弧事件
 # ════════════════════════════════════════════════════════════════════════

 # ── 共享选项 ────────────────────────────────────────────────────────
 eoe_arc.opt.noted:0 "已知悉。编年史正在关注。"
 eoe_arc.opt.recorded:0 "已记录。此弧线告终。"

 # ════════════════════════════════════════════════════════════════════════
 # 槽位1弧事件
 # ════════════════════════════════════════════════════════════════════════

 # ── eoe_arc.10 - 对手 1：被留意 ────────────────────────────────────────
 eoe_arc.10.title:0 "一个值得铭记的名字"
 eoe_arc.10.desc:0 "你的帝国已与另一方进入战争。这并非异常——银河充满冲突，且多数不留下特殊印记。\n\n但编年史已留意到这一场。不是因为战争必然是决定性的，或敌人必然强大，而是因为这场遭遇的某些特质带有开端的性质。你的分析员已标记此帝国。你的史学家们已开启了一份新档案。\n\n他们可能是错的。但长远之局很少会事先宣告自己。"
 eoe_arc.10.opt.tt:0 "第一位对手已被留意。编年史将追踪这段关系。"

 # ── eoe_arc.11 - 对手 1：验证 ─────────────────────────────────────────
 eoe_arc.11.title:0 "首次验证"
 eoe_arc.11.desc:0 "你的帝国与编年史所标记的对手，如今已共同经历了一场战争。不是一场冲突——一场战争，舰队与星球以及组织化暴力的全部压力皆被施加于双方。\n\n所获知的东西，比战报所显示的更难量化。你现在知道了这个帝国如何战斗：它的信条，它的优先事项，它死守至最后的是哪些星系，以及它不战而弃的是哪些。它对你亦所知相同。\n\n你们文明之间已有某事被确立。它将变成什么，取决于接下来发生之事。"
 eoe_arc.11.opt.tt:0 "一场战争已被经历。这段关系已从观察晋级为相互了解。弧线继续。"

 # ── eoe_arc.12 - 对手 1：定义 - 冲突 ─────────────────────────────
 eoe_arc.12.title:0 "长远之局：完结（冲突）"
 eoe_arc.12.desc:0 "从你帝国首次留意此对手开始的弧线，已达其终结。\n\n他们已离去，或沦为附庸，或不再是他们曾是的强权。定义你与他们关系的冲突，已以一种将他们从同侪范畴中移除的形式结束。无论他们曾是你的什么——对手，障碍，试炼场——他们已被解决。\n\n编年史记录下此事。你与此帝国关系的历史现已完整。未来的史学家们将拥有一个清晰的叙事：一个开端，一系列考验，以及一个结局。那结局是否必要是他们将要争论的问题。它是决定性的，则毋庸置疑。"
 eoe_arc.12.opt.tt:0 "雄心层级+1——被克服的对手是意志的证明。长远之局承认此终结。"

 # ── eoe_arc.13 - 对手 1：定义 - 均势 ─────────────────────────────────
 eoe_arc.13.title:0 "长远之局：完结（均势）"
 eoe_arc.13.desc:0 "从你帝国首次留意此对手开始的弧线，已达其“结局”——尽管“结局”或许是个错误的词。\n\n此帝国依然存在。你们已战斗过，互相验证过，并抵达了一种相互理解的共存状态。非盟友。非主动冲突中的敌人。某种更难名状之物：已达成对彼此限度之有效认识的对手。这段关系已结晶为一种稳定的形式。\n\n你的史学家们将称之为冷和平，或威慑均衡，或仅仅是你的文明与另一个足够了解你以致不会低估你的文明之间关系的特殊质地。编年史记录下所有这些框架，并指出无一能充分捕捉身在其中时的感受。"
 eoe_arc.13.opt.tt:0 "智慧层级+1——一个未被解决的对手，其本身就是一课。长远之局承认此复杂性。"

 # ── eoe_arc.14 - 对手 1：定义 - 转变 ────────────────────────────────
 eoe_arc.14.title:0 "长远之局：完结（转变）"
 eoe_arc.14.desc:0 "从你帝国首次留意此对手开始的弧线，已以一种无人预料的形式达其终结。\n\n此帝国已不再是你的对手。它如今是什么更难归类：某种伙伴，曾在你算计另一侧的昔日对手如今因共同利益而联结，一个曾处于你对立面的文明却不知何故最终站到了同一边。银河足够大，容得下这种反转。\n\n编年史不加评论地记录下此转变。它所指出的是，你们文明间的关系，曾经承载着相互敌意的特定分量，如今承载着另一种分量——一种恰花了其所需发展那么久才形成，且双方在开始时都无法预料的。"
 eoe_arc.14.opt.tt:0 "影响力层级+1——一个被转变的对手，乃最罕见的外交成就。长远之局承认此转变。"

 # ════════════════════════════════════════════════════════════════════════
 # 槽位2弧事件
 # （相同弧阶段，不同框架——第二位对手承载着不同的叙事分量）
 # ════════════════════════════════════════════════════════════════════════

 # ── eoe_arc.20 - 对手 2：被留意 ────────────────────────────────────────
 eoe_arc.20.title:0 "第二个名字"
 eoe_arc.20.desc:0 "你的帝国已在关注一位对手。现在它又遭遇了另一位。\n\n编年史不特别惊慌地记录下这一点——文明会积累关系，且并非所有关系都是简单的。值得留意的是，你的帝国目前已与银河发展出两个截然不同的敌对接触点。两个不同的帝国已足够显著到值得追踪。两条不同的弧线已经开始。\n\n它们是否会互动——你的两位对手是否会意识到彼此，它们会使你的战略局势复杂化还是简单化——尚不清晰。清晰的是，银河正要求你的帝国管理复杂性。这通常表明它已成长到足够重要的程度。"
 eoe_arc.20.opt.tt:0 "第二位对手已被留意。编年史现正追踪两段长远之局关系。"

 # ── eoe_arc.21 - 对手 2：验证 ─────────────────────────────────────────
 eoe_arc.21.title:0 "第二次验证"
 eoe_arc.21.desc:0 "你的第二位对手现已在与第一位相同的熔炉中被验证——一场真正的战争，而非冲突，舰队投入了，星球易手了，以及从有组织冲突中产生的全面相互揭示。\n\n你的战略家们正在管理关于两个不同对手的两套知识体系。这些知识并不相同。第二位对手的战斗方式与第一位不同，看重不同的东西，并在压力下表现出不同的忍耐力。编年史留意到此差异并仔细归档。\n\n一个已验证过两位对手的帝国，已学到了某些无法从理论中教导的东西。它如何处理此学问，仍有待确定。"
 eoe_arc.21.opt.tt:0 "第二场战争已被经历。两段对手弧线现皆处已验证阶段。"

 # ── eoe_arc.22 - 对手 2：定义 - 冲突 ─────────────────────────────
 eoe_arc.22.title:0 "第二弧线：完结（冲突）"
 eoe_arc.22.desc:0 "编年史所追踪的第二条弧线，已通过冲突达其终结。\n\n此帝国——你的文明发展出的第二位对手，编年史所标记的第二段长远之局关系——已离去，或沦为附庸，或被降至同侪门槛之下。始于敌对接触并经战争继续的弧线，已以最清晰可能的方式结束。\n\n你的史学家们以其职业所要求的超然指出，你的帝国现已通过武力解决了两个重要的敌对关系。这并非判决。这是一个数据点。它描述了何种文明，留待未来世代评估——那些继承了你胜利所购得安全，以及随之而来问题的人。"
 eoe_arc.22.opt.tt:0 "雄心层级+1——第二位对手被克服。长远之局记录两条弧线皆已完成。"

 # ── eoe_arc.23 - 对手 2：定义 - 均势 ─────────────────────────────────
 eoe_arc.23.title:0 "第二弧线：完结（均势）"
 eoe_arc.23.desc:0 "第二条弧线已沉淀为与冷和平同类的结局——一种相互理解的共存，一种威慑，其得以维持不是因为任何一方满意，而是因为双方皆现实。\n\n你的帝国如今维持着两段如此的关系。两个它已验证但并未解决的对手，两个充当永久性背景压力的战略张力之源。你的战略家们对这是否可持续持有看法。你的史学家们对它意味着你的帝国已变成何种文明持有看法。\n\n编年史记录下两种看法而不作裁断。弧线已闭合。关系在继续。"
 eoe_arc.23.opt.tt:0 "智慧层级+1——第二位冷和平中的对手。两个未解决的对手，两课教训。"

 # ── eoe_arc.24 - 对手 2：定义 - 转变 ────────────────────────────────
 eoe_arc.24.title:0 "第二弧线：完结（转变）"
 eoe_arc.24.desc:0 "编年史追踪的第二位对手，经历了与第一位同样不可能的转变——或许是另一种，但同样是不可能的。\n\n一个曾在你算计另一侧的帝国，如今站在了同一边。始于敌意的弧线，已终结于某种至少类似伙伴的关系。你的外交官们对此暗自自豪。你的军事顾问们怀有复杂的情感。\n\n编年史记录下此转变。它不带讽刺地指出，你的帝国如今已成功将两个敌对关系转变为更具建设性的东西。这要么是你非凡外交能力的证据，要么是银河比开局举动所暗示的更奇异、更宽容的证据。或许两者皆是。"
 eoe_arc.24.opt.tt:0 "影响力层级+1——第二位对手被转变。两条弧线，两次转变，一个文明。"

