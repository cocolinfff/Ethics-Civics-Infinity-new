 eoe_menu.52.opt.ascendance_0:0 "飞升：§H层级0§! - 尚无超凡里程碑。"
 eoe_menu.21.opt.ascendance_3:0 "飞升：§Y层级3§! - 已超脱凡俗。"
 eoe_menu.21.opt.ascendance_2:0 "飞升：§C层级2§! - 显著。"
 eoe_menu.21.opt.ascendance_1:0 "飞升：层级1 - 涌现。"
 eoe_menu.21.opt.ascendance_0:0 "飞升：§H层级0§! - 无里程碑记录。"

 # ── 新概况 ──────────────────────────────────────────────────────────
