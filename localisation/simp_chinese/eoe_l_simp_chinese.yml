 # v2.1 - 联络链扩展
 # 200年重释感知的回响描述，150年反思，250年总结，
 # 计时器显示键
 # ════════════════════════════════════════════════════════════════════════

 # ── eoe_contact.711 - 200年回响：路径 A（伸出的手） ─────────────────
 eoe_contact.711.desc_affirm:0 "两个世纪前，你的帝国向银河伸出了手，并发现那姿态得到了回应。编年史已观看了你们从那开端所建造的。你们在百年之际肯定了它，而肯定得以稳固。你的帝国所构建的外交网络，跨越遥远距离与差异所维持的关系，相互利益的缓慢积累——这些并未解决其他文明最终是什么的问题。它们产生了某种更有用的东西：一份当接触被视为一个开端而非一次交易时，它们能变成什么的记录。伸出的手哲学并不假定善意。它创造善意成为可能的条件。编年史将此记录为两百年一贯实践的样子。"
 eoe_contact.711.desc_partial:0 "两个世纪前，你的帝国以开放性面对银河，然后在百年之际，以谨慎修正了那开放性。编年史已追踪了这产生了什么。部分修正没有抛弃此哲学——它成熟了它。纯粹的开放性，未被调和的，会将意愿误认为天真。你的帝国现在所实践的版本，知晓哪些关系值得伸出，哪些需要距离。外交记录显示了区别：已作为伙伴维持了一个世纪的伙伴们，与那些未能在与现实的接触中存活下来的关系被优雅地移除了。编年史将此记录为赢得的务实主义，而非被抛弃的理想主义。"
 eoe_contact.711.desc_reverse:0 "两个世纪前，你的帝国向银河伸手，然后又逆转了那伸手。编年史已观看逆转完成自身。这并非被记为失败。一个发现其创建哲学是错误、并纠正了错误的帝国，学到了比一个其哲学从未被检验过的帝国更有价值的东西。取代伸出的手的——无论现在治理你帝国对待其他文明之道的是什么框架——是从证据中建立起来的。两百年的证据。编年史将此逆转记录为一场始于你首次接触做出之际、并由随后一切所解决了的争论的结论。"

 # ── eoe_contact.721 - 200年回响：路径 B（谨慎的观察者） ──────────
 eoe_contact.721.desc_affirm:0 "两个世纪前，你的帝国以警惕而非温暖面对未知，而百年评估发现此方式是可靠的。编年史继续观看。耐心的观察是一种方法论，而非一种性情——它产生知识而非关系，而知识已被证明是更持久的资产。你的帝国比其他大多数都更透彻地理解其他文明。你知道哪些是可靠的，哪些不是，哪些伙伴关系值得发展，哪些应保持在距离上。谨慎的观察者哲学在首次接触时问了一个问题：这些其他文明，究竟是什么？两百年专注的观看，已产出了更简单的方式本无法得出的答案。"
 eoe_contact.721.desc_partial:0 "两个世纪前，你的帝国观察而非接触，而百年之际促使了一次部分修正：观察是对的，但距离太大了。编年史已追踪了此调整。一个只观察的帝国，最终会积累没有应用机制的知识。部分修正引入了在合理的场合下的接触——不是作为温暖，而是作为彻底理解的逻辑延伸。你的帝国现在所维持的外交关系，因建立在一个世纪的先前评估之上而更好。你在选择接触之前，便知道了你接触的是什么。编年史将此记录为方法论通过使用而改进。"
 eoe_contact.721.desc_reverse:0 "两个世纪前，你的帝国选择警惕，然后，在一个世纪的观察后，判定观察已产出了它所能产出的。编年史已记录下此逆转。取代了耐心观察的——无论你的帝国现在对其他文明采取何种姿态——是在完全知晓仅观察产生什么的情况下选择的。有些帝国得出结论，没有关系的知识是不足的。另一些则得出结论，没有知识的关系是危险的。你的帝国在百年之际做出了它的选择，并已在那选择中生活了两百年。编年史记录下完整的弧线：最初的谨慎，决定越过它，以及那移动所产生的东西。"

 # ── eoe_contact.731 - 200年回响：路径 C（无奈的遭遇） ───────
 eoe_contact.731.desc_affirm:0 "两个世纪前，你的帝国以无奈遭遇了银河，并发现那无奈是被证实了的。百年评估确认了早期接触所暗示的：其他文明既是机遇的来源，也是风险的来源，而有管理的距离是一种处理银河关系的合法方式。编年史已观看了两个世纪有管理的距离产生了什么。你的帝国并非孤立的——孤立是不可维持的——但它所维持的关系，是在你帝国控制的条件下维持的。无奈的遭遇哲学并不拒绝接触。它拒绝接触本质上就是有价值的这一前提。两百年的证据并未削弱那拒绝。编年史将此记录为一种挺过了时间检验、因为时间检验继续在验证它的哲学。"
 eoe_contact.731.desc_partial:0 "两个世纪前，你的帝国以无奈面对银河，而百年之际促使了一次部分修正：谨慎是恰当的，但距离是过度的。编年史已追踪了此调整。一个过于谨慎管理接触的帝国，最终会发现管理本身变成了约束。部分修正没有抛弃谨慎——它区分了谨慎与回避。你的帝国现在所实践的是选择性接触：服务于明确目的的关系，在保存主权的距离上维持，当目的达成时便终止。编年史将此记录为无奈的遭遇哲学在一个世纪的实践后找到了它的功能性形态。"
 eoe_contact.731.desc_reverse:0 "两个世纪前，你的帝国以无奈接近银河，然后，一百年后，得出结论那无奈正阻碍着它。编年史已观看了取代它产生了什么。逆转是重大的。一个围绕有管理距离而建立、然后选择了接触的帝国，将那份接触建立在了原初哲学不经意间建造的基础之上：一个世纪谨慎的观察，对哪些文明值得接触的清晰评估，以及对风险的精炼理解。取代了无奈的开放性并非天真的。它是以一百年警惕距离为代价购得的，且它抵达时知晓它在向什么开放。编年史将此记录为最昂贵形式的智慧。"

 # ── eoe_contact.601 - 150年反思 ───────────────────────────────────
 eoe_contact.601.title:0 "编年史：一份中程评估"
 eoe_contact.601.desc_a:0 "一百五十年。编年史审视自首次接触以来，你的帝国与银河所建立的关系的当前状态。伸出的手不是一项政策。它是一种倾向——一种处理未知的方式，现已被应用于你帝国所遭遇的每一个物种，每一段形成或失败的外交关系，每一个如何处理另一个文明这一问题浮现的时刻。在百年之际，你做出了一个选择，关于那倾向是否仍适合你已成为的那个帝国。这是随之而来的事物的中点。编年史观察到：关系是真实的。有些已维持，有些没有。那些维持住的之所以如此，是因为伸出的手愿意在需要闭合时闭合，在开放性有理由时再次开放。此哲学不是一条规则。它是一种实践。编年史观看此实践继续。"
 eoe_contact.601.desc_b:0 "一百五十年。编年史审视自首次接触以来，你的帝国与银河接触的当前状态。谨慎的观察者不积累关系。它积累知识。在一百五十年之际，知识基础是丰厚的：哪些文明已被证明是可靠的，哪些没有，哪些关系值得继续关注，哪些可以降级。百年重释精炼了此方法论。这是精炼之后的时期，修正与最终评估之间的弧线中点。编年史观察到：观察正在进行中。你的帝国比大多数都更清楚地观察着银河，因为它观察得更久也更审慎。它如何处理这份清晰，仍在决定中。编年史将在其降临时记录那决定。"
 eoe_contact.601.desc_c:0 "一百五十年。编年史审视自首次接触在无奈条件下做出以来，你的帝国与银河的关系的当前状态。无奈的遭遇不假装接触是不复杂的。它管理那份复杂。在一百五十年之际，管理已十分纯熟：你的帝国知道它维持哪些关系，容忍哪些，以及避开哪些。百年重释或许已调整了校准。这是调整之后的时期，修正后的实践要么证明自身、要么揭示新问题的漫长中段。编年史观察到：无奈没有消失。它已被精炼为某种更精确的东西。精确是智慧还是仅仅穿了更好衣服的谨慎，是接下来五十年将确定的。"

 # ── eoe_contact.750 - 250年总结 ────────────────────────────────────
 eoe_contact.750.title:0 "编年史：联络总结"
 # 路径 A（伸出的手）
 eoe_contact.750.desc_a_affirm:0 "两个半世纪前，你的帝国向银河伸出了手，在百年之际肯定了那伸出，并从那时起一直生活在那肯定之中。编年史发布其对此章的最终评估。伸出的手哲学，一贯持守、审慎肯定，产生了一贯的哲学所产生的东西：一段连贯的记录。你的帝国对待其他文明的方式是可读的。他们知道该预期什么。那份可读性不是天真——它是一种力量形式。被理解的帝国是被谈判而非被算计的。两百五十年的伸出之手，已使你的帝国在银河中成为一个已知量，而已知量，一贯持守之，会积累任何短期计算都无法购得的那一样东西：信任。编年史记录此章闭合。你的帝国用它已建成之物做什么，是下一章。"
 eoe_contact.750.desc_a_partial:0 "两个半世纪前，你的帝国向银河伸出了手，然后在百年之际以来之不易的谨慎调和了那伸出。编年史发布其最终评估。部分修正是正确的。纯粹的哲学，被证据修正，会变成教条。你帝国版本的伸出的手，不是在首次接触时所宣告的那个版本——它是挺过一个世纪的应用、并在应用揭示错误处被纠正了的版本。你的帝国现在维持的关系，是赢得了维护的关系。那些被放手的，配得被放手。编年史将此记录为伸出的手哲学达其成熟形态：在慷慨有理由处慷慨，在坚定有必要处坚定，并足够诚实以知晓其区别。"
 eoe_contact.750.desc_a_reverse:0 "两个半世纪前，你的帝国向银河伸手，而一百年后逆转了那伸出。编年史发布其对逆转在随后一个半世纪所产生的最终评估。逆转并非失败。它们是结论。你的帝国得出结论，伸出的手哲学并未描述它实际遭遇的那个银河，然后用某种确实描述了它的东西取代了它。无论现在治理你帝国对待其他文明之道的是什么框架，都是从一份被诚实地检验过、并被发现不足的哲学的废墟中建立起来的。那是比大多数帝国开始时更严格的基础。编年史记录下两百五十年：宣言，逆转，以及从某种并非真实之物的残骸中构建真实之物的漫长工作。"
 # 路径 B（谨慎的观察者）
 eoe_contact.750.desc_b_affirm:0 "两个半世纪前，你的帝国选择了警惕而非温暖，在百年之际肯定了那选择，并从那时起继续观察。编年史发布其最终评估。谨慎的观察者，一贯持守之，产生了一种特定类型的帝国：一个比银河理解它更透彻地理解银河的帝国。那种不对称是一种力量形式，而你的帝国已花了两百五十年积累它。编年史记录下累积的知识：哪些文明是可靠的，哪些不是，哪些关系服务于长期利益，哪些应在距离上维持。这是谨慎的观察者所建造的档案。此章闭合不是带着一段关系，而是带着一份记录——而这份记录，若你的帝国不那么耐心的话，本不会如此完整。"
 eoe_contact.750.desc_b_partial:0 "两个半世纪前，你的帝国观察而非接触，然后在百年之际引入了选择性接触以补充观察。编年史发布其最终评估。部分修正证明了是正确的校准。没有应用的纯粹观察，最终会变成它自身的陷阱——不能使用的知识只是假设性地有价值。你的帝国找到了平衡：为接触提供信息的观察，受观察所揭示之事约束的接触。它现在所维持的外交关系是银河中最持久的一些，因为它们是在一个世纪的评估后被选择的，而非在首次接触的热情中形成的。编年史将此记录为通过诚实的修正而改进的方法论。"
 eoe_contact.750.desc_b_reverse:0 "两个半世纪前，你的帝国选择了谨慎的观察，然后在百年之际判定仅观察是不够的，并逆转了路线。编年史发布其对随之而来的事物的最终评估。逆转不是对此方法论的拒绝——它是此方法论达其结论。观察产生知识。知识，若它无其他产出，最终应产出一个关于拿它做什么的决定。你的帝国在第一百年做出了那决定，并花了随后一个半世纪据其行动。编年史记录下最终选择了成为别的东西的谨慎观察者的完整弧线：建立知识的观察，应用知识的决定，以及那应用所产生的记录。"
 # 路径 C（无奈的遭遇）
 eoe_contact.750.desc_c_affirm:0 "两个半世纪前，你的帝国以无奈面对银河，在百年之际肯定了那无奈，并从那时起一直维持着有管理的距离。编年史发布其最终评估。无奈的遭遇，一贯持守、审慎肯定，产生了它被设计来产生的东西：一个按其自身条件、以其自身步调、在其控制的边界内与银河接触的帝国。编年史不将此记录为孤立——你的帝国完全嵌入于银河事务中。它将其记录为主权：接触是一种选择、而非一种状态，且接触的条件是可谈判的这一决断。两百五十年的那决断，已使你的帝国成为更难被算计的文明之一。此章以哲学完好无损而闭合。"
 eoe_contact.750.desc_c_partial:0 "两个半世纪前，你的帝国以无奈接近银河，然后在百年之际判定无奈已矫枉过正，并引入了选择性接触。编年史发布其最终评估。部分修正找到了此哲学的可运作形式。纯粹的无奈，僵硬持守之，最终会变成一项负债——银河不会等待不愿与之接触的帝国。你的帝国找到了调整：保留谨慎，解除回避。它现在所维持的关系，是仔细选择的，并已证明是持久的，恰恰因为它们不是漫不经心形成的。编年史记录下成熟了的无奈的遭遇哲学：在存在服务于明确目的处存在，在并非如此的处缺席，并对区别抱以诚实。"
 eoe_contact.750.desc_c_reverse:0 "两个半世纪前，你的帝国以无奈遭遇了银河，然后一百年后判定无奈已告完成，并完全逆转了它。编年史发布其对逆转所产生的最终评估。在一个世纪的实践后，放弃有管理的距离的决定，并非在没有基础的情况下做出的。你的帝国知道，带着不寻常的精确性，它在向什么移动——因为它已从一段谨慎的距离上花了一百年观察它。它在逆转后建立的接触，是建立在那知识上的。那些以开放性开始的帝国，通过生活于其中学习银河。你的帝国先学习了银河，然后才选择生活于其中。编年史将此记录为无奈的遭遇最经深思的形式：无奈得足够久以服务于其目的，然后在目的被服务后予以释放。"

